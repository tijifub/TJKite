              {addStudentMode === "new" && (
                <div className="space-y-2">
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Name *</label>
                      <input autoFocus type="text" placeholder="First Last"
                        value={newStudentDraft.name}
                        onChange={e=>setNewStudentDraft(d=>({...d, name: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white"/>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Course</label>
                      <select value={newStudentDraft.course}
                        onChange={e=>setNewStudentDraft(d=>({...d, course: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white">
                        <option value="">— none —</option>
                        {Object.entries(TJKITE_COURSE_PLAN).map(([k,v]) =>
                          <option key={k} value={k}>{k} – {v.label}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Arrival</label>
                      <input type="date" value={newStudentDraft.arrival || sel.date}
                        onChange={e=>setNewStudentDraft(d=>({...d, arrival: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white"/>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Departure</label>
                      <input type="date" value={newStudentDraft.departure || sel.date}
                        onChange={e=>setNewStudentDraft(d=>({...d, departure: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white"/>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Phone</label>
                      <input type="tel" placeholder="+49…"
                        value={newStudentDraft.phone}
                        onChange={e=>setNewStudentDraft(d=>({...d, phone: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white"/>
                    </div>
                    <div>
                      <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Email</label>
                      <input type="email" placeholder="name@example.com"
                        value={newStudentDraft.email}
                        onChange={e=>setNewStudentDraft(d=>({...d, email: e.target.value}))}
                        className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-emerald-400 outline-none bg-white"/>
                    </div>
                  </div>
                  <div className="flex gap-1.5">
                    <button
                      disabled={!newStudentDraft.name.trim()}
                      onClick={() => {
                        if (!newStudentDraft.name.trim()) return;
                        const arrival  = newStudentDraft.arrival  || sel.date;
                        const departure = newStudentDraft.departure || sel.date;
                        const email = (newStudentDraft.email||"").trim().toLowerCase();
                        const tjkiteKey = email
                          ? `email:${email}|${arrival}|${departure}`
                          : `guest:${newStudentDraft.name.trim().toLowerCase()}|${arrival}|${departure}`;
                        const newId = addStudent({
                          name: newStudentDraft.name.trim(),
                          arrival, departure,
                          course: newStudentDraft.course || "",
                          phone: newStudentDraft.phone || "",
                          email: newStudentDraft.email || "",
                          level: "Beginner", language: "de", newsletter: false,
                          address: "", country: "DE", dob: null,
                          tjkiteKey,
                          notes: `Added from schedule · ${sel.date}`,
                        });
                        const gid = sel.groupId || `grp:${sel.date}|manual|${sel.startTime}`;
                        if (!sel.groupId) updLesson?.(sel.id, { groupId: gid });
                        addLesson({ studentId: newId, instructorId: sel.instructorId,
                          date: sel.date, startTime: sel.startTime, hours: sel.hours,
                          spot: sel.spot || state.settings?.spotName || "Sample Spot, NL",
                          groupId: gid, status: "scheduled" });
                        closeAddToGroup();
                        setSelected(gid);
                      }}
                      className="px-3 py-1 rounded text-xs font-semibold bg-emerald-600 hover:bg-emerald-700 text-white disabled:opacity-40 disabled:cursor-not-allowed">
                      Create & Add to lesson
                    </button>
                    <button onClick={closeAddToGroup}
                      className="px-3 py-1 rounded text-xs font-medium bg-white border border-slate-200 hover:bg-slate-50 text-slate-600">
                      Cancel
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          <div className="mb-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
            <Select label={selGroup.lessons.length > 1 ? "Instructor (all)" : "Instructor"}
                    value={sel.instructorId || ""}
                    onChange={v => {
                      if (selGroup.isGroup) updGroup(sel.groupId, { instructorId: v });
                      else updLesson(sel.id, { instructorId: v });
                    }}
                    options={["", ...state.instructors.map(i=>i.id)]}
                    display={id=>id===""?"Unassigned":(state.instructors.find(i=>i.id===id)?.name||id)} />
            <Input label="Date" type="date" value={sel.date}
                   onChange={v => {
                     if (selGroup.isGroup) updGroup(sel.groupId, { date: v });
                     else updLesson(sel.id, { date: v });
                   }} />
            <TimeInput label="Start time" value={sel.startTime}
                   onChange={v => {
                     if (selGroup.isGroup) updGroup(sel.groupId, { startTime: v });
                     else updLesson(sel.id, { startTime: v });
                   }} />
            <Input label="Hours" type="number" step="0.5" value={sel.hours}
                   onChange={v => {
                     if (selGroup.isGroup) updGroup(sel.groupId, { hours: +v||0 });
                     else updLesson(sel.id, { hours: +v||0 });
                   }} />
            <Input label="Spot" value={sel.spot || ""}
                   onChange={v => {
                     if (selGroup.isGroup) updGroup(sel.groupId, { spot: v });
                     else updLesson(sel.id, { spot: v });
                   }} />
            <Select label="Status" value={sel.status}
                    onChange={v => {
                      if (selGroup.isGroup) updGroup(sel.groupId, { status: v });
                      else updLesson(sel.id, { status: v });
                    }}
                    options={["scheduled","completed","cancelled"]} />
            <div className="md:col-span-3">
              <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Note</label>
              <input type="text" placeholder="e.g. bring wetsuit, meet at beach…"
                className="w-full border border-slate-200 rounded px-2 py-1 text-xs focus:border-sky-400 outline-none bg-white"
                value={sel.notes || ""}
                onChange={e => updLesson(sel.id, { notes: e.target.value })}
              />
            </div>
            {/* Meeting type toggle — admin only (updLesson is null for instructors) */}
            {updLesson && (
              <div className="md:col-span-3">
                <label className="text-[10px] text-slate-500 font-semibold uppercase tracking-wide block mb-0.5">Check-in (30 min before)</label>
                <div className="flex rounded border border-slate-200 overflow-hidden text-xs w-fit">
                  {[['front_desk','✓ Front desk'],['beach','🏄 Meet at the beach']].map(([val, label]) => {
                    const effective = getMeetingType(sel, state.students, state.lessons);
                    const active = effective === val;
                    return (
                      <button key={val} type="button"
                        onClick={() => {
                          selGroup.lessons.forEach(l => updLesson(l.id, { meetingType: val }));
                        }}
                        className={classNames("px-3 py-1.5",
                          active ? (val==='beach' ? "bg-teal-600 text-white font-semibold" : "bg-violet-600 text-white font-semibold")
                                 : "bg-white text-slate-600 hover:bg-slate-50")}>
                        {label}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          {(() => { const adv = lessonAdvice(sel);
            return adv.status==="bad" || adv.status==="marginal"
              ? <div className={classNames("text-xs mb-2 px-2 py-1 rounded",
                  adv.status==="bad" ? "bg-rose-50 text-rose-800 border border-rose-200" : "bg-amber-50 text-amber-800 border border-amber-200")}>
                  Wind advice: {adv.reason}
                </div>
              : null;
          })()}
          <MessageButtons state={state} lesson={sel} stu={selStu} ins={selIns}
                          updLesson={updLesson} updStudent={updStudent} updInstr={updInstr} expanded />
          {selGroup.lessons.length > 1 && (
            <GroupBroadcast state={state} lesson={sel} students={selGroup.students} ins={selIns}
                            updStudent={updStudent} openStudentProfile={openStudentProfile} />
          )}
        </section>
      )}
    </div>
  );
}

// ---------- Participant list (clickable name + inline phone editor) ----------
function ParticipantList({ students, updStudent, openStudentProfile, onRemove }) {
  const [editingFor, setEditingFor] = useState(null);
  const [drafts, setDrafts] = useState({});
  if (!students?.length) return null;

  const start = (s) => {
    setEditingFor(s.id);
    setDrafts(d => ({ ...d, [s.id]: d[s.id] ?? s.phone ?? "" }));
  };
  const save = (s) => {
    const phone = fmtPhone(drafts[s.id]);
    if (!phone) return alert("Enter a valid phone number first");
    updStudent(s.id, { phone });
    setEditingFor(null);
  };

  return (
    <div className="mb-3 border border-slate-200 rounded">
      <div className="px-2 py-1 text-[10px] uppercase tracking-wide text-slate-500 bg-slate-50 border-b border-slate-200">
        Participants ({students.length})
      </div>
      <ul className="divide-y divide-slate-100">
        {students.map(s => {
          const phoneOk = !!fmtPhone(s.phone);
          const isEditing = editingFor === s.id;
          return (
            <li key={s.id} className="flex items-center gap-2 px-2 py-1.5 text-xs flex-wrap">
              {onRemove && (
                <button type="button"
                        onClick={()=>onRemove(s.id)}
                        title="Remove from this lesson"
                        className="text-rose-400 hover:text-rose-600 hover:bg-rose-50 rounded w-4 h-4 flex items-center justify-center flex-shrink-0 font-bold leading-none">
                  ×
                </button>
              )}
              <button type="button"
                      onClick={()=>openStudentProfile?.(s.id)}
                      title="Open student profile"
                      className="font-medium truncate flex-1 text-left text-sky-700 hover:text-sky-900 hover:underline">
                {s.name}
              </button>
              {phoneOk && !isEditing && (
                <>
                  <a className="text-slate-500 tabular-nums hover:underline" href={`tel:${fmtPhone(s.phone)}`}>{s.phone}</a>
                  <button type="button"
                          className="px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px]"
                          onClick={()=>start(s)}>edit</button>
                </>
              )}
              {!phoneOk && !isEditing && (
                <button type="button"
                        className="px-2 py-0.5 rounded bg-sky-100 hover:bg-sky-200 text-sky-700 font-medium"
                        onClick={()=>start(s)}>+ add phone</button>
              )}
              {isEditing && (
                <div className="flex items-center gap-1">
                  <input
                    autoFocus
                    placeholder="+31..."
                    className="border rounded px-1.5 py-0.5 text-xs w-32"
                    value={drafts[s.id] ?? ""}
                    onChange={e=>setDrafts(d=>({...d, [s.id]: e.target.value}))}
                    onKeyDown={e=>{ if (e.key==="Enter") save(s); if (e.key==="Escape") setEditingFor(null); }}
                  />
                  <button type="button"
                          className="px-2 py-0.5 rounded bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-medium"
                          onClick={()=>save(s)}>save</button>
                  <button type="button"
                          className="px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px]"
                          onClick={()=>setEditingFor(null)}>×</button>
                </div>
              )}
            </li>
          );
        })}
      </ul>
    </div>
  );
}

// ---------- Group broadcast (send same message to all students in a group) ----------
function GroupBroadcast({ state, lesson, students, ins, updStudent, openStudentProfile }) {
  const [type, setType] = useState("confirm");
  const [vars, setVars] = useState({ message:"", reason:"", spot: lesson.spot||"", wind:"", new_date:"", new_time:"" });
  const [phoneDrafts, setPhoneDrafts] = useState({});  // { [studentId]: string }
  const [editingPhoneFor, setEditingPhoneFor] = useState(null);

  const startEditPhone = (s) => {
    setEditingPhoneFor(s.id);
    setPhoneDrafts(d => ({ ...d, [s.id]: d[s.id] ?? s.phone ?? "" }));
  };
  const savePhone = (s) => {
    const phone = fmtPhone(phoneDrafts[s.id]);
    if (!phone) return alert("Enter a valid phone number first");
    updStudent(s.id, { phone });
    setEditingPhoneFor(null);
  };

  const meetingType  = getMeetingType(lesson, state.students, state.lessons);
  const checkinTime  = addMinutes(lesson.startTime || "09:00", -30);
  const isCheckin    = type === "checkin";
  const allStudentNames = students.map(s => s.name).join(', ');

  const types = [
    { key: "confirm",    label: "Confirm",    ask: ["spot","wind"] },
    { key: "update",     label: "Update",     ask: ["message"] },
    { key: "cancel",     label: "Cancel",     ask: ["reason"] },
    { key: "reschedule", label: "Reschedule", ask: ["reason","new_date","new_time"] },
    { key: "reminder",   label: "Reminder",   ask: [] },
    { key: "checkin",    label: meetingType === 'beach' ? "🏄 Beach" : "✓ Check-in", ask: [] },
  ];
  const askFields = types.find(t=>t.key===type)?.ask || [];

  const courseCodeFromLesson =
    (lesson.groupId ? lesson.groupId.split("|")[1] : null) ||
    (lesson.tjkiteImportKey ? lesson.tjkiteImportKey.split("|").slice(-2,-1)[0] : null) ||
    "";

  // Standard message for each student (all types except checkin)
  const buildMsgFor = (stu) => {
    const tpls = state.templates.en || {};
    const tpl = tpls[type] || "";
    const courseCode = stu.course || courseCodeFromLesson || "";
    const courseLabel = (courseCode && TJKITE_COURSE_PLAN[courseCode]?.label) ? TJKITE_COURSE_PLAN[courseCode].label : (courseCode || 'lesson');
    return fillTemplate(tpl, {
      student: stu.name, instructor: ins?.name || "unassigned instructor",
      school: state.settings.schoolName, date: lesson.date, time: lesson.startTime,
      hours: lesson.hours, level: stu.level, spot: vars.spot || lesson.spot || "",
      wind: vars.wind, message: vars.message, reason: vars.reason,
      new_date: vars.new_date, new_time: vars.new_time, course: courseLabel,
    });
  };

  // Per-student check-in message
  const buildCheckinMsgForStudent = (stu) => {
    const sTpls = state.templates.en || {};
    const sCourseCode = stu.course || courseCodeFromLesson || '';
    const sCourseLabel = (sCourseCode && TJKITE_COURSE_PLAN[sCourseCode]?.label) ? TJKITE_COURSE_PLAN[sCourseCode].label : (sCourseCode || 'lesson');
    return fillTemplate(sTpls.checkin || "", {
      student: stu.name, instructor: ins?.name || "unassigned instructor",
      date: lesson.date, time: lesson.startTime, hours: lesson.hours,
      course: sCourseLabel, checkinTime, level: stu.level,
    });
  };

  // Instructor check-in message — lists ALL students
  const buildInstrCheckinMsg = () => {
    const iTpls = state.templates.en || {};
    const courseCode = courseCodeFromLesson;
    const courseLabel = (courseCode && TJKITE_COURSE_PLAN[courseCode]?.label) ? TJKITE_COURSE_PLAN[courseCode].label : (courseCode || 'lesson');
    return fillTemplate(iTpls.checkin_instructor || "", {
      instructor: ins?.name || "instructor", student: allStudentNames,
      date: lesson.date, time: lesson.startTime, hours: lesson.hours,
      course: courseLabel, checkinTime,
    });
  };

  const sendable = students.filter(s => !!fmtPhone(s.phone));
  const missing  = students.filter(s => !fmtPhone(s.phone));
  const instrCanSend = !!(ins && fmtPhone(ins.phone));

  // Sequential send queue — browsers only allow one window.open() per user gesture,
  // so we open one chat per click and advance through the list.
  const [sendIdx, setSendIdx] = React.useState(0);

  // Rebuild the queue whenever message type or students change.
  const queue = React.useMemo(() => {
    const msgs = isCheckin
      ? sendable.map(s => ({ label: s.name.split(" ")[0], phone: s.phone, msg: buildCheckinMsgForStudent(s) }))
      : sendable.map(s => ({ label: s.name.split(" ")[0], phone: s.phone, msg: buildMsgFor(s) }));
    if (isCheckin && instrCanSend)
      msgs.push({ label: ins.name.split(" ")[0] + " (instr.)", phone: ins.phone, msg: buildInstrCheckinMsg() });
    return msgs;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [type, sendable.map(s=>s.id+s.phone).join(), instrCanSend, vars, isCheckin]);

  // Reset index when the queue composition changes (new message type, student list, etc.)
  React.useEffect(() => { setSendIdx(0); }, [queue]);

  const handleSendNext = () => {
    if (sendIdx >= queue.length) { setSendIdx(0); return; }
    const { phone, msg } = queue[sendIdx];
    window.open(waLink(phone, msg), '_blank', 'noopener');
    setSendIdx(i => i + 1);
  };

  const allSent  = sendIdx >= queue.length && queue.length > 0;
  const nextItem = queue[sendIdx];

  return (
    <div className="mt-4 border-t border-slate-200 pt-3">
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <span className="text-xs font-semibold text-slate-700">📣 Broadcast to all participants</span>
        <span className="text-[11px] text-slate-500">{sendable.length} of {students.length} have a phone</span>
      </div>
      <div className="flex flex-wrap items-center gap-2 mb-2">
        <span className="text-xs text-slate-500">Message type:</span>
        {types.map(t => (
          <button key={t.key}
            className={classNames("px-2.5 py-1 rounded text-xs font-medium",
              type===t.key
                ? (t.key==="checkin" ? "bg-violet-500 text-white" : "bg-sky-500 text-white")
                : "bg-white border border-slate-200 hover:bg-slate-50 text-slate-700")}
            onClick={()=>setType(t.key)}>{t.label}</button>
        ))}
      </div>
      {isCheckin && (
        <div className={classNames("mb-2 px-3 py-2 rounded-lg text-xs font-medium",
          meetingType === 'beach'
            ? "bg-teal-50 border border-teal-200 text-teal-700"
            : "bg-violet-50 border border-violet-200 text-violet-700")}>
          {meetingType === 'beach' ? '🏄 Meet at the beach' : '✓ Check-in: Front desk'} · {checkinTime} (30 min before {lesson.startTime})
        </div>
      )}
      {askFields.length > 0 && (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mb-2">
          {askFields.map(f => {
            const fLabel = { message:"Message", reason:"Reason", spot:"Spot", wind:"Wind forecast",
                             new_date:"New date", new_time:"New time" }[f] || f;
            const fType  = f === "new_date" ? "date" : f === "new_time" ? "time" : "text";
            return (
            <label key={f} className="text-xs">
              <span className="text-slate-500">{fLabel}</span>
              <input type={fType} className="w-full border rounded px-2 py-1 text-sm"
                value={vars[f]||""} onChange={e=>setVars({...vars, [f]:e.target.value})} />
            </label>
            );
          })}
        </div>
      )}
      <ul className="divide-y divide-slate-100 border border-slate-200 rounded mb-2">
        {students.map(s => {
          const lang = s.language || state.settings.defaultLang;
          const phoneOk = !!fmtPhone(s.phone);
          const isEditingPhone = editingPhoneFor === s.id;
          const msgHref = isCheckin
            ? waLink(s.phone, buildCheckinMsgForStudent(s))
            : waLink(s.phone, buildMsgFor(s));
          return (
            <li key={s.id} className="flex items-center gap-2 px-2 py-1.5 text-xs flex-wrap">
              <button
                type="button"
                onClick={()=>openStudentProfile?.(s.id)}
                title="Open student profile"
                className="font-medium truncate flex-1 text-left text-sky-700 hover:text-sky-900 hover:underline">
                {s.name}
              </button>
              <span className="text-slate-400 text-[10px] uppercase tabular-nums">{lang}</span>
              {phoneOk && !isEditingPhone && (
                <>
                  <span className="text-slate-400 text-[10px] tabular-nums">{s.phone}</span>
                  <a className={classNames("px-2 py-0.5 rounded text-white font-medium",
                       isCheckin ? "bg-violet-500 hover:bg-violet-600" : "bg-emerald-500 hover:bg-emerald-600")}
                     href={msgHref} target="_blank" rel="noreferrer">📲 WA</a>
                  <button type="button"
                          className="px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px]"
                          onClick={()=>startEditPhone(s)}>edit</button>
                </>
              )}
              {!phoneOk && !isEditingPhone && (
                <button type="button"
                        className="ml-auto px-2 py-0.5 rounded bg-sky-100 hover:bg-sky-200 text-sky-700 font-medium"
                        onClick={()=>startEditPhone(s)}>+ add phone</button>
              )}
              {isEditingPhone && (
                <div className="flex items-center gap-1 ml-auto">
                  <input
                    autoFocus
                    placeholder="+31..."
                    className="border rounded px-1.5 py-0.5 text-xs w-32"
                    value={phoneDrafts[s.id] ?? ""}
                    onChange={e=>setPhoneDrafts(d=>({...d, [s.id]: e.target.value}))}
                    onKeyDown={e=>{ if (e.key==="Enter") savePhone(s); if (e.key==="Escape") setEditingPhoneFor(null); }}
                  />
                  <button type="button"
                          className="px-2 py-0.5 rounded bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-medium"
                          onClick={()=>savePhone(s)}>save</button>
                  <button type="button"
                          className="px-1.5 py-0.5 rounded bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px]"
                          onClick={()=>setEditingPhoneFor(null)}>×</button>
                </div>
              )}
            </li>
          );
        })}
        {/* Instructor row — shown only for check-in so they get the full student list */}
        {isCheckin && ins && (
          <li className="flex items-center gap-2 px-2 py-1.5 text-xs flex-wrap bg-violet-50">
            <span className="font-medium flex-1 text-violet-800">
              🏄 {ins.name} <span className="font-normal text-violet-500">(instructor)</span>
            </span>
            <span className="text-slate-400 text-[10px] tabular-nums">{ins.phone || "no phone"}</span>
            {instrCanSend ? (
              <a className="px-2 py-0.5 rounded bg-violet-600 hover:bg-violet-700 text-white font-medium"
                 href={waLink(ins.phone, buildInstrCheckinMsg())} target="_blank" rel="noreferrer">📲 WA</a>
            ) : (
              <span className="text-[10px] text-slate-400 italic">no phone</span>
            )}
          </li>
        )}
      </ul>
      <div className="flex flex-wrap items-center gap-2">
        {queue.length === 0 ? (
          <button disabled className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-100 text-slate-400 cursor-not-allowed">
            📲 No phones
          </button>
        ) : allSent ? (
          <button
            className="px-3 py-1.5 rounded-lg text-sm font-medium bg-slate-100 hover:bg-slate-200 text-slate-600"
            onClick={() => setSendIdx(0)}>
            ✓ All sent — click to restart
          </button>
        ) : (
          <button
            className={classNames("px-3 py-1.5 rounded-lg text-sm font-medium",
              isCheckin ? "bg-violet-600 hover:bg-violet-700 text-white" : "bg-emerald-600 hover:bg-emerald-700 text-white")}
            onClick={handleSendNext}>
            📲 {sendIdx === 0
              ? `Open ${queue.length > 1 ? `1 of ${queue.length}` : ""} — ${nextItem?.label}`
              : `Next (${sendIdx + 1}/${queue.length}) — ${nextItem?.label}`}
          </button>
        )}
        {missing.length > 0 && (
          <span className="text-[11px] text-rose-600">
            {missing.length} {missing.length===1 ? "student" : "students"} skipped (no phone)
          </span>
        )}
      </div>
    </div>
  );
}

// ---------- Message buttons (WhatsApp deep links) ----------
function MessageButtons({ state, lesson, stu, ins, updLesson, updStudent, updInstr, expanded }) {
  const [openType, setOpenType] = useState(expanded ? "confirm" : null);
  const [vars, setVars] = useState({ message:"", reason:"", spot: lesson.spot||"", wind:"", new_date:"", new_time:"" });
  if (!stu) return <div className="text-rose-600">Missing student</div>;

  const tpls = state.templates.en || {};

  const courseCode = stu.course || lesson.tjkiteImportKey?.split('|').slice(-2,-1)[0] || '';
  const courseLabel = (courseCode && TJKITE_COURSE_PLAN[courseCode]?.label) ? TJKITE_COURSE_PLAN[courseCode].label : (courseCode || 'lesson');

  // ── All students on this lesson's slot ──
  // Use groupId first (most accurate), then same-instructor/time (only if instructor is set,
  // otherwise "" would match every unassigned lesson at the same time).
  const slotLessons = (() => {
    const all = state.lessons || [];
    if (lesson.groupId)
      return all.filter(l => l.groupId === lesson.groupId && l.status !== "cancelled");
    if (lesson.instructorId)
      return all.filter(l =>
        l.instructorId === lesson.instructorId &&
        l.date === lesson.date &&
        l.startTime === lesson.startTime &&
        l.status !== "cancelled"
      );
    return [lesson]; // solo lesson with no instructor/group
  })();
  const slotStudents = slotLessons.map(l => (state.students||[]).find(s => s.id === l.studentId)).filter(Boolean);
  const allStudentNames = slotStudents.length > 0 ? slotStudents.map(s => s.name).join(', ') : stu.name;

  // ── Check-in timing ──
  const checkinTime = addMinutes(lesson.startTime || "09:00", -30);
  const slotCheckinStudents = slotLessons
    .map(l => (state.students||[]).find(s => s.id === l.studentId))
    .filter(Boolean);

  const baseVars = {
    student: stu.name, instructor: ins?.name || "unassigned instructor", school: state.settings.schoolName,
    date: lesson.date, time: lesson.startTime, hours: lesson.hours,
    level: stu.level, spot: vars.spot || lesson.spot || "",
    wind: vars.wind, message: vars.message, reason: vars.reason,
    new_date: vars.new_date, new_time: vars.new_time,
    course: courseLabel, checkinTime
  };

  // Instructor-specific vars: all students on the slot
  const instrVars = { ...baseVars, student: allStudentNames };

  // Per-student check-in message
  const buildCheckinMsgForStudent = (s) => {
    const sTpls = state.templates.en || {};
    const sCourseCode = s.course || '';
    const sCourseLabel = (sCourseCode && TJKITE_COURSE_PLAN[sCourseCode]?.label) ? TJKITE_COURSE_PLAN[sCourseCode].label : (sCourseCode || 'lesson');
    return fillTemplate(sTpls.checkin || "", { ...baseVars, student: s.name, level: s.level, course: sCourseLabel });
  };

  // Meeting-point suffix appended to messages for every lesson
  const lessonMeetingType = getMeetingType(lesson, state.students, state.lessons);
  const checkinAppend = lessonMeetingType === 'beach'
    ? `\n\n🏄 Meet at the beach · ${checkinTime}`
    : `\n\n📍 Check-in: Front desk · ${checkinTime}`;
  // Only append meeting-point footer on messages where it's relevant.
  // Cancel and reschedule don't need a check-in reminder; checkin templates handle it themselves.
  const APPEND_FOR = new Set(["confirm", "update", "reminder"]);
  const buildStudentMsg = (kind) => fillTemplate(tpls[kind] || "", baseVars) + (APPEND_FOR.has(kind) ? checkinAppend : "");
  const buildInstrMsg   = (kind) => fillTemplate(tpls[kind] || "", instrVars) + (APPEND_FOR.has(kind) ? checkinAppend : "");

  const studentCanSend = !!fmtPhone(stu.phone);
  const instrCanSend = !!(ins && fmtPhone(ins.phone));

  const types = [
    { key: "confirm",    label: "Confirm",    ask: ["spot","wind"] },
    { key: "update",     label: "Update",     ask: ["message"] },
    { key: "cancel",     label: "Cancel",     ask: ["reason"] },
    { key: "reschedule", label: "Reschedule", ask: ["reason","new_date","new_time"] },
    { key: "reminder",   label: "Reminder",   ask: [] },
    { key: "checkin", label: lessonMeetingType === 'beach' ? "🏄 Beach" : "✓ Check-in", ask: [], isCheckin: true },
  ];

  if (expanded) {
    return (
      <div className="space-y-2">
        <div className="flex flex-wrap items-center gap-2 text-sm">
          <span className="text-xs text-slate-500">Message type:</span>
          {types.map(t =>
            <button key={t.key}
              className={classNames("px-2.5 py-1 rounded text-xs font-medium",
                openType===t.key
                  ? (t.key==="checkin" ? "bg-violet-500 text-white" : "bg-sky-500 text-white")
                  : "bg-white border border-slate-200 hover:bg-slate-50 text-slate-700")}
              onClick={()=>setOpenType(t.key)}>{t.label}</button>)}
        </div>
        {types.find(t=>t.key===openType).ask.length > 0 && (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
            {types.find(t=>t.key===openType).ask.map(field => {
              const fieldLabel = { message:"Message", reason:"Reason", spot:"Spot", wind:"Wind forecast",
                                   new_date:"New date", new_time:"New time" }[field] || field;
              const fieldType  = field === "new_date" ? "date" : field === "new_time" ? "time" : "text";
              return (
                <label key={field} className="text-xs">
                  <span className="text-slate-500">{fieldLabel}</span>
                  <input type={fieldType} className="w-full border rounded px-2 py-1 text-sm"
                    value={vars[field]||""} onChange={e=>setVars({...vars, [field]:e.target.value})} />
                </label>
              );
            })}
          </div>
        )}
        {openType === "checkin" ? (
          <div className="space-y-2">
            <div className={lessonMeetingType === 'beach'
              ? "bg-teal-50 border border-teal-200 rounded-lg px-3 py-2 text-xs text-teal-700 font-medium"
              : "bg-violet-50 border border-violet-200 rounded-lg px-3 py-2 text-xs text-violet-700 font-medium"}>
              {lessonMeetingType === 'beach' ? '🏄 Meet at the beach' : '✓ Check-in: Front desk'} · {checkinTime} (30 min before {lesson.startTime})
            </div>
            {slotCheckinStudents.map(s => (
              <div key={s.id}>
                <div className="text-xs text-slate-500 mb-1">Student message ({s.name}):</div>
                <textarea readOnly rows="3" className="w-full border rounded px-2 py-1 text-sm font-mono bg-white"
                          value={buildCheckinMsgForStudent(s)} />
              </div>
            ))}
            {ins && (
              <div>
                <div className="text-xs text-slate-500 mb-1">Instructor message ({ins.name}):</div>
                <textarea readOnly rows="3" className="w-full border rounded px-2 py-1 text-sm font-mono bg-white"
                          value={buildInstrMsg("checkin_instructor")} />
              </div>
            )}
          </div>
        ) : (
          <div>
            <div className="text-xs text-slate-500 mb-1">Preview to {stu.name}:</div>
            <textarea readOnly rows="3" className="w-full border rounded px-2 py-1 text-sm font-mono bg-white"
                      value={buildStudentMsg(openType)} />
          </div>
        )}
        <div className="flex flex-wrap gap-2 pt-1">
          {openType === "checkin" ? (<>
            {slotCheckinStudents.map(s => (
              fmtPhone(s.phone) ? (
                <a key={s.id} className="px-3 py-2 rounded-lg bg-violet-500 hover:bg-violet-600 text-white text-sm font-medium inline-flex items-center gap-1.5"
                   href={waLink(s.phone, buildCheckinMsgForStudent(s))} target="_blank" rel="noreferrer">
                  <span>📲</span> Check-in → {s.name.split(" ")[0]}
                </a>
              ) : (
                <span key={s.id} className="text-xs text-slate-400 italic self-center">No phone for {s.name.split(" ")[0]}</span>
              )
            ))}
            {ins && (instrCanSend ? (
              <a className="px-3 py-2 rounded-lg bg-violet-700 hover:bg-violet-800 text-white text-sm font-medium inline-flex items-center gap-1.5"
                 href={waLink(ins.phone, buildInstrMsg("checkin_instructor"))} target="_blank" rel="noreferrer">
                <span>📲</span> Check-in → {ins.name.split(" ")[0]} (instructor)
              </a>
            ) : <span className="text-xs text-slate-400 italic self-center">No phone for {ins.name.split(" ")[0]}</span>)}
          </>) : (<>
            {studentCanSend ? (
              <a className="px-3 py-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium inline-flex items-center gap-1.5"
                 href={waLink(stu.phone, buildStudentMsg(openType))} target="_blank" rel="noreferrer">
                <span>📲</span> Send to {stu.name.split(" ")[0]} (student)
              </a>
            ) : (
              <span className="text-xs text-slate-400 italic self-center">
                No phone for {stu.name.split(" ")[0]} — add in student profile
              </span>
            )}
            {/* Instructor button — not shown for 'reminder' (no instructor-reminder template) */}
            {ins && openType !== "reminder" && (instrCanSend ? (
              <a className="px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium inline-flex items-center gap-1.5"
                 href={waLink(ins.phone, buildInstrMsg(
                   openType==="cancel"     ? "instructor_cancel"     :
                   openType==="reschedule" ? "instructor_reschedule" : "instructor_assign"))}
                 target="_blank" rel="noreferrer">
                <span>📲</span> Send to {ins.name.split(" ")[0]} (instructor)
              </a>
            ) : (
              <span className="text-xs text-slate-400 italic self-center">
                No phone for {ins.name.split(" ")[0]} — add in instructor profile
              </span>
            ))}
            {openType==="cancel" &&
              <button className="px-3 py-2 rounded-lg bg-rose-100 hover:bg-rose-200 text-rose-700 text-sm font-medium"
                      onClick={()=>{ updLesson(lesson.id, { status: "cancelled" }); }}>
                Mark lesson cancelled
              </button>}
          </>)}
        </div>
        <div className="text-[11px] text-slate-500">
          Tip: this opens WhatsApp with the message pre-filled — you tap Send in WhatsApp to actually deliver it.
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="flex flex-wrap gap-1">
        {types.map(t =>
          <button key={t.key} className="chip bg-slate-100 hover:bg-slate-200 text-slate-700"
                  onClick={()=>setOpenType(t.key)}>{t.label}</button>)}
      </div>
      {openType && (
        <div className="mt-1.5 p-2 rounded bg-white border border-slate-200">
          <div className="text-[10px] uppercase text-slate-500 mb-1">{openType} ({lang})</div>
          {types.find(t=>t.key===openType).ask.map(field =>
            <input key={field} placeholder={field}
              className="w-full border rounded px-1.5 py-0.5 text-xs mb-1"
              value={vars[field]||""} onChange={e=>setVars({...vars, [field]:e.target.value})} />
          )}
          {openType === "checkin" ? (<>
            <div className={classNames("text-[10px] rounded px-1.5 py-1 mb-1 font-medium",
              lessonMeetingType === 'beach'
                ? "text-teal-700 bg-teal-50"
                : "text-violet-700 bg-violet-50")}>
              {lessonMeetingType === 'beach' ? '🏄 Beach' : '✓ Front desk'} · {checkinTime}
            </div>
            <textarea readOnly rows="3" className="w-full border rounded px-1.5 py-0.5 text-[11px] mb-1 font-mono"
                      value={buildCheckinMsgForStudent(stu)} />
          </>) : (
            <textarea readOnly rows="3" className="w-full border rounded px-1.5 py-0.5 text-[11px] mb-1 font-mono"
                      value={buildStudentMsg(openType)} />
          )}
          <div className="flex flex-wrap gap-1">
            {openType === "checkin" ? (<>
              {slotCheckinStudents.map(s => fmtPhone(s.phone) && (
                <a key={s.id} className="chip bg-violet-500 text-white"
                   href={waLink(s.phone, buildCheckinMsgForStudent(s))} target="_blank" rel="noreferrer">
                  ✓ → {s.name.split(" ")[0]}
                </a>
              ))}
              {ins && instrCanSend && (
                <a className="chip bg-violet-700 text-white"
                   href={waLink(ins.phone, buildInstrMsg("checkin_instructor"))} target="_blank" rel="noreferrer">
                  ✓ → {ins.name.split(" ")[0]}
                </a>
              )}
            </>) : (<>
              {studentCanSend ? (
                <a className="chip bg-emerald-500 text-white"
                   href={waLink(stu.phone, buildStudentMsg(openType))} target="_blank" rel="noreferrer">
                  WA → {stu.name.split(" ")[0]}
                </a>
              ) : (
                <span className="text-[11px] text-slate-400 italic self-center">
                  No phone for {stu.name.split(" ")[0]}
                </span>
              )}
              {ins && openType !== "reminder" && (instrCanSend ? (
                <a className="chip bg-emerald-600 text-white"
                   href={waLink(ins.phone, buildInstrMsg(
                     openType==="cancel"     ? "instructor_cancel"     :
                     openType==="reschedule" ? "instructor_reschedule" : "instructor_assign"))}
                   target="_blank" rel="noreferrer">
                  WA → {ins.name.split(" ")[0]}
                </a>
              ) : (
                <span className="text-[11px] text-slate-400 italic self-center">
                  No phone for {ins.name.split(" ")[0]}
                </span>
              ))}
              {openType==="cancel" &&
                <button className="chip bg-rose-100 text-rose-700"
                        onClick={()=>{ updLesson(lesson.id, { status: "cancelled" }); setOpenType(null); }}>
                  Mark cancelled
                </button>}
            </>)}
            <button className="chip bg-slate-100 text-slate-600 ml-auto" onClick={()=>setOpenType(null)}>close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Templates ----------
function Templates({ state, setTemplates }) {
  const tpls = state.templates.en || {};
  const update = (key, val) => setTemplates({ ...state.templates, en: { ...tpls, [key]: val } });

  const placeholders = ["{student}","{instructor}","{school}","{date}","{time}","{hours}","{level}","{spot}","{wind}","{message}","{reason}","{new_date}","{new_time}","{checkinTime}"];

  const labels = {
    confirm:               "Confirmation → student",
    update:                "Update → student",
    cancel:                "Cancellation → student",
    reschedule:            "Reschedule → student",
    reminder:              "Reminder → student",
    instructor_assign:     "Assignment → instructor",
    instructor_cancel:     "Cancellation → instructor",
    instructor_reschedule: "Reschedule → instructor",
    checkin:               "Check-in reminder → student",
    checkin_instructor:    "Check-in reminder → instructor",
  };

  return (
    <div className="space-y-4">

const LESSON_TYPES = [
  { code: "GK",    label: "GK – Grundkurs / Basic Course" },
  { code: "KC",    label: "KC – Kitecamp" },
  { code: "AK",    label: "AK – Aufbaukurs / Advanced" },
  { code: "SCH",   label: "SCH – Trial / Schnupperkurs" },
  { code: "IT",    label: "IT – Individual Training" },
  { code: "KK",    label: "KK – Kids IT" },
  { code: "WAVES", label: "WAVES – Intro Kitesurfing Waves" },
  { code: "WF-BC", label: "WF-BC – Wingfoil Basic" },
  { code: "WF-C",  label: "WF-C – Wingfoil Camp" },
  { code: "WF-IT", label: "WF-IT – Wingfoil IT" },
];

// ---------- Salary: course-based commission rates ----------
// Hard-coded fallback defaults (overridden by state.settings.courseRates)
const COURSE_RATES_DEFAULT = {
  "GK":    25, "KC":    25, "AK":    25, "SCH":   25, // group kite
  "IT":    30, "KK":    30,                            // private / kids private
  "DIT":   35,                                         // Doppel-IT (2 kites)
  "WF-BC": 35, "WF-C":  35, "WF-IT": 35,              // wingfoil
  "WAVES": 25,                                         // intro kitesurfing waves (group rate)
};

// Get the commission rate for a lesson given its student list
// courseRates = state.settings.courseRates (live, editable); fallbackRate = instructor's own hourRate
function lessonCommissionRate(lesson, students, courseRates, fallbackRate) {
  const stu = (students||[]).find(s => s.id === lesson.studentId);
  const rates = courseRates || COURSE_RATES_DEFAULT;
  // lesson.lessonType overrides the student's course (set when adding a lesson manually)
  const courseKey = lesson.lessonType || stu?.course;
  return rates[courseKey] ?? fallbackRate ?? 0;
}

// Salary earned from a single completed lesson (kept for reference; use slot helpers below for totals)
function lessonSalaryEarned(lesson, students, courseRates, fallbackRate) {
  if (lesson.status !== "completed") return 0;
  const actualH = +(lesson.actualHours ?? lesson.hours) || 0;
  const rate    = lessonCommissionRate(lesson, students, courseRates, fallbackRate);
  return actualH * rate;
}

// Group an instructor's lessons by slot (date+startTime) — concurrent group lessons become one slot
function groupLessonsBySlot(iLessons) {
  const map = {};
  (iLessons || []).forEach(l => {
    const key = `${l.date}|${l.startTime}`;
    if (!map[key]) map[key] = [];
    map[key].push(l);
  });
  return Object.values(map);
}

// Hours earned for a slot (deduped — group of 3 students at 9-10 = 1 h, not 3 h)
function slotActualHours(slot) {
  const completed = slot.filter(l => l.status === "completed");
  if (!completed.length) return 0;
  return Math.max(...completed.map(l => +(l.actualHours ?? l.hours) || 0));
}

// Pay earned for a slot — hours × rate (Doppel-IT auto-detected when 2+ IT students share a slot)
function slotSalaryEarned(slot, students, courseRates, fallbackRate) {
  const completed = slot.filter(l => l.status === "completed");
  if (!completed.length) return 0;
  const hours = slotActualHours(slot);
  const rates = courseRates || COURSE_RATES_DEFAULT;
  // Use ALL slot lessons (not just completed) to detect DIT — if 2 IT students share the slot
  // the instructor earns DIT rate even if one lesson is still "scheduled"
  const itAll = slot.filter(l => { const stu=(students||[]).find(s=>s.id===l.studentId); return stu?.course==="IT"||stu?.course==="KK"; });
  const wfItAll = slot.filter(l => { const stu=(students||[]).find(s=>s.id===l.studentId); return stu?.course==="WF-IT"; });
  let rate;
  if (itAll.length >= 2) {
    rate = rates["DIT"] ?? fallbackRate ?? 0;
  } else if (wfItAll.length >= 2) {
    rate = rates["WF-DIT"] ?? rates["DIT"] ?? fallbackRate ?? 0;
  } else {
    rate = Math.max(...completed.map(l => lessonCommissionRate(l, students, courseRates, fallbackRate)));
  }
  return hours * rate;
}

// Total slot-deduped actual hours for an instructor's lesson list
function totalSlotHours(iLessons) {
  return groupLessonsBySlot(iLessons).reduce((s, slot) => s + slotActualHours(slot), 0);
}

// Total slot-deduped salary for an instructor's lesson list
function totalSlotSalary(iLessons, students, courseRates, fallbackRate) {
  return groupLessonsBySlot(iLessons).reduce((s, slot) => s + slotSalaryEarned(slot, students, courseRates, fallbackRate), 0);
}

// Slot-deduped planned hours (non-cancelled, max duration per concurrent slot)
function totalSlotPlannedHours(iLessons) {
  return groupLessonsBySlot(iLessons).reduce((s, slot) => {
    const active = slot.filter(l => l.status !== "cancelled");
    if (!active.length) return s;
    return s + Math.max(...active.map(l => +l.hours || 0));
  }, 0);
}

// Group lessons by instructor+slot — for school-wide views where different instructors
// may run parallel sessions that should each count independently
function groupLessonsByInstructorSlot(lessons) {
  const map = {};
  (lessons || []).forEach(l => {
    const key = `${l.instructorId||""}|${l.date}|${l.startTime}`;
    if (!map[key]) map[key] = [];
    map[key].push(l);
  });
  return Object.values(map);
}

function schoolTotalSlotHours(lessons) {
  return groupLessonsByInstructorSlot(lessons).reduce((s, slot) => s + slotActualHours(slot), 0);
}

function schoolTotalSlotPlannedHours(lessons) {
  return groupLessonsByInstructorSlot(lessons).reduce((s, slot) => {
    const active = slot.filter(l => l.status !== "cancelled");
    if (!active.length) return s;
    return s + Math.max(...active.map(l => +l.hours || 0));
  }, 0);
}

    const aoa = [
      [`TJKite – Provisionsliste — ${periodLabel}`],

    ws['!cols'] = [26, 14, 14].map(w=>({wch:w}));

    XLSX.utils.book_append_sheet(wb, ws, "Provisionsliste");
