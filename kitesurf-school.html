function fmtEUR(n) {
  if (n == null || isNaN(n)) return "—";
  return Number(n).toFixed(2).replace(".", ",") + "€";
}
function fmtDateDe(iso) {
  if (!iso) return "";
  const [y,m,d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function nextVoucherNo(state) {
  // Format: NL2-#### where #### is a 4-digit running counter.
  // Always take the max of: the persisted settings counter AND the highest number
  // already recorded in state.vouchers — so the next number is always +1 to the last issued.
  const fromSettings = state.settings.voucherCounter ?? 3493;
  const fromIssued = (state.vouchers || []).reduce((max, v) => {
    const m = String(v.no).match(/NL2-(\d+)$/);
    return m ? Math.max(max, parseInt(m[1], 10)) : max;
  }, 0);
  const counter = Math.max(fromSettings, fromIssued) + 1;
  return { no: `NL2-${counter}`, counter };
}

function VoucherPreview({ data, fields, highlight, editMode, onFieldUpdate }) {
  // Render the background image with absolutely positioned overlay text.
  // Font sizes scale with the actual rendered container width to match PDF proportions.
  // In editMode, fields are draggable to reposition them.
  const containerRef = React.useRef(null);
  const [containerW, setContainerW] = React.useState(600);
  const [dragging, setDragging] = React.useState(null); // { key, startX, startY, origX, origY }

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setContainerW(e.contentRect.width);
    });
    ro.observe(el);
    setContainerW(el.getBoundingClientRect().width);
    return () => ro.disconnect();
  }, []);

  const handleMouseDown = (key, e) => {
    if (!editMode) return;
    e.preventDefault();
    const f = fields[key];
    setDragging({ key, startX: e.clientX, startY: e.clientY, origX: f.x, origY: f.y });
  };

  const handleMouseMove = (e) => {
    if (!dragging || !containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const dx = (e.clientX - dragging.startX) / rect.width;
    const dy = (e.clientY - dragging.startY) / rect.height;
    const newX = Math.max(0, Math.min(0.95, dragging.origX + dx));
    const newY = Math.max(0, Math.min(0.95, dragging.origY + dy));
    onFieldUpdate(dragging.key, "x", +newX.toFixed(4));
    onFieldUpdate(dragging.key, "y", +newY.toFixed(4));
  };

  const handleMouseUp = () => setDragging(null);

  // Scale fontPt (PDF points on 297mm A4 landscape ≈ 841pt wide) to preview px.
  const ptToPx = (pt) => Math.max(7, pt / 841 * containerW);

  return (
    <div ref={containerRef}
         className="relative w-full max-w-3xl mx-auto rounded-md overflow-hidden shadow ring-1 ring-slate-200"
         style={{ aspectRatio: "2500 / 1736", cursor: dragging ? "grabbing" : "default" }}
         onMouseMove={handleMouseMove}
         onMouseUp={handleMouseUp}
         onMouseLeave={handleMouseUp}>
      <img src={VOUCHER_BG} alt="" className="absolute inset-0 w-full h-full" draggable={false} />
      {Object.entries(fields).map(([key, f]) => {
        const value = data[key] ?? "";
        const isHi = highlight === key || (dragging && dragging.key === key);
        return (
          <div key={key}
               title={editMode ? (VOUCHER_FIELD_LABELS[key] + " — drag to reposition") : undefined}
               onMouseDown={editMode ? (e) => handleMouseDown(key, e) : undefined}
               style={{
                 position: "absolute",
                 left:   (f.x * 100) + "%",
                 top:    (f.y * 100) + "%",
                 width:  (f.w * 100) + "%",
                 height: (f.h * 100) + "%",
                 fontSize: ptToPx(f.fontPt) + "px",
                 fontWeight: f.weight === "bold" ? 700 : 500,
                 color: `rgb(${f.color.join(",")})`,
                 display: "flex",
                 alignItems: "center",
                 justifyContent: f.align === "center" ? "center" : (f.align === "right" ? "flex-end" : "flex-start"),
                 textAlign: f.align,
                 padding: "0 4px",
                 lineHeight: 1.1,
                 whiteSpace: "nowrap",
                 overflow: "hidden",
                 outline: isHi
                   ? "2px dashed #0ea5e9"
                   : editMode ? "1px dashed rgba(14,165,233,0.45)" : "none",
                 background: isHi ? "rgba(14,165,233,0.08)" : "transparent",
                 cursor: editMode ? (dragging?.key === key ? "grabbing" : "grab") : "default",
                 userSelect: "none"
               }}>
            {value}
          </div>
        );
      })}
    </div>
  );
}

async function loadImageDataURL(src) {
  const r = await fetch(src);
  if (!r.ok) throw new Error("Voucher background load failed: " + r.status);
  const blob = await r.blob();
  return await new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });
}

async function exportVoucherPDF(data, fields) {
  const { jsPDF } = window.jspdf;
  // A4 landscape: 297 × 210 mm. Image aspect 1.44, A4 landscape aspect 1.414.
  // We fit the image full-bleed and accept ~2% letterboxing top/bottom.
  const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
  const pageW = 297, pageH = 210;
  const imgAspect = 2500 / 1736;
  // Fit to width, center vertically.
  const imgW = pageW;
  const imgH = pageW / imgAspect;
  const imgX = 0;
  const imgY = (pageH - imgH) / 2;

  const dataUrl = await loadImageDataURL(VOUCHER_BG);
  doc.addImage(dataUrl, "JPEG", imgX, imgY, imgW, imgH);

  for (const [key, f] of Object.entries(fields)) {
    const value = data[key];
    if (!value) continue;
    const x = imgX + f.x * imgW;
    const y = imgY + f.y * imgH;
    const w = f.w * imgW;
    const h = f.h * imgH;
    doc.setFont("helvetica", f.weight === "bold" ? "bold" : "normal");
    doc.setFontSize(f.fontPt);
    doc.setTextColor(f.color[0], f.color[1], f.color[2]);
    let tx = x;
    if (f.align === "center") tx = x + w / 2;
    else if (f.align === "right") tx = x + w;
    // Vertically center: text baseline at y + h/2 + fontPt*0.35 (rough).
    const ty = y + h / 2 + (f.fontPt * 0.352778) / 2 * 0.7;
    doc.text(String(value), tx, ty, { align: f.align, baseline: "middle" });
  }

  const safeName = (data.name || "voucher").replace(/[^\w\-]+/g, "_");
  doc.save(`${data.voucherNo || "voucher"}_${safeName}.pdf`);
}

// Persist a settings patch directly to localStorage (counter + field positions).
function persistSettings(patch) {
  try {
    const raw = localStorage.getItem(LS_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    parsed.settings = { ...(parsed.settings || {}), ...patch };
    localStorage.setItem(LS_KEY, JSON.stringify(parsed));
  } catch {}
}

function VoucherTab({ state, addVoucher }) {
  const [studentId, setStudentId] = useState(state.students[0]?.id || "");
  const [presetId, setPresetId]   = useState("HOURS");
  const [amount, setAmount]       = useState(0);
  const [serviceLabel, setServiceLabel] = useState("");
  const [date, setDate]           = useState(todayISO());
  const [voucherNo, setVoucherNo] = useState(() => nextVoucherNo(state).no);
  const [counter, setCounter]     = useState(() => nextVoucherNo(state).counter);
  const [customName, setCustomName] = useState("");
  const [hoursBase,   setHoursBase]   = useState("GK");
  const [hoursQty,    setHoursQty]    = useState(1);
  const [numPeople,   setNumPeople]   = useState(1);
  const [itSport,     setItSport]     = useState("kite");     // "kite" | "wingfoil"
  const [itEquip,     setItEquip]     = useState("single");   // "single" | "double"

  // Per-field positions, persisted in settings.voucherFields.
  // voucherFieldsV=2 — bump this to force-reset stale saved positions.
  const FIELDS_VERSION = 2;
  const [fields, setFields] = useState(() => {
    const saved = state.settings.voucherFields;
    if (!saved || state.settings.voucherFieldsV !== FIELDS_VERSION) return VOUCHER_FIELDS_DEFAULT;
    // Merge defaults so newly added fields don't go missing if saved data is older.
    const merged = {};
    for (const k of Object.keys(VOUCHER_FIELDS_DEFAULT)) {
      merged[k] = { ...VOUCHER_FIELDS_DEFAULT[k], ...(saved[k] || {}) };
    }
    return merged;
  });
  const [editPositions, setEditPositions] = useState(false);
  const [hover, setHover] = useState(null);

  useEffect(() => {
    if (presetId === "CUSTOM" || presetId === "HOURS" || presetId === "IT") return;
    const p = VOUCHER_PRESETS.find(x => x.id === presetId);
    if (!p) return;
    setServiceLabel(p.label);
    setAmount(p.price);
  }, [presetId]);

  // When HOURS mode is activated or student changes: auto-detect course, group size, hours left
  useEffect(() => {
    if (presetId !== "HOURS") return;
    const stu = state.students.find(s => s.id === studentId);
    if (!stu || !stu.course) return;

    // Only count lessons that belong to this student's current course
    const courseCode = stu.course;
    const allStuLessons = (state.lessons || []).filter(l => l.studentId === studentId && l.status !== 'cancelled');
    const stuLessons = allStuLessons.filter(l =>
      l.lessonType === courseCode ||
      l.tjkiteImportKey?.split('|').slice(-2, -1)[0] === courseCode
    );

    // Detect group size: largest group this student was in (for this course)
    const groupIds = [...new Set(stuLessons.filter(l => l.groupId).map(l => l.groupId))];
    let detectedGroup = 1;
    if (groupIds.length > 0) {
      const sizes = groupIds.map(gid => {
        const members = new Set((state.lessons || []).filter(l => l.groupId === gid).map(l => l.studentId));
        return members.size;
      });
      detectedGroup = Math.max(...sizes);
    }

    // Booked = group-adjusted total hours (not the solo hoursBooked field)
    const totalBooked = getTotalCourseHours(courseCode, detectedGroup);
    const hoursDone   = stuLessons.reduce((sum, l) => sum + (+l.hours || 0), 0);
    const rawLeft     = Math.max(0, totalBooked - hoursDone);
    const hoursLeft   = Math.round(rawLeft * 2) / 2; // snap to 0.5h

    // Match to COURSE_PRICE_DEFAULTS (prefer sparpreis match if relevant)
    const preset = COURSE_PRICE_DEFAULTS.find(p => p.code === stu.course && !!p.sparpreis === !!stu.sparpreis)
                || COURSE_PRICE_DEFAULTS.find(p => p.code === stu.course);

    setHoursBase(preset?.id || "GK");
    setNumPeople(detectedGroup);
    setHoursQty(hoursLeft > 0 ? hoursLeft : 0.5);
  }, [presetId, studentId]);

  // Recalculate amount + label whenever base / people / hours / student changes
  useEffect(() => {
    if (presetId !== "HOURS") return;
    const base = COURSE_PRICE_DEFAULTS.find(p => p.id === hoursBase);
    if (!base || !base.price) return;

    // Rate = what one person paid ÷ total instructor hours for that group size
    // e.g. GK 3 people: €319 / 7.5h = €42.53/h
    const perPersonPrice   = base.price;
    const totalCourseHours = getTotalCourseHours(base.code, numPeople);
    const ratePerHour      = totalCourseHours > 0 ? perPersonPrice / totalCourseHours : 0;
    const totalPrice       = parseFloat((ratePerHour * hoursQty).toFixed(2));
    const pplLabel = numPeople > 1 ? `, ${numPeople} people` : '';

    setAmount(totalPrice);
    setServiceLabel(`${base.code} ${hoursQty}h`);
  }, [presetId, hoursBase, hoursQty, numPeople, studentId]);

  // IT mode: table lookup (non-linear pricing per sport / equip / hours)
  useEffect(() => {
    if (presetId !== "IT") return;
    const hrs = hoursQty;
    const price = IT_RATES[itSport]?.[itEquip]?.[hrs] ?? 0;
    setAmount(price);
    const sportLabel = itSport === "wingfoil" ? "Wingfoil" : "Kite";
    const groupLabel = itEquip === "double" ? " Doppel-IT" : " IT";
    const hrsLabel = hrs === 0.5 ? "½" : hrs;
    setServiceLabel(`${sportLabel}${groupLabel} ${hrsLabel}h`);
  }, [presetId, itSport, itEquip, hoursQty]);

  const student = state.students.find(s => s.id === studentId);
  const recipient = customName.trim() || student?.name || "";

  const data = {
    voucherNo,
    amount: fmtEUR(amount),
    name: recipient,
    service: serviceLabel,
    date: fmtDateDe(date)
  };

  const updateField = (key, prop, value) => {
    setFields(prev => {
      const next = { ...prev, [key]: { ...prev[key], [prop]: value } };
      persistSettings({ voucherFields: next, voucherFieldsV: FIELDS_VERSION });
      return next;
    });
  };

  const resetPositions = () => {
    setFields(VOUCHER_FIELDS_DEFAULT);
    persistSettings({ voucherFields: VOUCHER_FIELDS_DEFAULT, voucherFieldsV: FIELDS_VERSION });
  };

  // Advance the voucher number to issuedNo + 1, updating the counter to match.
  const bumpVoucherNo = (issuedNo) => {
    const m = String(issuedNo).match(/NL2-(\d+)$/);
    const next = m ? parseInt(m[1], 10) + 1 : counter + 1;
    setCounter(next);
    setVoucherNo(`NL2-${next}`);
    persistSettings({ voucherCounter: next - 1 });
  };

  const checkVoucherConflict = () => {
    const existing = (state.vouchers || []).find(v => v.no === voucherNo);
    if (existing && existing.recipientName !== recipient) {
      alert(`Voucher ${voucherNo} was already issued to ${existing.recipientName}.\n\nTo reprint, change the recipient back to "${existing.recipientName}", or enter a different voucher number.`);
      return false;
    }
    return true;
  };

  const recordVoucher = () => {
    // Only record if not already stored (reprint = skip)
    const already = (state.vouchers || []).some(v => v.no === voucherNo && v.recipientName === recipient);
    if (!already) {
      addVoucher({ no: voucherNo, recipientName: recipient, studentId: studentId || null, service: serviceLabel, amount, date, issuedAt: new Date().toISOString() });
    }
  };

  const issue = async () => {
    if (!recipient) { alert("Pick a student or type a name first."); return; }
    if (!checkVoucherConflict()) return;
    const issued = voucherNo;
    await exportVoucherPDF(data, fields);
    recordVoucher();
    bumpVoucherNo(issued);
  };

  const send = async () => {
    if (!recipient) { alert("Pick a student or type a name first."); return; }
    if (!checkVoucherConflict()) return;
    const issued = voucherNo;
    // 1. Generate & download the PDF so it's ready to attach
    await exportVoucherPDF(data, fields);
    recordVoucher();
    bumpVoucherNo(issued);
    // 2. Open a pre-filled email draft (to TJKite inbox for now — forward to student manually)
    const TJKITE_EMAIL = "info@example.com";
    const subject = encodeURIComponent(`Ihr TJKite Gutschein ${voucherNo} – ${data.service}`);
    const body = encodeURIComponent(
`Hallo ${recipient},

vielen Dank für Ihre Buchung bei TJKite!

Im Anhang finden Sie Ihren Gutschein (${voucherNo}) über ${data.amount} für: ${data.service}.

Wir freuen uns auf Sie!

Mit freundlichen Grüßen
TJKite
info@example.com`
    );
    const mailto = `mailto:${TJKITE_EMAIL}?subject=${subject}&body=${body}`;
    window.open(mailto, "_blank");
  };

  return (
    <section className="bg-white rounded-2xl shadow-sm p-4 md:p-6 space-y-5">
      <div className="flex flex-wrap items-center gap-3">
        <h2 className="text-lg font-semibold">Voucher</h2>
        <span className="text-xs text-slate-500">Issues a TJKite voucher PDF for a student.</span>
      </div>

      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div className="space-y-3">
          <div>
            <label className="text-xs font-medium text-slate-600">Student</label>
            <SearchableStudentSelect students={state.students} value={studentId} onChange={setStudentId} showLevel={true} className="w-full mt-0.5" />
          </div>
          <div>
            <label className="text-xs font-medium text-slate-600">Override name (optional)</label>
            <input className="w-full px-3 py-2 rounded-md border border-slate-200"
                   placeholder="leave blank to use student name"
                   value={customName} onChange={e=>setCustomName(e.target.value)} />
          </div>
          <div>
            <label className="text-xs font-medium text-slate-600">Service / Leistung</label>
            <select className="w-full px-3 py-2 rounded-md border border-slate-200"
                    value={presetId} onChange={e=>setPresetId(e.target.value)}>
              {(() => {
                const groups = [...new Set(VOUCHER_PRESETS.map(p => p.group))];
                return groups.map(g => (
                  <optgroup key={g} label={g}>
                    {VOUCHER_PRESETS.filter(p => p.group === g).map(p =>
                      <option key={p.id} value={p.id}>
                        {p.label}{p.price ? "  —  " + fmtEUR(p.price) : ""}
                      </option>
                    )}
                  </optgroup>
                ));
              })()}
            </select>
          </div>
          {presetId === "CUSTOM" && (
            <div>
              <label className="text-xs font-medium text-slate-600">Custom service label</label>
              <input className="w-full px-3 py-2 rounded-md border border-slate-200"
                     value={serviceLabel} onChange={e=>setServiceLabel(e.target.value)} />
            </div>
          )}
          {presetId === "IT" && (() => {
            const hrs   = hoursQty;
            const price = IT_RATES[itSport]?.[itEquip]?.[hrs] ?? 0;
            const btnBase = "flex-1 py-1.5 rounded text-xs font-medium transition border";
            const btnOn   = "bg-sky-500 text-white border-sky-500";
            const btnOff  = "bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
            return (
              <div className="space-y-2 bg-amber-50 border border-amber-100 rounded-lg p-3">
                {/* Sport toggle */}
                <div>
                  <label className="text-[11px] font-medium text-slate-500">Sport</label>
                  <div className="flex gap-1.5 mt-0.5">
                    <button className={`${btnBase} ${itSport==="kite" ? btnOn : btnOff}`}
                            onClick={()=>setItSport("kite")}>🪁 Kite</button>
                    <button className={`${btnBase} ${itSport==="wingfoil" ? btnOn : btnOff}`}
                            onClick={()=>setItSport("wingfoil")}>🏄 Wingfoil</button>
                  </div>
                </div>
                {/* Group toggle */}
                <div>
                  <label className="text-[11px] font-medium text-slate-500">Equipment</label>
                  <div className="flex gap-1.5 mt-0.5">
                    <button className={`${btnBase} ${itEquip==="single" ? btnOn : btnOff}`}
                            onClick={()=>setItEquip("single")}>1 Equipment (IT)</button>
                    <button className={`${btnBase} ${itEquip==="double" ? btnOn : btnOff}`}
                            onClick={()=>setItEquip("double")}>2 Equipment (Doppel-IT)</button>
                  </div>
                </div>
                {/* Hours picker */}
                <div>
                  <label className="text-[11px] font-medium text-slate-500">Hours</label>
                  <select className="w-full mt-0.5 px-2 py-1.5 rounded border border-slate-200 text-xs bg-white"
                          value={hrs} onChange={e=>setHoursQty(+e.target.value)}>
                    {[0.5,1,2,3,4,5,6].map(h => {
                      const p = IT_RATES[itSport]?.[itEquip]?.[h] ?? 0;
                      const label = h === 0.5 ? "½ h" : `${h} h`;
                      return <option key={h} value={h}>{label} — €{p}</option>;
                    })}
                  </select>
                </div>
                <div className="text-xs text-amber-800 font-semibold pt-0.5">
                  Total: €{price}
                </div>
              </div>
            );
          })()}
          {presetId === "HOURS" && (() => {
            const stu           = state.students.find(s => s.id === studentId);
            const base          = COURSE_PRICE_DEFAULTS.find(p => p.id === hoursBase);
            const totalH        = base ? getTotalCourseHours(base.code, numPeople) : null;
            const perPersonPrice= base?.price || 0; // always use preset price (assume full payment)
            const rph           = totalH && perPersonPrice ? perPersonPrice / totalH : null;
            const maxH          = totalH || 6;
            const hSteps        = [];
            for (let h = 0.5; h <= maxH + 0.001; h += 0.5) hSteps.push(Math.round(h * 2) / 2);

            // Hours breakdown: filter to this course only, use group-adjusted total as "booked"
            const stuCourse   = stu?.course;
            const courseLessons = stu ? (state.lessons || []).filter(l =>
              l.studentId === stu.id && l.status !== 'cancelled' &&
              (l.lessonType === stuCourse || l.tjkiteImportKey?.split('|').slice(-2,-1)[0] === stuCourse)
            ) : [];
            const hoursDone   = courseLessons.reduce((s, l) => s + (+l.hours || 0), 0);
            const hoursBooked = totalH || 0; // group-adjusted total, not solo hoursBooked
            const hoursLeft   = Math.max(0, Math.round((hoursBooked - hoursDone) * 2) / 2);

            return (
              <div className="space-y-2 bg-sky-50 border border-sky-100 rounded-lg p-3">

                {/* Student hours summary */}
                {stu && stu.course ? (
                  <div className="bg-white border border-sky-200 rounded-lg p-2.5 text-xs space-y-1">
                    <div className="font-semibold text-sky-800 mb-1">{stu.name} · {stu.course}</div>
                    <div className="grid grid-cols-3 gap-1 text-center">
                      <div className="bg-slate-50 rounded px-1 py-1">
                        <div className="text-[10px] text-slate-400">Booked</div>
                        <div className="font-semibold tabular-nums">{hoursBooked} h</div>
                      </div>
                      <div className="bg-slate-50 rounded px-1 py-1">
                        <div className="text-[10px] text-slate-400">Done</div>
                        <div className="font-semibold tabular-nums text-slate-600">{Math.round(hoursDone * 10) / 10} h</div>
                      </div>
                      <div className={classNames("rounded px-1 py-1", hoursLeft > 0 ? "bg-amber-50" : "bg-emerald-50")}>
                        <div className="text-[10px] text-slate-400">Left</div>
                        <div className={classNames("font-semibold tabular-nums", hoursLeft > 0 ? "text-amber-700" : "text-emerald-600")}>{hoursLeft} h</div>
                      </div>
                    </div>
                    {rph && (
                      <div className="text-[10px] text-sky-700 pt-0.5">
                        {numPeople > 1 ? `${numPeople} people · ` : ''}{base.code} · {totalH} h total · €{perPersonPrice} ÷ {totalH} h = €{rph ? rph.toFixed(2) : '—'}/h
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="text-xs text-slate-400 italic">Select a student above to auto-fill hours and rate.</div>
                )}

                {/* Overrides */}
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="text-[11px] font-medium text-slate-500">Group size</label>
                    <select className="w-full mt-0.5 px-2 py-1.5 rounded border border-slate-200 text-xs bg-white"
                            value={numPeople} onChange={e=>setNumPeople(+e.target.value)}>
                      {[1,2,3,4,5,6].map(n => <option key={n} value={n}>{n} {n===1?'person':'people'}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="text-[11px] font-medium text-slate-500">Course / rate</label>
                    <select className="w-full mt-0.5 px-2 py-1.5 rounded border border-slate-200 text-xs bg-white"
                            value={hoursBase} onChange={e=>setHoursBase(e.target.value)}>
                      {COURSE_PRICE_DEFAULTS.filter(p => p.price > 0).map(p => (
                        <option key={p.id} value={p.id}>{p.id} — €{p.price}</option>
                      ))}
                    </select>
                  </div>
                </div>
                <div>
                  <label className="text-[11px] font-medium text-slate-500">Hours to issue</label>
                  <select className="w-full mt-0.5 px-2 py-1.5 rounded border border-slate-200 text-xs bg-white"
                          value={hoursQty} onChange={e=>setHoursQty(+e.target.value)}>
                    {hSteps.map(h => {
                      const isLeft = h === hoursLeft;
                      return (
                        <option key={h} value={h}>
                          {h} h{rph ? ` — €${(rph * h).toFixed(2)}` : ''}{isLeft ? ' ← remaining' : ''}
                        </option>
                      );
                    })}
                  </select>
                </div>
              </div>
            );
          })()}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs font-medium text-slate-600">Amount (EUR)</label>
              <input type="number" step="0.01" min="0"
                     className="w-full px-3 py-2 rounded-md border border-slate-200"
                     value={amount} onChange={e=>setAmount(+e.target.value)} />
            </div>
            <div>
              <label className="text-xs font-medium text-slate-600">Issue date</label>
              <input type="date"
                     className="w-full px-3 py-2 rounded-md border border-slate-200"
                     value={date} onChange={e=>setDate(e.target.value)} />
            </div>
          </div>
          <div>
            <label className="text-xs font-medium text-slate-600">Voucher number</label>
            <input className="w-full px-3 py-2 rounded-md border border-slate-200 tabular-nums"
                   value={voucherNo} onChange={e=>setVoucherNo(e.target.value)} />
            <div className="text-[11px] text-slate-400 mt-1">Auto-increments after each issue. Edit if you need a specific number.</div>
          </div>
          <div className="flex gap-2 pt-2 flex-wrap">
            <button className="px-4 py-2 rounded-md btn-primary font-medium" onClick={issue}>
              Issue voucher (PDF)
            </button>
            <button className="px-4 py-2 rounded-md font-medium bg-emerald-600 hover:bg-emerald-700 text-white text-sm flex items-center gap-1.5"
                    onClick={send} title="Save PDF + open email draft to student">
              📧 Send
            </button>
            <button className="px-3 py-2 rounded-md btn-ghost text-slate-700 text-sm border border-slate-200"
                    onClick={()=>setEditPositions(v=>!v)}>
              {editPositions ? "Done editing positions" : "Edit field positions"}
            </button>
          </div>
          <p className="text-[11px] text-slate-400">📧 Send saves the PDF and opens a draft to brouwersdam@kiteboarding-club.com — attach the PDF and forward to the student.</p>
        </div>

        <div>
          <div className="text-xs font-medium text-slate-600 mb-2">Preview</div>
          <VoucherPreview data={data} fields={fields} highlight={hover}
                         editMode={editPositions} onFieldUpdate={updateField} />
          <div className="text-[11px] text-slate-400 mt-2">
            {editPositions
              ? "Drag any field on the preview to reposition it. Fine-tune x/y/size in the table below."
              : 'Click "Edit field positions" to drag text fields or adjust values precisely.'}
          </div>
        </div>

        <div className="md:col-span-2 lg:col-span-1">
          <div className="text-xs font-medium text-slate-600 mb-2">Issued vouchers</div>
          {(state.vouchers || []).length === 0
            ? <p className="text-xs text-slate-400 italic">No vouchers issued yet.</p>
            : (
              <div className="overflow-y-auto max-h-96 rounded-lg border border-slate-100">
                <table className="w-full text-xs">
                  <thead className="text-slate-500 bg-slate-50 sticky top-0">
                    <tr>
                      <th className="text-left px-2 py-1.5 font-medium">№</th>
                      <th className="text-left px-2 py-1.5 font-medium">Name</th>
                      <th className="text-right px-2 py-1.5 font-medium">Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {[...(state.vouchers || [])].reverse().map((v, i) => (
                      <tr key={i} className="border-t border-slate-100 hover:bg-slate-50">
                        <td className="px-2 py-1.5 font-mono text-slate-600 whitespace-nowrap">{v.no}</td>
                        <td className="px-2 py-1.5 text-slate-700">
                          <div className="font-medium">{v.recipientName}</div>
                          <div className="text-[10px] text-slate-400">{v.service} · {fmtDateDe(v.date)}</div>
                        </td>
                        <td className="px-2 py-1.5 text-right tabular-nums text-slate-700 whitespace-nowrap">{fmtEUR(v.amount)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )
          }
        </div>
      </div>

      {editPositions && (
        <div className="border-t border-slate-200 pt-4">
          <div className="flex flex-wrap items-center gap-3 mb-3">
            <h3 className="font-semibold text-slate-700">Field positions</h3>
            <button className="text-xs px-2 py-1 rounded btn-ghost border border-slate-200"
                    onClick={resetPositions}>
              Reset to defaults
            </button>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead className="text-slate-500">
                <tr>
                  <th className="text-left px-2 py-1">Field</th>
                  <th className="px-2 py-1">x</th>
                  <th className="px-2 py-1">y</th>
                  <th className="px-2 py-1">w</th>
                  <th className="px-2 py-1">h</th>
                  <th className="px-2 py-1">font pt</th>
                  <th className="px-2 py-1">align</th>
                  <th className="px-2 py-1">weight</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(fields).map(([key, f]) =>
                  <tr key={key}
                      onMouseEnter={()=>setHover(key)} onMouseLeave={()=>setHover(null)}
                      className={classNames("hover:bg-sky-50", hover===key && "bg-sky-50")}>
                    <td className="px-2 py-1 font-medium text-slate-700">{VOUCHER_FIELD_LABELS[key]}</td>
                    {["x","y","w","h"].map(p =>
                      <td key={p} className="px-1 py-1">
                        <input type="number" step="0.005" min="0" max="1"
                          className="w-20 px-2 py-1 rounded border border-slate-200 tabular-nums"
                          value={f[p]} onChange={e=>updateField(key, p, +e.target.value)} />
                      </td>
                    )}
                    <td className="px-1 py-1">
                      <input type="number" step="1" min="6" max="72"
                        className="w-16 px-2 py-1 rounded border border-slate-200 tabular-nums"
                        value={f.fontPt} onChange={e=>updateField(key, "fontPt", +e.target.value)} />
                    </td>
                    <td className="px-1 py-1">
                      <select className="px-2 py-1 rounded border border-slate-200"
                        value={f.align} onChange={e=>updateField(key, "align", e.target.value)}>
                        <option value="left">left</option>
                        <option value="center">center</option>
                        <option value="right">right</option>
                      </select>
                    </td>
                    <td className="px-1 py-1">
                      <select className="px-2 py-1 rounded border border-slate-200"
                        value={f.weight || "normal"} onChange={e=>updateField(key, "weight", e.target.value)}>
                        <option value="normal">normal</option>
                        <option value="bold">bold</option>
                      </select>
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
          <div className="text-[11px] text-slate-400 mt-2">
            Drag fields directly on the preview, or fine-tune here. Hover a row to highlight it. x/y = top-left corner, w/h = size — all as fractions of the image (0–1).
          </div>
        </div>
      )}
    </section>
  );
}

// ---------- Students ----------
function Students({ state, hoursFor, add, upd, del, pendingStudentId, clearPendingStudent }) {
  const empty = { name:"", phone:"", email:"", level:"Beginner", language:state.settings.defaultLang,
                  course:"", packageName:"", hoursBooked:0, coursePrice:0, amountPaid:0, balanceOwed:0, notes:"" };
  const [draft, setDraft] = useState(empty);
  const [editing, setEditing] = useState(null);
  const [search, setSearch] = useState("");
  const [sortCol, setSortCol] = useState("arrival");
  const [sortDir, setSortDir] = useState("asc");

  // Deep-link: when another tab asks to "open" a student, jump straight into edit mode.
  useEffect(() => {
    if (!pendingStudentId) return;
    const s = state.students.find(x => x.id === pendingStudentId);
    if (s) { setEditing(s.id); setDraft(s); window.scrollTo({ top: 0, behavior: "smooth" }); }
    clearPendingStudent?.();
  }, [pendingStudentId]);

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir("asc"); }
  };
  const SortArrow = ({col}) => sortCol !== col
    ? <span className="opacity-30 ml-0.5">↕</span>
    : sortDir === "asc" ? <span className="ml-0.5">↑</span> : <span className="ml-0.5">↓</span>;

  const list = useMemo(()=>{
    const q = search.trim().toLowerCase();
    const filtered = state.students.filter(s => !q || `${s.name} ${s.email} ${s.phone}`.toLowerCase().includes(q));
    if (!sortCol) return filtered;
    return [...filtered].sort((a, b) => {
      let av, bv;
      if      (sortCol === "name")    { av = (a.name||"").toLowerCase();    bv = (b.name||"").toLowerCase(); }
      else if (sortCol === "level")   { av = a.level||"";                   bv = b.level||""; }
      else if (sortCol === "package") { av = (a.packageName||"").toLowerCase(); bv = (b.packageName||"").toLowerCase(); }
      else if (sortCol === "balance") { av = +a.balanceOwed||0;             bv = +b.balanceOwed||0; }
      else if (sortCol === "arrival") { av = a.arrival||"";                 bv = b.arrival||""; }
      else return 0;
      if (av < bv) return sortDir === "asc" ? -1 : 1;
      if (av > bv) return sortDir === "asc" ?  1 : -1;
      return 0;
    });
  }, [state.students, search, sortCol, sortDir]);

  const submit = () => {
    if (!draft.name.trim()) return alert("Name required");
    if (editing) { upd?.(editing, draft); setEditing(null); }
    else if (add) add(draft);
    else return;
    setDraft(empty);
  };
  const startEdit = (s) => { setEditing(s.id); setDraft(s); };

  return (
    <div className="space-y-6">
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex flex-wrap gap-2 items-center">
          <h2 className="font-semibold">{editing ? "Edit student" : "Add student"}</h2>
          {editing && <button className="text-xs text-slate-500 underline" onClick={()=>{setEditing(null); setDraft(empty);}}>cancel edit</button>}
        </div>
        <div className="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
          <Input label="Full name"   value={draft.name}        onChange={v=>setDraft({...draft, name:v})}/>
          <Input label="Phone (e.g. +34611...)" value={draft.phone} onChange={v=>setDraft({...draft, phone:v})}/>
          <Input label="Email"       value={draft.email}       onChange={v=>setDraft({...draft, email:v})}/>
          <Select label="Level"      value={draft.level}       onChange={v=>setDraft({...draft, level:v})} options={LEVELS}/>
          <div>
            <label className="text-xs text-slate-500">Quick-fill course</label>
            <select className="w-full border border-slate-200 rounded px-2 py-1 text-sm"
                    value=""
                    onChange={e => {
                      const id = e.target.value;
                      const preset = COURSE_PRICE_DEFAULTS.find(p => p.id === id);
                      if (!preset) return;
                      const paid = +draft.amountPaid || 0;
                      const bal  = Math.max(0, preset.price - paid);
                      setDraft({...draft,
                        course:       preset.code,
                        sparpreis:    !!preset.sparpreis,
                        packageName:  `TJKite · ${preset.id}`,
                        hoursBooked:  preset.hours,
                        coursePrice:  preset.price,
                        balanceOwed:  bal,
                      });
                    }}>
              <option value="">— pick to auto-fill —</option>
              {COURSE_PRICE_DEFAULTS.map(p =>
                <option key={p.id} value={p.id}>{p.label}{p.price ? ` — €${p.price}` : ""}</option>
              )}
            </select>
          </div>
          <Input label="Package / course name" value={draft.packageName} onChange={v=>setDraft({...draft, packageName:v})}/>
          <Input label="Hours booked" type="number" value={draft.hoursBooked} onChange={v=>setDraft({...draft, hoursBooked:+v||0})}/>
          <div>
            <Input label={`Course price (${state.settings.currency})`} type="number" step="0.01" value={draft.coursePrice||""}
                   onChange={v=>{ const p=+v||0; const bal=Math.max(0,p-(+draft.amountPaid||0)); setDraft({...draft, coursePrice:p, balanceOwed:bal}); }}/>
          </div>
          <div>
            <Input label={`Amount paid (${state.settings.currency})`} type="number" step="0.01" value={draft.amountPaid}
                   onChange={v=>{ const paid=+v||0; const bal=Math.max(0,(+draft.coursePrice||0)-paid); setDraft({...draft, amountPaid:paid, balanceOwed:bal}); }}/>
            {(+draft.coursePrice > 0 || +draft.amountPaid > 0) && (() => {
              const bal = (+draft.coursePrice||0) - (+draft.amountPaid||0);
              return (
                <div className={classNames("text-xs mt-1 font-medium tabular-nums",
                  bal <= 0 ? "text-emerald-600" : "text-amber-700")}>
                  {bal <= 0 ? "✓ Fully paid" : `Balance owed: ${state.settings.currency} ${bal.toFixed(2)}`}
                </div>
              );
            })()}
          </div>
          <div className="md:col-span-3">
            <label className="text-xs text-slate-500">Notes</label>
            <textarea className="w-full border rounded px-2 py-1" rows="2"
              value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})}/>
          </div>
        </div>
        <div className="mt-3 flex items-center gap-4 flex-wrap">
          {(add || editing) && (
          <button className="btn-primary px-3 py-1.5 rounded text-sm" onClick={submit}>
            {editing ? "Save changes" : "Add student"}
          </button>
          )}
          <label className="flex items-center gap-2 text-sm cursor-pointer select-none">
            <input type="checkbox" className="w-4 h-4 accent-emerald-600"
              checked={!!draft.returning}
              onChange={e=>setDraft({...draft, returning: e.target.checked})}/>
            <span className="text-slate-700">Returning guest <span className="text-slate-400 text-xs">(skips check-in)</span></span>
          </label>
        </div>
      </section>

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center mb-3 gap-2">
          <h2 className="font-semibold">Students ({list.length})</h2>
          <input className="ml-auto border rounded px-2 py-1 text-sm" placeholder="Search…"
                 value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="text-left text-slate-500 border-b text-xs">
                <th className="py-2 cursor-pointer hover:text-slate-800 select-none whitespace-nowrap" onClick={()=>toggleSort("name")}>Name <SortArrow col="name"/></th>
                <th className="cursor-pointer hover:text-slate-800 select-none whitespace-nowrap" onClick={()=>toggleSort("level")}>Level <SortArrow col="level"/></th>
                <th className="cursor-pointer hover:text-slate-800 select-none whitespace-nowrap" onClick={()=>toggleSort("package")}>Package <SortArrow col="package"/></th>
                <th className="whitespace-nowrap">Hours (actual / booked)</th>
                <th className="cursor-pointer hover:text-slate-800 select-none whitespace-nowrap" onClick={()=>toggleSort("balance")}>Balance <SortArrow col="balance"/></th>
                <th className="cursor-pointer hover:text-slate-800 select-none whitespace-nowrap" onClick={()=>toggleSort("arrival")}>Arrival <SortArrow col="arrival"/></th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {list.map(s => {
                const { actual, scheduled } = hoursFor(s.id);
                const booked = +s.hoursBooked || 0;
                const pct = booked === 0 ? 0 : Math.min(100, Math.round(actual/booked*100));
                const over = booked > 0 && actual > booked;
                return (
                  <tr key={s.id} className="border-b last:border-0 align-top">
                    <td className="py-2">
                      <div className="font-medium flex items-center gap-1.5">
                        {s.name}
                        {s.returning && <span className="text-[10px] bg-emerald-100 text-emerald-700 rounded px-1 py-0.5 font-normal">returning</span>}
                      </div>
                      <div className="text-xs text-slate-500">{s.phone}{s.email && ` · ${s.email}`}</div>
                    </td>
                    <td><span className="chip bg-slate-100 text-slate-700">{s.level}</span></td>
                    <td>{s.packageName}</td>
                    <td className="min-w-[180px]">
                      <div className="flex items-center gap-2 text-xs tabular-nums">
                        <span>{actual} / {booked}h</span>
                        {scheduled>0 && <span className="text-slate-400">(+{scheduled} scheduled)</span>}
                      </div>
                      <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden mt-1">
                        <div className={classNames("h-full progress-bar", over && "over")} style={{ width: `${over?100:pct}%` }} />
                      </div>
                    </td>
                    <td>
                      <span className={classNames("chip", s.balanceOwed>0 ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700")}>
                        {s.balanceOwed>0 ? `Owes ${s.balanceOwed} ${state.settings.currency}` : "Paid"}
                      </span>
                    </td>
                    <td className="text-xs tabular-nums whitespace-nowrap text-slate-600">
                      {s.arrival ? (
                        <span>{s.arrival}{s.departure && s.departure !== s.arrival ? <span className="text-slate-400"> → {s.departure}</span> : null}</span>
                      ) : "—"}
                    </td>
                    <td className="text-right whitespace-nowrap">
                      <button className="text-xs px-2 py-1 rounded btn-ghost" onClick={()=>{ startEdit(s); window.scrollTo({ top: 0, behavior: "smooth" }); }}>Edit</button>
                      <button className="text-xs px-2 py-1 rounded text-rose-600 hover:bg-rose-50"
                              onClick={()=>confirm(`Delete ${s.name}?`) && del(s.id)}>Delete</button>
                    </td>
                  </tr>
                );
              })}
              {list.length===0 && <tr><td colSpan="7" className="py-3 text-center text-slate-500">No students.</td></tr>}
            </tbody>
          </table>
        </div>
      </section>

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <h2 className="font-semibold mb-3">Lesson history per student</h2>
        <div className="space-y-2">
          {list.map(s => {
            const ls = state.lessons.filter(l => l.studentId===s.id)
                        .sort((a,b)=>(b.date+b.startTime).localeCompare(a.date+a.startTime));
            return (
              <details key={s.id} className="border rounded">
                <summary className="px-3 py-2 flex items-center text-sm">
                  <span className="font-medium">{s.name}</span>
                  <span className="ml-2 text-slate-500">({ls.length} lessons)</span>
                  <span className="ml-auto text-slate-400">click to expand</span>
                </summary>
                <div className="p-3 border-t bg-slate-50">
                  {ls.length===0
                    ? <div className="text-xs text-slate-500">No lessons yet.</div>
                    : <table className="w-full text-xs">
                        <thead className="text-slate-500"><tr><th className="text-left py-1">Date</th><th>Time</th><th>Hours</th><th>Instructor</th><th>Status</th><th>Notes</th></tr></thead>
                        <tbody>
                          {ls.map(l => {
                            const ins = state.instructors.find(i=>i.id===l.instructorId);
                            return (
                              <tr key={l.id} className="border-t border-white">
                                <td className="py-1">{l.date}</td><td>{l.startTime}</td><td>{l.hours}</td>
                                <td>{ins?.name||"Unassigned"}</td>
                                <td><span className={classNames("chip", statusChip(l.status))}>{l.status}</span></td>
                                <td className="text-slate-500">{l.notes}</td>
                              </tr>);
                          })}
                        </tbody>
                      </table>}
                </div>
              </details>
            );
          })}
        </div>
      </section>
    </div>
  );
}

const statusChip = (s) => s==="completed" ? "bg-emerald-100 text-emerald-700"
                       : s==="cancelled" ? "bg-rose-100 text-rose-700"
                       : "bg-sky-100 text-sky-700";

// ---------- Instructors ----------
function Instructors({ state, add, upd, del }) {
  const empty = { name:"", phone:"", email:"", languages:["en"], notes:"" };
  const [draft, setDraft] = useState(empty);
  const [editing, setEditing] = useState(null);

  const submit = () => {
    if (!draft.name.trim()) return alert("Name required");
    if (editing) { upd(editing, draft); setEditing(null); }
    else add(draft);
    setDraft(empty);
  };
  const toggleLang = (code) => {
    const has = draft.languages.includes(code);
    setDraft({...draft, languages: has ? draft.languages.filter(c=>c!==code) : [...draft.languages, code] });
  };

  return (
    <div className="space-y-6">
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex gap-2 items-center">
          <h2 className="font-semibold">{editing ? "Edit instructor" : "Add instructor"}</h2>
          {editing && <button className="text-xs text-slate-500 underline" onClick={()=>{setEditing(null); setDraft(empty);}}>cancel edit</button>}
        </div>
        <div className="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
          <Input label="Name"  value={draft.name}  onChange={v=>setDraft({...draft, name:v})}/>
          <Input label="Phone" value={draft.phone} onChange={v=>setDraft({...draft, phone:v})}/>
          <Input label="Email" value={draft.email} onChange={v=>setDraft({...draft, email:v})}/>
          <div>
            <Input label="Login PIN (for instructor login)" type="password" value={draft.pin||""}
                   onChange={v=>setDraft({...draft, pin:v})}/>
            <p className="text-[11px] text-slate-400 mt-0.5">Default PIN is 1234 if left blank.</p>
          </div>
          <Input label="Hourly rate (€/h)" type="number" min="0" step="1" value={draft.hourRate||""}
                 onChange={v=>setDraft({...draft, hourRate: +v||0})}/>
          <div className="md:col-span-3">
            <label className="text-xs text-slate-500 block mb-1">Languages spoken</label>
            <div className="flex gap-2 flex-wrap">
              {LANGS.map(l =>
                <button key={l.code} type="button" onClick={()=>toggleLang(l.code)}
                  className={classNames("chip border",
                    draft.languages.includes(l.code) ? "bg-sky-500 text-white border-sky-500" : "bg-white text-slate-600 border-slate-200")}>
                  {l.label}
                </button>
              )}
            </div>
          </div>
          <div className="md:col-span-3">
            <label className="text-xs text-slate-500">Notes</label>
            <textarea className="w-full border rounded px-2 py-1" rows="2"
              value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})}/>
          </div>
        </div>
        <div className="mt-3">
          <button className="btn-primary px-3 py-1.5 rounded text-sm" onClick={submit}>
            {editing ? "Save changes" : "Add instructor"}
          </button>
        </div>
      </section>

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <h2 className="font-semibold mb-3">Instructors ({state.instructors.length})</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {state.instructors.map(i => (
            <div key={i.id} className="border rounded-lg p-3">
              <div className="flex items-center gap-2">
                <div className="font-medium">{i.name}</div>
                <div className="ml-auto flex gap-1">
                  {i.languages.map(c => <span key={c} className="chip bg-slate-100 text-slate-700 uppercase">{c}</span>)}
                </div>
              </div>
              <div className="text-xs text-slate-500 mt-1">{i.phone}{i.email && ` · ${i.email}`}</div>
              {i.notes && <div className="text-xs text-slate-600 mt-1">{i.notes}</div>}
              <div className="text-[11px] text-slate-400 mt-1 flex gap-3">
                <span>PIN: {i.pin ? "●●●● (set)" : <span className="text-amber-600">not set — default 1234</span>}</span>
                {i.hourRate > 0 && <span className="text-emerald-700 font-semibold">€{i.hourRate}/h</span>}
              </div>
              <div className="mt-3 flex gap-2 text-xs">
                <a href={waLink(i.phone, "Hi")} target="_blank" rel="noreferrer"
                   className="px-2 py-1 rounded bg-emerald-500 text-white hover:bg-emerald-600">WhatsApp</a>
                <button className="px-2 py-1 rounded btn-ghost"
                        onClick={()=>{ setEditing(i.id); setDraft(i); }}>Edit</button>
                <button className="px-2 py-1 rounded text-rose-600 hover:bg-rose-50"
                        onClick={()=>confirm(`Delete ${i.name}?`) && del(i.id)}>Delete</button>
              </div>
            </div>
          ))}
          {state.instructors.length===0 && <div className="text-sm text-slate-500">No instructors yet.</div>}
        </div>
      </section>
    </div>
  );
}

// ---------- Lessons ----------
const LESSON_TYPE_OPTIONS = [
  { value: "",      label: "— type —" },
  { value: "SCH",   label: "SCH · Schnupperkurs" },
  { value: "AK",    label: "AK · Aufbaukurs" },
  { value: "GK",    label: "GK · Grundkurs" },
  { value: "KC",    label: "KC · Kitecamp" },
  { value: "IT",    label: "IT · Einzelunterricht" },
  { value: "D-IT",  label: "D-IT · Doppel-IT" },
  { value: "Kinder",label: "Kinder · Kinderkurs" },
  { value: "WF-BC", label: "WF-BC · Wingfoil Basic" },
  { value: "WF-C",  label: "WF-C · Wingfoil Camp" },
  { value: "WF-IT", label: "WF-IT · Wingfoil IT" },
  { value: "PT",    label: "PT · Personal Training" },
];

function Lessons({ state, add, upd, del, updStudent, updInstr, pendingLessonId, clearPendingLesson, openStudentProfile }) {
  const empty = { studentId:"", instructorId:"", date: todayISO(), startTime:"10:00",
                  hours:2, status:"scheduled", spot:"", notes:"", lessonType:"" };
  const [draft, setDraft] = useState(empty);
  const [editing, setEditing] = useState(null);
  const [filterStudent, setFilterStudent] = useState("");
  const [filterInstructor, setFilterInstructor] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterType, setFilterType] = useState("");
  const [msgFor, setMsgFor] = useState(null);
  const [sortBy, setSortBy] = useState("date");   // "date" | "instructor"
  const [sortDir, setSortDir] = useState("desc");  // "asc" | "desc"

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortBy(col); setSortDir(col === "date" ? "desc" : "asc"); }
  };

  // Deep-link: when Schedule navigates here, open that lesson for editing.
  useEffect(() => {
    if (!pendingLessonId) return;
    const l = state.lessons.find(x => x.id === pendingLessonId);
    if (l) { setEditing(l.id); setDraft(l); window.scrollTo({ top: 0, behavior: "smooth" }); }
    clearPendingLesson?.();
  }, [pendingLessonId]);

  const submit = () => {
    if (!draft.studentId) return alert("Pick a student");
    if (editing) { upd?.(editing, draft); setEditing(null); }
    else if (add) add(draft);
    else return;
    setDraft(empty);
  };

  const list = useMemo(() => {
    const instrName = id => state.instructors.find(i=>i.id===id)?.name || "";
    const cmp = (a, b) => {
      let va, vb;
      if (sortBy === "instructor") {
        va = instrName(a.instructorId).toLowerCase();
        vb = instrName(b.instructorId).toLowerCase();
      } else {
        va = a.date + a.startTime;
        vb = b.date + b.startTime;
      }
      const r = va < vb ? -1 : va > vb ? 1 : 0;
      return sortDir === "asc" ? r : -r;
    };
    return state.lessons
      .filter(l => !filterStudent   || l.studentId===filterStudent)
      .filter(l => !filterInstructor || (filterInstructor==="__none__" ? !l.instructorId : l.instructorId===filterInstructor))
      .filter(l => filterStatus==="all" || l.status===filterStatus)
      .filter(l => !filterType || l.lessonType===filterType)
      .slice()
      .sort(cmp);
  }, [state.lessons, state.instructors, filterStudent, filterInstructor, filterStatus, filterType, sortBy, sortDir]);

  return (
    <div className="space-y-6">
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex gap-2 items-center">
          <h2 className="font-semibold">{editing ? "Edit lesson" : "Schedule lesson"}</h2>
          {editing && <button className="text-xs text-slate-500 underline" onClick={()=>{setEditing(null); setDraft(empty);}}>cancel edit</button>}
        </div>
        <div className="mt-3 grid grid-cols-1 md:grid-cols-4 gap-2 text-sm">
          <SearchableStudentSelect label="Student" students={state.students} value={draft.studentId} onChange={v=>setDraft({...draft, studentId:v})} placeholder="— pick —" showCourse={true} />
          <Select label="Instructor" value={draft.instructorId} onChange={v=>setDraft({...draft, instructorId:v})}
                  options={["", ...state.instructors.map(i=>i.id)]}
                  display={id=>id===""?"Unassigned":(state.instructors.find(i=>i.id===id)?.name||id)}/>
          <Input label="Date" type="date" value={draft.date} onChange={v=>setDraft({...draft, date:v})}/>
          <TimeInput label="Start time" value={draft.startTime} onChange={v=>setDraft({...draft, startTime:v})}/>
          <Input label="Hours" type="number" step="0.5" value={draft.hours} onChange={v=>setDraft({...draft, hours:+v||0})}/>
          <Input label="Spot" value={draft.spot} onChange={v=>setDraft({...draft, spot:v})}/>
          <Select label="Lesson type" value={draft.lessonType||""} onChange={v=>setDraft({...draft, lessonType:v})}
                  options={LESSON_TYPE_OPTIONS.map(o=>o.value)}
                  display={v=>LESSON_TYPE_OPTIONS.find(o=>o.value===v)?.label||"— type —"}/>
          <Select label="Status" value={draft.status} onChange={v=>setDraft({...draft, status:v})}
                  options={["scheduled","completed","cancelled"]} />
          {/* Meeting type toggle — shown when editing (admin only since upd is only passed when canEdit) */}
          {editing && upd && (
            <div>
              <label className="text-xs text-slate-500 block mb-1">Check-in (30 min before)</label>
              <div className="flex rounded border border-slate-200 overflow-hidden text-xs">
                {[['front_desk','✓ Front desk'],['beach','🏄 Beach']].map(([val,label]) => {
                  const effective = getMeetingType(draft, state.students, state.lessons);
                  const active = (draft.meetingType ? draft.meetingType : effective) === val;
                  return (
                    <button key={val} type="button"
                      onClick={()=>setDraft({...draft, meetingType: val})}
                      className={classNames("px-3 py-1.5 flex-1",
                        active ? (val==='beach' ? "bg-teal-600 text-white font-semibold" : "bg-violet-600 text-white font-semibold")
                               : "bg-white text-slate-600 hover:bg-slate-50")}>
                      {label}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
          {/* Course / payment panel — shown when a student is selected */}
          {draft.studentId && (() => {
            const stu = state.students.find(s => s.id === draft.studentId);
            if (!stu) return null;
            const price = +stu.coursePrice || 0;
            const paid  = +stu.amountPaid  || 0;
            const bal   = price > 0 ? price - paid : +stu.balanceOwed || 0;
            return (
              <div className="md:col-span-4 flex items-center gap-4 flex-wrap px-3 py-2 rounded-lg bg-slate-50 border border-slate-200 text-sm">
                <span className="text-xs text-slate-400 font-semibold uppercase tracking-wide">Course</span>
                <span className="font-medium">{stu.packageName || <span className="text-slate-400">—</span>}</span>
                {price > 0 && <span className="tabular-nums text-slate-600">€{price}</span>}
                {price > 0 && (
                  <span className={classNames("tabular-nums font-medium",
                    bal <= 0 ? "text-emerald-600" : "text-amber-700")}>
                    {bal <= 0 ? "✓ paid in full" : `€${paid} paid · €${bal.toFixed(2)} owed`}
                  </span>
                )}
                <button type="button"
                        className="ml-auto text-xs text-sky-600 hover:underline"
                        onClick={() => openStudentProfile?.(stu.id)}>
                  Edit payment →
                </button>
              </div>
            );
          })()}
          <div className="md:col-span-4">
            <label className="text-xs text-slate-500">Notes</label>
            <textarea className="w-full border rounded px-2 py-1" rows="2"
              value={draft.notes} onChange={e=>setDraft({...draft, notes:e.target.value})}/>
          </div>
        </div>
        {(add || editing) && (
        <div className="mt-3">
          <button className="btn-primary px-3 py-1.5 rounded text-sm" onClick={submit}>
            {editing ? "Save lesson" : "Add lesson"}
          </button>
        </div>
        )}
      </section>

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-3 flex-wrap">
          <h2 className="font-semibold">Lessons ({list.length})</h2>
          <SearchableStudentSelect students={state.students} value={filterStudent} onChange={setFilterStudent} placeholder="All students" className="ml-auto w-44" />
          <select className="border rounded px-2 py-1 text-sm" value={filterInstructor} onChange={e=>setFilterInstructor(e.target.value)}>
            <option value="">All instructors</option>
            {state.instructors.map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
            <option value="__none__">Unassigned</option>
          </select>
          <select className="border rounded px-2 py-1 text-sm" value={filterType} onChange={e=>setFilterType(e.target.value)}>
            <option value="">All types</option>
            {LESSON_TYPE_OPTIONS.filter(o=>o.value).map(o =>
              <option key={o.value} value={o.value}>{o.value}</option>
            )}
          </select>
          <select className="border rounded px-2 py-1 text-sm" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="all">All statuses</option>
            <option value="scheduled">Scheduled</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              {(() => {
                const SortTh = ({ col, children }) => {
                  const active = sortBy === col;
                  const arrow = active ? (sortDir === "asc" ? " ↑" : " ↓") : " ↕";
                  return (
                    <th className="py-2 cursor-pointer hover:text-slate-800 whitespace-nowrap"
                        onClick={()=>toggleSort(col)}>
                      {children}<span className={active ? "text-sky-500" : "text-slate-300"}>{arrow}</span>
                    </th>
                  );
                };
                return (
                  <tr className="text-left text-slate-500 border-b select-none">
                    <th className="py-2 pr-2 text-slate-400 font-normal w-8">#</th>
                    <SortTh col="date">Date</SortTh>
                    <th>Time</th><th>Hours</th><th>Type</th><th>Meet</th><th>Student</th>
                    <SortTh col="instructor">Instructor</SortTh>
                    <th>Status</th><th>Course / balance</th><th></th>
                  </tr>
                );
              })()}
            </thead>
            <tbody>
              {list.map((l, idx) => {
                const stu = state.students.find(s=>s.id===l.studentId);
                const ins = state.instructors.find(i=>i.id===l.instructorId);
                const isOpen = msgFor === l.id;
                const isEditing_ = editing === l.id;
                const stuPrice = +stu?.coursePrice || 0;
                const stuPaid  = +stu?.amountPaid  || 0;
                const stuBal   = stuPrice > 0 ? stuPrice - stuPaid : +stu?.balanceOwed || 0;
                const openEdit = () => { setEditing(l.id); setDraft(l); window.scrollTo({ top: 0, behavior: "smooth" }); };
                return (
                  <React.Fragment key={l.id}>
                    <tr className={classNames("border-b last:border-0 align-top",
                      isEditing_ && "bg-sky-50")}>
                      <td className="py-2 pr-2">
                        <button
                          onClick={openEdit}
                          title="Open for editing"
                          className="text-xs font-mono font-semibold text-sky-600 hover:text-sky-800 hover:underline tabular-nums">
                          #{list.length - idx}
                        </button>
                      </td>
                      <td className="py-2">{l.date}</td>
                      <td>{l.startTime}</td>
                      <td>{l.hours}</td>
                      <td>{l.lessonType
                        ? <span className="chip bg-sky-100 text-sky-700 font-mono text-[11px]">{l.lessonType}</span>
                        : <span className="text-slate-300">—</span>}
                      </td>
                      <td>{(() => {
                        const mt = getMeetingType(l, state.students, state.lessons);
                        return mt === 'beach'
                          ? <span className="chip bg-teal-100 text-teal-700 text-[11px]">🏄 beach</span>
                          : <span className="chip bg-violet-100 text-violet-700 text-[11px]">✓ front desk</span>;
                      })()}</td>
                      <td>{stu?.name||"—"}</td>
                      <td>{ins?.name||"—"}</td>
                      <td><span className={classNames("chip", statusChip(l.status))}>{l.status}</span></td>
                      <td className="text-xs max-w-[140px]">
                        {stu ? (
                          <button className="text-left hover:underline"
                                  onClick={()=>openStudentProfile?.(stu.id)}
                                  title="Edit course payment">
                            <div className="text-slate-700 truncate">{stu.packageName||"—"}</div>
                            {stuPrice > 0 && (
                              <div className={classNames("tabular-nums font-medium",
                                stuBal <= 0 ? "text-emerald-600" : "text-amber-700")}>
                                {stuBal <= 0 ? "✓ paid" : `€${stuPaid} / −€${stuBal.toFixed(0)}`}
                              </div>
                            )}
                          </button>
                        ) : <span className="text-slate-300">—</span>}
                      </td>
                      <td className="text-right whitespace-nowrap">
                        <button className={classNames("text-xs px-2 py-1 rounded mr-1",
                                isOpen ? "bg-emerald-600 text-white" : "bg-emerald-500 text-white hover:bg-emerald-600")}
                                onClick={()=>setMsgFor(isOpen ? null : l.id)}>
                          {isOpen ? "Close" : "Send message"}
                        </button>
                        {l.status==="scheduled" &&
                          <button className="text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700 hover:bg-emerald-200 mr-1"
                                  onClick={()=>upd(l.id,{status:"completed"})}>Complete</button>}
                        <button className="text-xs px-2 py-1 rounded btn-ghost"
                                onClick={openEdit}>Edit</button>
                        <button className="text-xs px-2 py-1 rounded text-rose-600 hover:bg-rose-50"
                                onClick={()=>confirm("Delete lesson?") && del(l.id)}>Delete</button>
                      </td>
                    </tr>
                    {isOpen && (
                      <tr className="bg-sky-50/40">
                        <td colSpan="10" className="px-3 py-3">
                          <MessageButtons state={state} lesson={l} stu={stu} ins={ins}
                                          updLesson={upd} updStudent={updStudent} updInstr={updInstr} expanded />
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
              {list.length===0 && <tr><td colSpan="10" className="py-3 text-center text-slate-500">No lessons match.</td></tr>}
            </tbody>
          </table>
        </div>
      </section>
    </div>
  );
}

// ---------- Day export helpers ----------
function buildDayGrid(dateKey, state) {
  const SLOTS = [];
  for (let h = 6; h < 21; h++) { SLOTS.push(`${h}:00`); SLOTS.push(`${h}:30`); }

  const slotLabel = s => {
    const [h, m] = s.split(':').map(Number);
    const nh = m === 30 ? h + 1 : h;
    const nm = m === 0 ? 30 : 0;
    return `${String(h).padStart(2,'0')}:${m===0?'00':'30'} - ${String(nh).padStart(2,'0')}:${nm===0?'00':'30'}`;
  };
  const slotIdx = s => {
    const [h, m] = (s||'09:00').split(':').map(Number);
    return (h - 6) * 2 + (m >= 30 ? 1 : 0);
  };
  const fmtTime = s => { const [h,m] = (s||'09:00').split(':').map(Number); return `${String(h).padStart(2,'0')}:${m===0?'00':'30'}`; };

  const dayLessons = state.lessons.filter(l => l.date === dateKey);
  const dayTasks   = (state.tasks||[]).filter(t => t.date === dateKey);

  // Step 1: build one block per unique group (or solo lesson), picking the instructor
  // from whichever member of the group has one — so the whole group lands in one column.
  const seen = new Set();
  const allBlocks = [];
  dayLessons.forEach(l => {
    const key = l.groupId || l.id;
    if (seen.has(key)) return;
    seen.add(key);
    const grp = dayLessons.filter(gl => (gl.groupId || gl.id) === key);
    const first = grp[0];
    const students = grp.map(gl => state.students.find(s => s.id === gl.studentId)?.name).filter(Boolean);
    const parts = first.tjkiteImportKey?.split('|') || [];
    const courseCode = parts[parts.length - 2] || '';
    // Use first instructor found anywhere in the group
    const instrId = grp.find(gl => gl.instructorId)?.instructorId || null;
    const startMins = (() => { const [h,m] = (first.startTime||'09:00').split(':').map(Number); return h*60+m; })();
    const endMins = startMins + Math.round((first.hours||1.5)*60);
    const endStr = `${Math.floor(endMins/60)}.${String(endMins%60).padStart(2,'0')}`;
    const n = students.length;
    // Determine meeting type and time (30 min before lesson)
    const grpMeetType = grp.reduce((acc, l) =>
      getMeetingType(l, state.students, state.lessons) === 'front_desk' ? 'front_desk' : acc,
      getMeetingType(first, state.students, state.lessons));
    const meetTime = addMinutes(first.startTime || '09:00', -30);
    const meetLabel = grpMeetType === 'beach'
      ? `Beach ${meetTime}`
      : `Front desk ${meetTime}`;
    const isCancelled = first.status === 'cancelled';
    const isCompleted = first.status === 'completed';
    const statusLine = isCancelled ? 'CANCELLED' : isCompleted ? 'COMPLETED' : '';
    const content = [
      statusLine,
      (courseCode ? `${courseCode} (${n}p) ` : '') + students.join(', '),
      ...(isCancelled ? [] : [meetLabel]),
      `${fmtTime(first.startTime)} - ${endStr}`,
    ].filter(Boolean).join('\n');
    allBlocks.push({ first, content, span: Math.max(1, Math.round((first.hours||1.5)*2)), instrId, isCancelled, isCompleted });
  });

  // Step 2: build columns — always include every real instructor,
  // but skip "test" instructors if they have no lessons today.
  // Add Unassigned column only if there are unassigned blocks.
  const blockedInstrIds = new Set(allBlocks.map(b => b.instrId).filter(Boolean));
  const hasUnassigned = allBlocks.some(b => !b.instrId);

  const columns = [
    ...state.instructors
      .filter(i => {
        const isTest = i.name.toLowerCase().includes('test');
        return isTest ? blockedInstrIds.has(i.id) : true;
      })
      .map(i => ({ id: i.id, name: i.name })),
    ...(hasUnassigned ? [{ id: null, name: 'Unassigned' }] : []),
  ];

  // Step 3: place each block into its column's slot array.
  // If two blocks for the same instructor start at the same time, merge their
  // content into one cell (use the longer span) rather than silently dropping one.
  const colSlots = columns.map(instr => {
    const colBlocks = allBlocks.filter(b => instr.id ? b.instrId === instr.id : !b.instrId);
    const slots = Array(SLOTS.length).fill(null);
    colBlocks.forEach(({ first, content, span, isCancelled, isCompleted }) => {
      const idx = slotIdx(first.startTime);
      if (idx < 0 || idx >= SLOTS.length) return;
      const existing = slots[idx];
      if (existing && existing !== 'merged') {
        // Merge: combine content, keep the longer span; not cancelled if either block is active
        const merged = { content: existing.content + '\n──\n' + content, span: Math.max(existing.span, span),
          isCancelled: existing.isCancelled && isCancelled, isCompleted: existing.isCompleted && isCompleted };
        slots[idx] = merged;
        for (let i = 1; i < merged.span && idx+i < SLOTS.length; i++) {
          if (slots[idx+i] !== 'merged') slots[idx+i] = 'merged';
        }
      } else if (!existing) {
        slots[idx] = { content, span, isCancelled, isCompleted };
        for (let i = 1; i < span && idx+i < SLOTS.length; i++) slots[idx+i] = 'merged';
      }
      // If existing === 'merged' (slot occupied mid-span), the block genuinely
      // overlaps a prior lesson — append it to the owning cell instead.
      else {
        // Find the owning cell (the slot that started this merged run)
        let owner = idx - 1;
        while (owner >= 0 && slots[owner] === 'merged') owner--;
        if (owner >= 0 && slots[owner] && slots[owner] !== 'merged') {
          slots[owner] = { ...slots[owner], content: slots[owner].content + '\n──\n' + content,
            isCancelled: slots[owner].isCancelled && isCancelled };
        }
      }
    });
    return slots;
  });

  // Step 4: tasks column — add if there are any tasks for this day
  let taskColSlots = null;
  if (dayTasks.length > 0) {
    taskColSlots = Array(SLOTS.length).fill(null);
    dayTasks.forEach(task => {
      const idx = slotIdx(task.startTime || '09:00');
      if (idx < 0 || idx >= SLOTS.length) return;
      const durH = Math.max(0.5, +task.hours || 1);
      const span = Math.max(1, Math.round(durH * 2));
      const ins = (state.instructors||[]).find(i => i.id === task.instructorId);
      const statusMark = task.status === 'completed' ? '✓ ' : '';
      const content = `${statusMark}${task.description}${ins ? '\n' + ins.name : ''}`;
      const existing = taskColSlots[idx];
      if (existing && existing !== 'merged') {
        taskColSlots[idx] = { content: existing.content + '\n──\n' + content, span: Math.max(existing.span, span) };
        for (let i = 1; i < taskColSlots[idx].span && idx+i < SLOTS.length; i++) {
          if (taskColSlots[idx+i] !== 'merged') taskColSlots[idx+i] = 'merged';
        }
      } else if (!existing) {
        taskColSlots[idx] = { content, span };
        for (let i = 1; i < span && idx+i < SLOTS.length; i++) taskColSlots[idx+i] = 'merged';
      } else {
        let owner = idx - 1;
        while (owner >= 0 && taskColSlots[owner] === 'merged') owner--;
        if (owner >= 0 && taskColSlots[owner] && taskColSlots[owner] !== 'merged') {
          taskColSlots[owner] = { ...taskColSlots[owner], content: taskColSlots[owner].content + '\n──\n' + content };
        }
      }
    });
    columns.push({ id: '__tasks__', name: 'Tasks' });
    colSlots.push(taskColSlots);
  }

  return { SLOTS, slotLabel, columns, colSlots };
}

function exportDayPDF(dateKey, state) {
  if (!window.jspdf) { alert('jsPDF not loaded'); return; }
  const { jsPDF } = window.jspdf;
  const { SLOTS, slotLabel, columns, colSlots } = buildDayGrid(dateKey, state);
  const d = new Date(dateKey + 'T12:00:00');
  const [,, dd] = dateKey.split('-');
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const title = `Schedule — ${dayName} ${d.toLocaleString('en',{month:'long'})} ${+dd}`;

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(title, 14, 14);

  // Build autoTable body with rowSpan for lesson blocks
  const head = [['Time', ...columns.map(c => c.name)]];
  const body = SLOTS.map((slot, si) => {
    const row = [{ content: slotLabel(slot), styles: { halign: 'right', fontSize: 7.5, textColor: [80,80,80] } }];
    columns.forEach((_, ci) => {
      const cell = colSlots[ci][si];
      if (cell === 'merged') return; // omit — covered by rowSpan
      if (!cell) {
        row.push({ content: '' });
      } else {
        const fillColor = cell.isCancelled ? [254, 215, 215] : cell.isCompleted ? [220, 252, 231] : [235, 246, 255];
        const lineColor = cell.isCancelled ? [220, 100, 100] : cell.isCompleted ? [100, 200, 130] : [160, 200, 230];
        row.push({
          content: cell.content,
          rowSpan: cell.span,
          styles: {
            fillColor,
            fontStyle: 'bold',
            fontSize: 8,
            valign: 'top',
            lineColor,
            lineWidth: 0.3,
          }
        });
      }
    });
    return row;
  });

  doc.autoTable({
    head,
    body,
    startY: 20,
    theme: 'grid',
    headStyles: { fillColor: [220,220,220], textColor: [30,30,30], fontStyle: 'bold', fontSize: 9, halign: 'center' },
    bodyStyles: { fontSize: 8, cellPadding: 1.5 },
    columnStyles: { 0: { cellWidth: 22, halign: 'right' } },
    styles: { overflow: 'linebreak' },
    margin: { left: 14, right: 14 },
  });

  doc.save(`Schedule_${dateKey}.pdf`);
}
