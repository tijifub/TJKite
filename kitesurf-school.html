// ---------- Salary Report component ----------
// Hours earned from an admin's myHours entries in a given period
function adminHoursInPeriod(adminHours, predicate) {
  const SESSION_H = { "0.5h": 0.5, "2h": 2, "4h": 4 };
  return Object.entries(adminHours || {})
    .filter(([date, v]) => v.session && predicate(date))
    .reduce((s, [, v]) => s + (SESSION_H[v.session] || 0), 0);
}

function SalaryReport({ instructors, lessons, tasks, students, courseRates, taskRate, admins, allAdminHours, instructorId }) {
  // Instructor view: scope everything to just their own data
  const myInstructorOnly = !!instructorId;
  if (myInstructorOnly) {
    instructors = (instructors||[]).filter(i => i.id === instructorId);
    admins = [];
    lessons  = (lessons||[]).filter(l => l.instructorId === instructorId);
    tasks    = (tasks||[]).filter(t  => t.instructorId  === instructorId);
  }
  const [period, setPeriod] = useState("week");
  const [paidMap, setPaidMap] = useState({});  // { instructorId: bool } — local "überwiesen" state
  const SESSION_H = { "0.5h": 0.5, "2h": 2, "4h": 4 };
  const DAY_NAMES = ["Mo","Di","Mi","Do","Fr","Sa","So"];

  const weekStart = () => {
    const d = new Date(); d.setHours(0,0,0,0);
    const dow = (d.getDay()+6)%7;
    d.setDate(d.getDate()-dow);
    return d;
  };
  const [anchor, setAnchor] = useState(weekStart);
  const shift = (n) => { const d=new Date(anchor); d.setDate(anchor.getDate()+n*7); setAnchor(d); };
  const isThisWeek = localISO(anchor) === localISO(weekStart());
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(anchor); d.setDate(anchor.getDate()+i); return d; });
  const monthKey = localISO(anchor).slice(0,7);

  // ── WEEK mode data ──────────────────────────────────────────────────
  const weekLessons = (lessons||[]).filter(l => days.some(d => localISO(d) === l.date));
  const weekTasksDone = (tasks||[]).filter(t => t.status==="completed" && days.some(d => localISO(d) === t.date));
  const weekSlots = groupLessonsByInstructorSlot(weekLessons);

  // Course rows — one per instructor+date+time slot, sorted by date then startTime.
  // Only include slots with at least one completed lesson (actualH > 0); non-completed
  // slots have no hours and no earnings so they'd just appear as blank rows.
  const kursRows = weekSlots
    .sort((a,b)=>(a[0]?.date||"").localeCompare(b[0]?.date||"")||(a[0]?.startTime||"").localeCompare(b[0]?.startTime||""))
    .map(slot => {
      const ins = (instructors||[]).find(i => i.id === slot[0]?.instructorId);
      const firstStu = (students||[]).find(s => s.id === slot[0]?.studentId);
      const stuNames = [...new Set(slot.map(l=>{
        const s=(students||[]).find(s=>s.id===l.studentId); return s?.name?.split(" ")[0]||"";
      }).filter(Boolean))].join(", ");
      // Detect Doppel-IT: 2+ IT/KK students in one slot (use all slot lessons for label, not just completed)
      const itCount = slot.filter(l => { const s=(students||[]).find(s=>s.id===l.studentId); return s?.course==="IT"||s?.course==="KK"; }).length;
      const wfItCount = slot.filter(l => { const s=(students||[]).find(s=>s.id===l.studentId); return s?.course==="WF-IT"; }).length;
      const course = itCount >= 2 ? "DIT" : wfItCount >= 2 ? "WF-DIT" : (firstStu?.course || "");
      const desc = [course, stuNames].filter(Boolean).join(" – ");
      const actualH = slotActualHours(slot);
      const earned = slotSalaryEarned(slot, students, courseRates, ins?.hourRate);
      const slotDate = slot[0]?.date||"";
      const daySalaries = days.map(d => localISO(d)===slotDate ? earned : 0);
      return { key: `${ins?.id||""}|${slotDate}|${slot[0]?.startTime}`, ins, desc, insName: ins?.name||"", notes: actualH?`${actualH}h`:"", daySalaries, total: earned };
    })
    .filter(r => r.total > 0);

  // Task rows (completed tasks in the week)
  const taskRows = weekTasksDone.map(t => {
    const ins = (instructors||[]).find(i => i.id === t.instructorId);
    const rate = ins?.hourRate || taskRate || 15;
    const earned = (+t.hours||0) * rate;
    const daySalaries = days.map(d => localISO(d)===t.date ? earned : 0);
    return { key: `task|${t.id}`, ins, desc: t.description||"Task", insName: ins?.name||"", notes: `${t.hours}h`, daySalaries, total: earned };
  });

  const allKursRows = [...kursRows, ...taskRows];
  const dayTotals = days.map((_,di) => allKursRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0));
  const weekKursTotal = allKursRows.reduce((s,r)=>s+r.total,0);

  // Per-instructor daily breakdown
  const insWeekRows = (instructors||[]).map(ins => {
    const daySalaries = days.map(d => {
      const dk = localISO(d);
      const slotPay = weekSlots.filter(s=>s[0]?.instructorId===ins.id&&s[0]?.date===dk)
        .reduce((s,slot)=>s+slotSalaryEarned(slot,students,courseRates,ins.hourRate),0);
      const taskPay = weekTasksDone.filter(t=>t.instructorId===ins.id&&t.date===dk)
        .reduce((s,t)=>s+(+t.hours||0)*(ins.hourRate||taskRate||15),0);
      return slotPay+taskPay;
    });
    const total = daySalaries.reduce((s,v)=>s+v,0);
    return { ins, daySalaries, total };
  }).filter(r=>r.total>0||allKursRows.some(k=>k.ins?.id===r.ins.id));

  // Per-admin daily breakdown (manual session log + tasks)
  const adminWeekRows = (admins||[]).map(admin => {
    const hrs = allAdminHours?.[admin.id]||{};
    const rate = admin.hourRate??15;
    const daySalaries = days.map(d => {
      const dk = localISO(d);
      const v = hrs[dk];
      const sessionPay = v?.session ? (SESSION_H[v.session]||0)*rate : 0;
      const taskPay = (tasks||[]).filter(t=>t.instructorId===admin.id&&t.date===dk&&t.status==="completed")
        .reduce((s,t)=>s+(+t.hours||0)*rate, 0);
      return sessionPay + taskPay;
    });
    const total = daySalaries.reduce((s,v)=>s+v,0);
    return { admin, daySalaries, total };
  }).filter(r=>r.total>0);

  const insGrandTotals = days.map((_,di)=>insWeekRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0)+adminWeekRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0));
  const insGrandTotal = insWeekRows.reduce((s,r)=>s+r.total,0)+adminWeekRows.reduce((s,r)=>s+r.total,0);

  // ── MONTH mode detailed data (same structure as week, days = days of month) ──
  const monthDays = (() => {
    if (period !== "month") return [];
    const [y, m] = monthKey.split('-').map(Number);
    const arr = []; const d = new Date(y, m-1, 1);
    while (d.getMonth() === m-1) { arr.push(new Date(d)); d.setDate(d.getDate()+1); }
    return arr;
  })();
  const monthLessons  = period==="month" ? (lessons||[]).filter(l=>l.date?.startsWith(monthKey)) : [];
  const monthTasksDone= period==="month" ? (tasks||[]).filter(t=>t.status==="completed"&&t.date?.startsWith(monthKey)) : [];
  const monthSlots    = period==="month" ? groupLessonsByInstructorSlot(monthLessons) : [];

  const monthKursRows = monthSlots
    .sort((a,b)=>(a[0]?.date||"").localeCompare(b[0]?.date||"")||(a[0]?.startTime||"").localeCompare(b[0]?.startTime||""))
    .map(slot => {
      const ins = (instructors||[]).find(i=>i.id===slot[0]?.instructorId);
      const firstStu = (students||[]).find(s=>s.id===slot[0]?.studentId);
      const stuNames = [...new Set(slot.map(l=>{const s=(students||[]).find(s=>s.id===l.studentId);return s?.name?.split(" ")[0]||"";}).filter(Boolean))].join(", ");
      const itCount   = slot.filter(l=>{const s=(students||[]).find(s=>s.id===l.studentId);return s?.course==="IT"||s?.course==="KK";}).length;
      const wfItCount = slot.filter(l=>{const s=(students||[]).find(s=>s.id===l.studentId);return s?.course==="WF-IT";}).length;
      const course    = itCount>=2?"DIT":wfItCount>=2?"WF-DIT":(firstStu?.course||"");
      const desc      = [course,stuNames].filter(Boolean).join(" – ");
      const actualH   = slotActualHours(slot);
      const earned    = slotSalaryEarned(slot,students,courseRates,ins?.hourRate);
      const slotDate  = slot[0]?.date||"";
      const daySalaries = monthDays.map(d=>localISO(d)===slotDate?earned:0);
      return {key:`${ins?.id||""}|${slotDate}|${slot[0]?.startTime}`,ins,desc,insName:ins?.name||"",notes:actualH?`${actualH}h`:"",daySalaries,total:earned};
    })
    .filter(r => r.total > 0);
  const monthTaskRows = monthTasksDone.map(t=>{
    const ins=(instructors||[]).find(i=>i.id===t.instructorId);
    const earned=(+t.hours||0)*(ins?.hourRate||taskRate||15);
    const daySalaries=monthDays.map(d=>localISO(d)===t.date?earned:0);
    return {key:`task|${t.id}`,ins,desc:t.description||"Task",insName:ins?.name||"",notes:`${t.hours}h`,daySalaries,total:earned};
  });
  const allMonthKursRows = [...monthKursRows,...monthTaskRows];
  const monthDayTotals   = monthDays.map((_,di)=>allMonthKursRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0));
  const monthKursTotal   = allMonthKursRows.reduce((s,r)=>s+r.total,0);

  const insMonthRows = (instructors||[]).map(ins=>{
    const daySalaries = monthDays.map(d=>{
      const dk=localISO(d);
      const slotPay=monthSlots.filter(s=>s[0]?.instructorId===ins.id&&s[0]?.date===dk).reduce((s,slot)=>s+slotSalaryEarned(slot,students,courseRates,ins.hourRate),0);
      const taskPay=monthTasksDone.filter(t=>t.instructorId===ins.id&&t.date===dk).reduce((s,t)=>s+(+t.hours||0)*(ins.hourRate||taskRate||15),0);
      return slotPay+taskPay;
    });
    const total=daySalaries.reduce((s,v)=>s+v,0);
    return {ins,daySalaries,total};
  }).filter(r=>r.total>0||allMonthKursRows.some(k=>k.ins?.id===r.ins.id));

  const adminMonthRows = (admins||[]).map(admin=>{
    const hrs=allAdminHours?.[admin.id]||{}, rate=admin.hourRate??15;
    const daySalaries=monthDays.map(d=>{
      const dk=localISO(d), v=hrs[dk];
      const sessionPay=v?.session?(SESSION_H[v.session]||0)*rate:0;
      const taskPay=(tasks||[]).filter(t=>t.instructorId===admin.id&&t.date===dk&&t.status==="completed").reduce((s,t)=>s+(+t.hours||0)*rate,0);
      return sessionPay+taskPay;
    });
    const total=daySalaries.reduce((s,v)=>s+v,0);
    return {admin,daySalaries,total};
  }).filter(r=>r.total>0);

  const insMonthGrandTotals = monthDays.map((_,di)=>insMonthRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0)+adminMonthRows.reduce((s,r)=>s+(r.daySalaries[di]||0),0));
  const insMonthGrandTotal  = insMonthRows.reduce((s,r)=>s+r.total,0)+adminMonthRows.reduce((s,r)=>s+r.total,0);

  // ── MONTH / ALL mode data ──────────────────────────────────────────
  const filterLessons = iId => {
    const all=(lessons||[]).filter(l=>l.instructorId===iId);
    if(period==="month") return all.filter(l=>l.date?.startsWith(monthKey));
    return all;
  };
  const filterTasks = iId => {
    const all=(tasks||[]).filter(t=>t.instructorId===iId);
    if(period==="month") return all.filter(t=>t.date?.startsWith(monthKey));
    return all;
  };
  const summaryRows = (instructors||[]).map(ins => {
    const iL=filterLessons(ins.id), iT=filterTasks(ins.id);
    const lessonH=totalSlotHours(iL), taskH=iT.filter(t=>t.status==="completed").reduce((s,t)=>s+(+t.hours||0),0);
    const lessonPay=totalSlotSalary(iL,students,courseRates,ins.hourRate);
    const taskPay=iT.filter(t=>t.status==="completed").reduce((s,t)=>s+(+t.hours||0)*(ins.hourRate||taskRate||15),0);
    return { ins, actualH: lessonH+taskH, salary: lessonPay+taskPay };
  });
  const adminSummaryRows = (admins||[]).map(admin => {
    const hrs=allAdminHours?.[admin.id]||{}, rate=admin.hourRate??15;
    const sessionH=adminHoursInPeriod(hrs,date=>period==="month"?date?.startsWith(monthKey):true);
    const adminTasksAll=(tasks||[]).filter(t=>t.instructorId===admin.id&&t.status==="completed");
    const filteredAdminTasks = period==="month" ? adminTasksAll.filter(t=>t.date?.startsWith(monthKey)) : adminTasksAll;
    const taskH = filteredAdminTasks.reduce((s,t)=>s+(+t.hours||0),0);
    const actualH = sessionH + taskH;
    return { admin, actualH, salary: actualH*rate };
  });
  const summaryTotalH = [...summaryRows,...adminSummaryRows].reduce((s,r)=>s+r.actualH,0);
  const summaryTotalPay = [...summaryRows,...adminSummaryRows].reduce((s,r)=>s+r.salary,0);

  const periodLabel = period==="week" ? `Week_${localISO(days[0])}_${localISO(days[6])}`
    : period==="month" ? new Date(anchor).toLocaleString("default",{month:"long",year:"numeric"}) : "All_time";

  const fmtE = v => v>0 ? `€${v.toFixed(2)}` : "—";
  const cellCls = "px-2 py-2 tabular-nums text-right text-xs";
  const numCls = v => classNames(cellCls, v>0?"text-slate-800":"text-slate-300");

  return (
    <div className="space-y-4">
      {/* ── Header bar ── */}
      <div className="flex items-center gap-2 flex-wrap">
        <div>
          <div className="font-bold text-base text-slate-800">{myInstructorOnly ? `My Salary — ${(instructors[0]?.name||"")}` : "TJKite – Provisionsliste 2026"}</div>
          <div className="text-xs text-slate-500">{period==="week"?`${localISO(days[0])} – ${localISO(days[6])}`:period==="month"?new Date(anchor).toLocaleString("default",{month:"long",year:"numeric"}):"Gesamtzeitraum"}</div>
        </div>
        <div className="flex gap-1 ml-auto flex-wrap">
          {[["week","Woche"],["month","Monat"],["all","Gesamt"]].map(([k,label])=>(
            <button key={k} onClick={()=>setPeriod(k)}
              className={classNames("px-3 py-1.5 rounded-lg text-xs font-semibold border transition-colors",
                period===k?"bg-slate-800 text-white border-slate-800":"bg-white text-slate-600 border-slate-200 hover:border-slate-400")}>
              {label}
            </button>
          ))}
          <button className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-emerald-600 hover:bg-emerald-700 text-white"
            onClick={()=>exportSalaryXLSX({ period, periodLabel,
              days, allKursRows, insWeekRows, adminWeekRows, dayTotals, weekKursTotal, insGrandTotals, insGrandTotal,
              monthDays, allMonthKursRows, insMonthRows, adminMonthRows, monthDayTotals, monthKursTotal, insMonthGrandTotals, insMonthGrandTotal,
              summaryRows, adminSummaryRows, summaryTotalH, summaryTotalPay })}>
            Export Excel
          </button>
        </div>
      </div>

      {/* ── Week / Month navigator ── */}
      {period==="week" && (
        <div className="flex items-center gap-2 text-sm">
          <button className="px-2 py-1 rounded btn-ghost" onClick={()=>shift(-1)}>← Prev</button>
          <span className="font-semibold">{localISO(days[0])} – {localISO(days[6])}</span>
          <button className="px-2 py-1 rounded btn-ghost" onClick={()=>shift(1)}>Next →</button>
          {!isThisWeek&&<button className="px-2 py-1 rounded btn-ghost" onClick={()=>setAnchor(weekStart())}>Heute</button>}
        </div>
      )}
      {period==="month" && (
        <div className="flex items-center gap-2 text-sm">
          <button className="px-2 py-1 rounded btn-ghost" onClick={()=>shift(-4)}>← Prev</button>
          <span className="font-semibold">{new Date(anchor).toLocaleString("default",{month:"long",year:"numeric"})}</span>
          <button className="px-2 py-1 rounded btn-ghost" onClick={()=>shift(4)}>Next →</button>
        </div>
      )}

      {/* ── Commission rate reference ── */}
      <details className="text-xs text-slate-500">
        <summary className="cursor-pointer hover:text-slate-700 select-none">Provisionssätze (€/h)</summary>
        <div className="mt-2 grid grid-cols-2 sm:grid-cols-3 gap-1.5">
          {[["GK / KC / AK / SCH","€25/h"],["IT (privat)","€30/h"],["KK (Kinder IT)","€30/h"],
            ["Doppel-IT","€35/h"],["WF-BC / WF-C / WF-IT","€35/h"],["Tasks","Stundensatz"]].map(([k,v])=>(
            <div key={k} className="bg-slate-50 rounded px-2.5 py-1.5 flex justify-between gap-2">
              <span>{k}</span><span className="font-semibold text-slate-700">{v}</span>
            </div>
          ))}
        </div>
      </details>

      {/* ══════════════════════════════════════════
          WEEK MODE — Provisionsliste detail table
          ══════════════════════════════════════════ */}
      {period==="week" && (
        <div className="overflow-x-auto rounded-xl border border-slate-200 bg-white">
          <table className="min-w-full text-xs border-collapse">

            {/* ── Section 1: Kurs rows ── */}
            <thead>
              <tr className="bg-slate-100 border-b border-slate-300">
                <th className="text-left px-3 py-2 font-semibold text-slate-500 uppercase tracking-wide w-6">Kurs</th>
                <th className="text-left px-3 py-2 font-semibold text-slate-700 min-w-[160px]">Beschreibung</th>
                <th className="px-2 py-2 text-slate-500 font-medium w-10">Bem.</th>
                {DAY_NAMES.map((d,i)=>(
                  <th key={d} className={classNames("px-2 py-2 text-center font-semibold w-14",
                    localISO(days[i])===localISO(new Date())?"text-sky-700 bg-sky-50":"text-slate-600")}>
                    <div>{d}</div>
                    <div className="text-[10px] font-normal text-slate-400">{days[i].getDate()}.{days[i].getMonth()+1}.</div>
                  </th>
                ))}
                <th className="px-3 py-2 text-right font-semibold text-slate-700 w-20">Kurs Prov.</th>
              </tr>
            </thead>

            <tbody>
              {allKursRows.length===0 ? (
                <tr><td colSpan={11} className="px-4 py-6 text-center text-slate-400 italic">Keine abgeschlossenen Einheiten diese Woche</td></tr>
              ) : allKursRows.map(r=>(
                <tr key={r.key} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-1.5 text-slate-400 font-medium">Kurs:</td>
                  <td className="px-3 py-1.5 text-slate-800">
                    {r.desc}
                    {r.insName && <span className="ml-1.5 text-[10px] text-slate-400 bg-slate-100 rounded px-1">{r.insName}</span>}
                  </td>
                  <td className="px-2 py-1.5 text-center text-slate-500">{r.notes}</td>
                  {r.daySalaries.map((v,i)=>(
                    <td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>
                  ))}
                  <td className="px-3 py-1.5 text-right font-bold text-emerald-700">{r.total>0?`€${r.total.toFixed(2)}`:""}</td>
                </tr>
              ))}

              {/* Gesamt Tag row */}
              <tr className="bg-slate-50 border-t-2 border-slate-300">
                <td colSpan={3} className="px-3 py-2 font-bold text-slate-700 text-xs uppercase tracking-wide">Gesamt Tag:</td>
                {dayTotals.map((v,i)=>(
                  <td key={i} className={classNames(cellCls,"font-bold",v>0?"text-slate-800":"text-slate-300")}>{v>0?`€${v.toFixed(2)}`:""}</td>
                ))}
                <td className="px-3 py-2 text-right font-bold text-emerald-700 text-sm">€{weekKursTotal.toFixed(2)}</td>
              </tr>
            </tbody>

            {/* ── Section 2: Lehrer rows ── */}
            <tbody>
              <tr className="border-t-4 border-slate-300 bg-slate-100">
                <th colSpan={3} className="px-3 py-2 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Lehrer</th>
                {DAY_NAMES.map(d=>(
                  <th key={d} className="px-2 py-2 text-center text-xs font-semibold text-slate-500">Gehalt Tag:</th>
                ))}
                <th className="px-3 py-2 text-right text-xs font-semibold text-slate-500">Gesamt:</th>
                <th className="px-3 py-2 text-center text-xs font-semibold text-slate-500 w-16">Überw.</th>
              </tr>

              {/* Instructor rows */}
              {insWeekRows.map(({ins,daySalaries,total},idx)=>(
                <tr key={ins.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-2 text-slate-400 font-medium">Lehrer {idx+1}:</td>
                  <td colSpan={2} className="px-3 py-2 font-semibold text-slate-800">{ins.name}</td>
                  {daySalaries.map((v,i)=>(
                    <td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>
                  ))}
                  <td className="px-3 py-2 text-right font-bold text-emerald-700">{fmtE(total)}</td>
                  <td className="px-3 py-2 text-center">
                    <input type="checkbox" checked={!!paidMap[ins.id]} onChange={e=>setPaidMap(p=>({...p,[ins.id]:e.target.checked}))}
                      className="w-4 h-4 rounded accent-emerald-600" title="Als überwiesen markieren" />
                  </td>
                </tr>
              ))}

              {/* Admin rows */}
              {adminWeekRows.map(({admin,daySalaries,total},idx)=>(
                <tr key={admin.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-2 text-slate-400 font-medium">Admin {idx+1}:</td>
                  <td colSpan={2} className="px-3 py-2 font-semibold text-slate-800">{admin.name}</td>
                  {daySalaries.map((v,i)=>(
                    <td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>
                  ))}
                  <td className="px-3 py-2 text-right font-bold text-emerald-700">{fmtE(total)}</td>
                  <td className="px-3 py-2 text-center">
                    <input type="checkbox" checked={!!paidMap[admin.id]} onChange={e=>setPaidMap(p=>({...p,[admin.id]:e.target.checked}))}
                      className="w-4 h-4 rounded accent-emerald-600" />
                  </td>
                </tr>
              ))}

              {/* Grand total row */}
              <tr className="border-t-2 border-slate-300 bg-slate-50">
                <td colSpan={3} className="px-3 py-2 font-bold text-slate-700 text-xs uppercase tracking-wide">Gesamt:</td>
                {insGrandTotals.map((v,i)=>(
                  <td key={i} className={classNames(cellCls,"font-bold",v>0?"text-slate-800":"text-slate-300")}>{v>0?`€${v.toFixed(2)}`:""}</td>
                ))}
                <td className="px-3 py-2 text-right font-bold text-emerald-700 text-sm">€{insGrandTotal.toFixed(2)}</td>
                <td />
              </tr>
            </tbody>

          </table>
        </div>
      )}

      {/* ══════════════════════════════════════════
          MONTH mode — same detailed table as week
          ══════════════════════════════════════════ */}
      {period==="month" && (
        <div className="overflow-x-auto rounded-xl border border-slate-200 bg-white">
          <table className="min-w-full text-xs border-collapse">
            <thead>
              <tr className="bg-slate-100 border-b border-slate-300">
                <th className="text-left px-3 py-2 font-semibold text-slate-500 uppercase tracking-wide w-6">Kurs</th>
                <th className="text-left px-3 py-2 font-semibold text-slate-700 min-w-[160px]">Beschreibung</th>
                <th className="px-2 py-2 text-slate-500 font-medium w-10">Bem.</th>
                {monthDays.map((d,i)=>(
                  <th key={i} className={classNames("px-1 py-2 text-center font-semibold w-10",
                    localISO(d)===localISO(new Date())?"text-sky-700 bg-sky-50":"text-slate-600")}>
                    <div className="text-[10px] font-normal text-slate-400">{["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()]}</div>
                    <div>{d.getDate()}</div>
                  </th>
                ))}
                <th className="px-3 py-2 text-right font-semibold text-slate-700 w-20">Kurs Prov.</th>
              </tr>
            </thead>
            <tbody>
              {allMonthKursRows.length===0 ? (
                <tr><td colSpan={monthDays.length+4} className="px-4 py-6 text-center text-slate-400 italic">Keine abgeschlossenen Einheiten diesen Monat</td></tr>
              ) : allMonthKursRows.map(r=>(
                <tr key={r.key} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-1.5 text-slate-400 font-medium">Kurs:</td>
                  <td className="px-3 py-1.5 text-slate-800">{r.desc}{r.insName&&<span className="ml-1.5 text-[10px] text-slate-400 bg-slate-100 rounded px-1">{r.insName}</span>}</td>
                  <td className="px-2 py-1.5 text-center text-slate-500">{r.notes}</td>
                  {r.daySalaries.map((v,i)=><td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>)}
                  <td className="px-3 py-1.5 text-right font-bold text-emerald-700">{r.total>0?`€${r.total.toFixed(2)}`:""}</td>
                </tr>
              ))}
              <tr className="bg-slate-50 border-t-2 border-slate-300">
                <td colSpan={3} className="px-3 py-2 font-bold text-slate-700 text-xs uppercase tracking-wide">Gesamt Tag:</td>
                {monthDayTotals.map((v,i)=><td key={i} className={classNames(cellCls,"font-bold",v>0?"text-slate-800":"text-slate-300")}>{v>0?`€${v.toFixed(2)}`:""}</td>)}
                <td className="px-3 py-2 text-right font-bold text-emerald-700 text-sm">€{monthKursTotal.toFixed(2)}</td>
              </tr>
            </tbody>
            <tbody>
              <tr className="border-t-4 border-slate-300 bg-slate-100">
                <th colSpan={3} className="px-3 py-2 text-left text-xs font-semibold text-slate-500 uppercase tracking-wide">Lehrer</th>
                {monthDays.map((_,i)=><th key={i} className="px-1 py-2 text-center text-[10px] font-semibold text-slate-500">Gehalt</th>)}
                <th className="px-3 py-2 text-right text-xs font-semibold text-slate-500">Gesamt:</th>
                <th className="px-3 py-2 text-center text-xs font-semibold text-slate-500 w-16">Überw.</th>
              </tr>
              {insMonthRows.map(({ins,daySalaries,total},idx)=>(
                <tr key={ins.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-2 text-slate-400 font-medium">Lehrer {idx+1}:</td>
                  <td colSpan={2} className="px-3 py-2 font-semibold text-slate-800">{ins.name}</td>
                  {daySalaries.map((v,i)=><td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>)}
                  <td className="px-3 py-2 text-right font-bold text-emerald-700">{fmtE(total)}</td>
                  <td className="px-3 py-2 text-center">
                    <input type="checkbox" checked={!!paidMap[ins.id]} onChange={e=>setPaidMap(p=>({...p,[ins.id]:e.target.checked}))}
                      className="w-4 h-4 rounded accent-emerald-600" title="Als überwiesen markieren"/>
                  </td>
                </tr>
              ))}
              {adminMonthRows.map(({admin,daySalaries,total},idx)=>(
                <tr key={admin.id} className="border-b border-slate-100 hover:bg-slate-50/50">
                  <td className="px-3 py-2 text-slate-400 font-medium">Admin {idx+1}:</td>
                  <td colSpan={2} className="px-3 py-2 font-semibold text-slate-800">{admin.name}</td>
                  {daySalaries.map((v,i)=><td key={i} className={numCls(v)}>{v>0?`€${v.toFixed(2)}`:""}</td>)}
                  <td className="px-3 py-2 text-right font-bold text-emerald-700">{fmtE(total)}</td>
                  <td className="px-3 py-2 text-center">
                    <input type="checkbox" checked={!!paidMap[admin.id]} onChange={e=>setPaidMap(p=>({...p,[admin.id]:e.target.checked}))}
                      className="w-4 h-4 rounded accent-emerald-600"/>
                  </td>
                </tr>
              ))}
              <tr className="border-t-2 border-slate-300 bg-slate-50">
                <td colSpan={3} className="px-3 py-2 font-bold text-slate-700 text-xs uppercase tracking-wide">Gesamt:</td>
                {insMonthGrandTotals.map((v,i)=><td key={i} className={classNames(cellCls,"font-bold",v>0?"text-slate-800":"text-slate-300")}>{v>0?`€${v.toFixed(2)}`:""}</td>)}
                <td className="px-3 py-2 text-right font-bold text-emerald-700 text-sm">€{insMonthGrandTotal.toFixed(2)}</td>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {/* ══════════════════════════════════════════
          ALL mode — simple summary table
          ══════════════════════════════════════════ */}
      {period==="all" && (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>
                {["Name","Std. (h)","Gehalt (€)"].map(h=>(
                  <th key={h} className="text-left text-xs font-semibold text-slate-500 uppercase tracking-wide px-4 py-3">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              <tr><td colSpan={3} className="px-4 pt-3 pb-1 text-xs font-semibold text-slate-400 uppercase tracking-widest">Lehrer</td></tr>
              {summaryRows.map(({ins,actualH,salary})=>(
                <tr key={ins.id} className="hover:bg-slate-50/50">
                  <td className="px-4 py-3 font-medium text-slate-800">{ins.name}</td>
                  <td className="px-4 py-3 tabular-nums text-slate-800 font-semibold">{actualH}h</td>
                  <td className="px-4 py-3 tabular-nums font-bold text-emerald-700 text-base">{salary>0?`€${salary.toFixed(2)}`:<span className="text-slate-400 font-normal text-xs">—</span>}</td>
                </tr>
              ))}
              {adminSummaryRows.filter(r=>r.actualH>0).length>0&&<>
                <tr><td colSpan={3} className="px-4 pt-4 pb-1 text-xs font-semibold text-slate-400 uppercase tracking-widest border-t border-slate-100">Admins</td></tr>
                {adminSummaryRows.filter(r=>r.actualH>0).map(({admin,actualH,salary})=>(
                  <tr key={admin.id} className="hover:bg-slate-50/50">
                    <td className="px-4 py-3 font-medium text-slate-800">{admin.name}</td>
                    <td className="px-4 py-3 tabular-nums text-slate-800 font-semibold">{actualH}h</td>
                    <td className="px-4 py-3 tabular-nums font-bold text-emerald-700 text-base">{salary>0?`€${salary.toFixed(2)}`:<span className="text-slate-400 font-normal text-xs">—</span>}</td>
                  </tr>
                ))}
              </>}
            </tbody>
            <tfoot className="border-t-2 border-slate-300 bg-slate-50">
              <tr>
                <td className="px-4 py-3 font-bold text-slate-800">GESAMT</td>
                <td className="px-4 py-3 tabular-nums font-bold text-slate-800">{summaryTotalH}h</td>
                <td className="px-4 py-3 tabular-nums font-bold text-emerald-700 text-base">€{summaryTotalPay.toFixed(2)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}

      {/* No-rate warning */}
      {summaryRows.some(r=>(tasks||[]).some(t=>t.instructorId===r.ins.id&&t.status==="completed")&&!r.ins.hourRate)&&(
        <p className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
          Einige Lehrer haben Tasks, aber keinen Stundensatz. Bitte in den <strong>Instructor</strong>-Einstellungen ergänzen.
        </p>
      )}
    </div>
  );
}

// ---------- My Hours export helpers ----------
function exportMyHoursXLSX(instructorId, weekLessons, students, days, instructors, myHours) {
  if (!window.XLSX) { alert('SheetJS not loaded'); return; }
  const insName = instructorId ? ((instructors||[]).find(i=>i.id===instructorId)?.name || "") : null;
  const weekLabel = `${localISO(days[0])}_${localISO(days[6])}`;
  // Both modes: Date, Day, Start, Student, Instructor, Course, Planned, Actual, Status, Notes
  const headers = ["Date","Day","Start","Student","Instructor","Course","Planned (h)","Actual (h)","Status","Notes"];

  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const rows = [...weekLessons]
    .sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.startTime||"").localeCompare(b.startTime||""))
    .map(l => {
      const stu = (students||[]).find(s=>s.id===l.studentId);
      const ins = (instructors||[]).find(i=>i.id===l.instructorId);
      const d = new Date(l.date); const dow = dayNames[(d.getDay()+6)%7];
      const planned = l.status !== "cancelled" ? (+l.hours||0) : 0;
      const actual  = l.status === "completed"  ? +(l.actualHours ?? l.hours)||0 : 0;
      return [l.date||"", dow, l.startTime||"", stu?.name||"", ins?.name||"", stu?.course||"", planned, actual, l.status||"", l.notes||""];
    });

  // Slot-deduped totals for summary row (concurrent group lessons = 1 slot each)
  const totalPlanned = totalSlotPlannedHours(weekLessons);
  const totalActual  = totalSlotHours(weekLessons);
  const aoa = [headers, ...rows, [], ["","","","","","Total planned:", totalPlanned, "Total actual:", totalActual]];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [12,6,7,24,14,8,10,10,12,24].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "My Hours");
  // Admin: also add manual log sheet
  if (!instructorId && myHours) {
    const mhAOA = [["Date","Session","Hours","Notes"],
      ...Object.entries(myHours).filter(([,v])=>v.session).sort(([a],[b])=>a.localeCompare(b))
        .map(([k,v]) => {
          const SESSION_H_EXP = { "0.5h": 0.5, "2h": 2, "4h": 4 };
          const h = SESSION_H_EXP[v.session] || 0;
          return [k, v.session, h, v.notes||""];
        })];
    const wsM = XLSX.utils.aoa_to_sheet(mhAOA);
    wsM['!cols'] = [12,10,8,30].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, wsM, "Manual Log");
  }
  const fileLabel = insName ? `MyHours_${insName}_${weekLabel}` : `MyHours_${weekLabel}`;
  XLSX.writeFile(wb, `${fileLabel}.xlsx`);
}

function exportMyHoursPDF(instructorId, weekLessons, students, instructors, days, myHours) {
  if (!window.jspdf) { alert('jsPDF not loaded'); return; }
  const { jsPDF } = window.jspdf;
  const insName = instructorId ? ((instructors||[]).find(i=>i.id===instructorId)?.name || "") : null;
  const weekLabel = `${localISO(days[0])} – ${localISO(days[6])}`;
  const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });

  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const sorted = [...weekLessons].sort((a,b)=>(a.date||"").localeCompare(b.date||"")||(a.startTime||"").localeCompare(b.startTime||""));
  // Slot-deduped totals — concurrent group lessons count as 1 h, not N h
  const totalPlanned = totalSlotPlannedHours(weekLessons);
  const totalActual  = totalSlotHours(weekLessons);

  const title = insName ? `My Hours — ${insName} — ${weekLabel}` : `My Hours — ${weekLabel}`;
  doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text(title, 14, 14);
  doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text(`${sorted.length} lessons  ·  Planned: ${totalPlanned}h  ·  Actual: ${totalActual}h`, 14, 20);

  // Both modes: same columns — instructor + course always included
  const head = [["Date","Day","Start","Student","Instructor","Course","Planned","Actual","Status"]];
  const body = sorted.map(l => {
    const stu = (students||[]).find(s=>s.id===l.studentId);
    const ins = (instructors||[]).find(i=>i.id===l.instructorId);
    const d = new Date(l.date); const dow = dayNames[(d.getDay()+6)%7];
    const planned = l.status!=="cancelled" ? `${l.hours}h` : "—";
    const actual  = l.status==="completed"  ? `${l.actualHours ?? l.hours}h` : "—";
    return [l.date||"", dow, l.startTime||"", stu?.name||"—", ins?.name||"—", stu?.course||"—", planned, actual, l.status||""];
  });
  body.push(["","","","","","Total planned:",`${totalPlanned}h`,"Total actual:",`${totalActual}h`]);

  doc.autoTable({
    startY: 24,
    head,
    body,
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillColor: [3,105,161], textColor: 255, fontStyle: "bold" },
    alternateRowStyles: { fillColor: [241,245,249] },
    columnStyles: { 3: { cellWidth: 36 } },
    margin: { left: 14, right: 14 }
  });

  // Admin: add manual log on page 2
  if (!instructorId && myHours) {
    const entries = Object.entries(myHours).filter(([,v])=>v.session).sort(([a],[b])=>a.localeCompare(b));
    if (entries.length > 0) {
      doc.addPage();
      doc.setFont("helvetica","bold"); doc.setFontSize(12);
      doc.text("Manual Hours Log", 14, 14);
      const mhBody = entries.map(([k,v]) => {
        const SESSION_H_EXP = { "0.5h": 0.5, "2h": 2, "4h": 4 };
        const h = SESSION_H_EXP[v.session] || 0;
        return [k, v.session, `${h}h`, v.notes||""];
      });
      doc.autoTable({
        startY: 20,
        head: [["Date","Session","Hours","Notes"]],
        body: mhBody,
        styles: { fontSize: 8, cellPadding: 2 },
        headStyles: { fillColor: [3,105,161], textColor: 255, fontStyle: "bold" },
        alternateRowStyles: { fillColor: [241,245,249] },
        margin: { left: 14, right: 14 }
      });
    }
  }
  const fileLabel = insName ? `MyHours_${insName}_${localISO(days[0])}_${localISO(days[6])}` : `MyHours_${localISO(days[0])}_${localISO(days[6])}`;
  doc.save(`${fileLabel}.pdf`);
}

// ---------- My Hours Tracker ----------
function MyHours({ myHours, upd, instructorId, adminId, lessons, students, instructors, updLesson, addLesson, delLesson, tasks, addTask, updTask, delTask, state }) {
  const weekStart = () => {
    const d = new Date(); d.setHours(0,0,0,0);
    const dow = (d.getDay()+6)%7; // monday=0
    d.setDate(d.getDate()-dow);
    return d;
  };
  const [anchor, setAnchor] = useState(weekStart);
  const shift = (n) => { const d=new Date(anchor); d.setDate(anchor.getDate()+n*7); setAnchor(d); };
  const isThisWeek = localISO(anchor) === localISO(weekStart());

  // Add-lesson inline form state (instructor mode)
  const BLANK_NEW = { studentId: "", startTime: "09:00", hours: 1.5, lessonType: "" };
  const [addingTo, setAddingTo] = useState(null); // ISO date or null
  const [newLesson, setNewLesson] = useState(BLANK_NEW);
  const openAddForm = (iso) => { setAddingTo(iso); setNewLesson(BLANK_NEW); closeTaskForm(); };
  const closeAddForm = () => { setAddingTo(null); setNewLesson(BLANK_NEW); };
  const saveNewLesson = (iso) => {
    if (!newLesson.studentId) return;
    const [th] = (newLesson.startTime||"09:00").split(':').map(Number);
    if (th < 6 || th >= 21) { alert("Start time must be between 06:00 and 21:00."); return; }
    addLesson && addLesson({
      date: iso,
      instructorId,
      studentId: newLesson.studentId,
      startTime: newLesson.startTime,
      hours: +newLesson.hours || 1.5,
      lessonType: newLesson.lessonType || undefined,
      spot: state?.settings?.spotName || "Sample Spot, NL",
      source: "myhours",
    });
    closeAddForm();
  };

  // Add-task inline form state (instructor mode)
  const BLANK_TASK = { description: "", startTime: "09:00", hours: 1 };
  const [addingTaskTo, setAddingTaskTo] = useState(null); // ISO date or null
  const [newTask, setNewTask] = useState(BLANK_TASK);
  const openTaskForm  = (iso) => { setAddingTaskTo(iso); setNewTask(BLANK_TASK); closeAddForm(); };
  const closeTaskForm = () => { setAddingTaskTo(null); setNewTask(BLANK_TASK); };
  const saveNewTask   = (iso) => {
    if (!newTask.description.trim()) return;
    addTask && addTask({ date: iso, instructorId, description: newTask.description.trim(), startTime: newTask.startTime || "09:00", hours: +newTask.hours || 1 });
    closeTaskForm();
  };

  const days = Array.from({length:7}, (_,i)=>{ const d=new Date(anchor); d.setDate(anchor.getDate()+i); return d; });
  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const getDay = (iso) => myHours[iso] || { session: "", notes: "" };
  const setNotes = (iso, notes) => {
    upd({ ...myHours, [iso]: { ...getDay(iso), notes } });
  };

  // ── INSTRUCTOR MODE: hours from lessons ──
  if (instructorId) {
    const myLessons = (lessons || []).filter(l => l.instructorId === instructorId);
    const lessonsOnDay  = (iso) => myLessons.filter(l => l.date === iso)
      .sort((a,b) => (a.startTime||"").localeCompare(b.startTime||""));
    // planned = l.hours (never changes); actual = l.actualHours ?? l.hours for completed
    const myTasks      = (tasks||[]).filter(t => t.instructorId === instructorId);
    const tasksOnDay   = (iso) => myTasks.filter(t => t.date === iso);
    const lessonActualH = (l) => l.status === "completed" ? +(l.actualHours ?? l.hours) || 0 : 0;
    // Slot-deduped totals: concurrent group lessons count as 1 slot, not N lessons
    const plannedOnDay  = (iso) => totalSlotPlannedHours(lessonsOnDay(iso))
                                 + tasksOnDay(iso).reduce((s,t) => s + (+t.hours||0), 0);
    const actualOnDay   = (iso) => totalSlotHours(lessonsOnDay(iso))
                                 + tasksOnDay(iso).filter(t => t.status === "completed").reduce((s,t) => s + (+t.hours||0), 0);

    const monthKey = localISO(anchor).slice(0, 7);

    const weekPlanned  = days.reduce((s,d) => s + plannedOnDay(localISO(d)), 0);
    const weekActual   = days.reduce((s,d) => s + actualOnDay(localISO(d)), 0);

    const monthLessons  = myLessons.filter(l => l.date?.startsWith(monthKey));
    const monthTasksArr = myTasks.filter(t => t.date?.startsWith(monthKey));
    const monthPlanned  = totalSlotPlannedHours(monthLessons)
                        + monthTasksArr.reduce((s,t) => s + (+t.hours||0), 0);
    const monthActual   = totalSlotHours(monthLessons)
                        + monthTasksArr.filter(t=>t.status==="completed").reduce((s,t) => s + (+t.hours||0), 0);

    const allPlanned    = totalSlotPlannedHours(myLessons)
                        + myTasks.reduce((s,t) => s + (+t.hours||0), 0);
    const allActual     = totalSlotHours(myLessons)
                        + myTasks.filter(t=>t.status==="completed").reduce((s,t) => s + (+t.hours||0), 0);

    const todayISO_ = todayISO();
    const statusColor = (s) => s==="completed" ? "bg-emerald-100 text-emerald-700" : s==="cancelled" ? "bg-rose-100 text-rose-700" : "bg-sky-100 text-sky-700";

    return (
      <div className="space-y-4">
        {/* Planned vs Actual summary cards */}
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          {[
            { label: "This week",  planned: weekPlanned,  actual: weekActual,  color: "bg-sky-50 border-sky-200 text-sky-700" },
            { label: new Date(anchor).toLocaleString("en",{month:"long", year:"numeric"}), planned: monthPlanned, actual: monthActual, color: "bg-indigo-50 border-indigo-200 text-indigo-700" },
            { label: "All time",   planned: allPlanned,   actual: allActual,   color: "bg-emerald-50 border-emerald-200 text-emerald-700" },
          ].map(card => (
            <div key={card.label} className={classNames("rounded-xl border p-3 text-center", card.color)}>
              <div className="text-xs font-semibold mb-2 opacity-80">{card.label}</div>
              <div className="flex justify-around items-end gap-1">
                <div>
                  <div className="text-xl font-bold tabular-nums">{card.planned}h</div>
                  <div className="text-[10px] opacity-60 mt-0.5">planned</div>
                </div>
                <div className="text-lg opacity-20 mb-1">/</div>
                <div>
                  <div className="text-xl font-bold tabular-nums">{card.actual}h</div>
                  <div className="text-[10px] opacity-60 mt-0.5">actual</div>
                </div>
              </div>
            </div>
          ))}
        </div>

        <section className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="flex items-center gap-2 mb-4 flex-wrap">
            <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(-1)}>← Prev</button>
            <h2 className="font-semibold">Week of {localISO(days[0])} – {localISO(days[6])}</h2>
            <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(1)}>Next →</button>
            {!isThisWeek && <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>setAnchor(weekStart())}>Today</button>}
            <span className="text-sm font-semibold tabular-nums text-slate-600">
              {weekPlanned}h planned · {weekActual}h actual
            </span>
            <div className="ml-auto flex gap-1.5">
              <button className="px-2.5 py-1 rounded text-xs font-medium bg-emerald-600 hover:bg-emerald-700 text-white"
                onClick={() => exportMyHoursXLSX(instructorId, myLessons, students, days, instructors)}>Excel</button>
              <button className="px-2.5 py-1 rounded text-xs font-medium bg-rose-600 hover:bg-rose-700 text-white"
                onClick={() => exportMyHoursPDF(instructorId, myLessons, students, instructors, days)}>PDF</button>
            </div>
          </div>
          <div className="space-y-2">
            {days.map((d, i) => {
              const iso    = localISO(d);
              const dayL   = lessonsOnDay(iso);
              const dayP   = plannedOnDay(iso);
              const dayA   = actualOnDay(iso);
              const entry  = getDay(iso);
              const isToday = iso === todayISO_;
              return (
                <div key={iso} className={classNames("rounded-lg border p-3",
                  isToday ? "border-sky-300 bg-sky-50" : "border-slate-200 bg-white")}>
                  <div className="flex items-center gap-3 flex-wrap">
                    <div className="w-24 shrink-0">
                      <span className={classNames("font-semibold text-sm", isToday ? "text-sky-700" : "text-slate-700")}>{dayNames[i]}</span>
                      <span className="text-xs text-slate-400 ml-1.5 tabular-nums">{iso.slice(5)}</span>
                      {isToday && <span className="ml-1.5 text-[9px] bg-sky-500 text-white rounded px-1 font-semibold">today</span>}
                    </div>
                    {dayP > 0 || dayA > 0
                      ? <div className="flex items-center gap-1.5">

                  </div>
                  {dayL.length > 0 && (

                        <button
                          onClick={() => saveNewLesson(iso)}
                          disabled={!newLesson.studentId}
                          className="px-3 py-1 rounded text-xs font-semibold bg-sky-600 hover:bg-sky-700 text-white disabled:opacity-40 disabled:cursor-not-allowed">
                          Save
                        </button>
                        <button onClick={closeAddForm}
                          className="px-3 py-1 rounded text-xs font-medium bg-white border border-slate-200 hover:bg-slate-50 text-slate-600">
                          Cancel
                        </button>
                      </div>
                    </div>
                  ) : addingTaskTo === iso ? (
                    <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-2.5 space-y-2">
                      <div className="text-xs font-semibold text-amber-700 mb-1">Add task on {iso}</div>
                      <div className="flex flex-wrap gap-2">
                        <input type="text" autoFocus placeholder="Description (e.g. Equipment check)"
                          value={newTask.description}
                          onChange={e=>setNewTask({...newTask, description: e.target.value})}
                          className="flex-1 min-w-[160px] border border-slate-200 rounded px-2 py-1 text-xs focus:border-amber-400 outline-none bg-white"/>
                        <TimeInput value={newTask.startTime||"09:00"}
                          onChange={v=>setNewTask({...newTask, startTime: v})}
                          className="w-24 border-slate-200 text-xs focus:border-amber-400 outline-none bg-white"/>
                        <div className="flex items-center gap-0.5">
                          <input type="number" min="0.5" max="24" step="0.5"
                            value={newTask.hours}
                            onChange={e=>setNewTask({...newTask, hours: e.target.value})}
                            className="w-14 border border-slate-200 rounded px-2 py-1 text-xs text-center focus:border-amber-400 outline-none bg-white tabular-nums"/>
                          <span className="text-slate-400 text-[10px] ml-0.5">h</span>
                        </div>
                      </div>
                      <div className="flex gap-1.5">
                        <button
                          onClick={() => saveNewTask(iso)}
                          disabled={!newTask.description.trim()}
                          className="px-3 py-1 rounded text-xs font-semibold bg-amber-500 hover:bg-amber-600 text-white disabled:opacity-40 disabled:cursor-not-allowed">
                          Save
                        </button>
                        <button onClick={closeTaskForm}
                          className="px-3 py-1 rounded text-xs font-medium bg-white border border-slate-200 hover:bg-slate-50 text-slate-600">
                          Cancel
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="mt-2 flex gap-1.5">
                      <button onClick={() => openAddForm(iso)}
                        className="flex-1 text-xs text-slate-400 hover:text-sky-600 hover:bg-sky-50 border border-dashed border-slate-200 hover:border-sky-300 rounded-lg py-1.5 transition-colors">
                        + Add lesson
                      </button>
                      <button onClick={() => openTaskForm(iso)}
                        className="flex-1 text-xs text-slate-400 hover:text-amber-600 hover:bg-amber-50 border border-dashed border-slate-200 hover:border-amber-300 rounded-lg py-1.5 transition-colors">
                        + Add task
                      </button>
                    </div>
                  )}
                  <div className="mt-2">
                    <input type="text" placeholder="Note for this day…" value={entry.notes||""}
                      onChange={e=>setNotes(iso, e.target.value)}
                      className="w-full text-xs px-2.5 py-1.5 rounded border border-slate-200 focus:border-sky-400 outline-none bg-transparent placeholder-slate-300"/>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      </div>
    );
  }

  // ── ADMIN MODE: manual session tracker + tasks ──
  const SESSION_OPTS = [
    { key: "",     label: "—",                  hours: 0,   desc: "No work" },
    { key: "0.5h", label: "0.5h  ½ hr",         hours: 0.5, desc: "Half-hour session" },
    { key: "2h",   label: "2h  9–11",            hours: 2,   desc: "Morning session" },
    { key: "4h",   label: "4h  9–11 + 15–17",   hours: 4,   desc: "Full day" },
  ];

  const setSession = (iso, session) => {
    upd({ ...myHours, [iso]: { ...getDay(iso), session } });
  };

  // Admin task state (mirrors instructor mode task forms above, but uses adminId)
  const adminTasks = (tasks||[]).filter(t => t.instructorId === adminId);
  const adminTasksOnDay = (iso) => adminTasks.filter(t => t.date === iso);
  const [addingAdminTaskTo, setAddingAdminTaskTo] = useState(null);
  const [newAdminTask, setNewAdminTask] = useState({ description: "", startTime: "09:00", hours: 1 });
  const openAdminTaskForm  = (iso) => { setAddingAdminTaskTo(iso); setNewAdminTask({ description: "", startTime: "09:00", hours: 1 }); };
  const closeAdminTaskForm = () => { setAddingAdminTaskTo(null); setNewAdminTask({ description: "", startTime: "09:00", hours: 1 }); };
  const saveAdminTask = (iso) => {
    if (!newAdminTask.description.trim()) return;
    addTask && addTask({ date: iso, instructorId: adminId, description: newAdminTask.description.trim(), startTime: newAdminTask.startTime || "09:00", hours: +newAdminTask.hours || 1 });
    closeAdminTaskForm();
  };

  const ADMIN_RATE = 15; // €/h for admin tasks

  // ── INVOICE (Tanya only) ──
  const isTanya = adminId === "adm0tanya";
  const [mySubTab, setMySubTab] = useState("hours");
  const [invoiceNum, setInvoiceNum] = useState(() => `1/${new Date().getFullYear()}`);
  const [invoiceDate, setInvoiceDate] = useState(todayISO());
  const [invoicePeriodFrom, setInvoicePeriodFrom] = useState(() => todayISO().slice(0, 7));
  const [invoicePeriodTo,   setInvoicePeriodTo]   = useState(() => todayISO().slice(0, 7));
  const [invoiceRows, setInvoiceRows] = useState([]);
  const addInvoiceRow = () => setInvoiceRows(r => [...r, { id: "r"+Date.now(), period: "", description: "", amount: "" }]);
  const updInvoiceRow = (id, field, val) => setInvoiceRows(r => r.map(x => x.id === id ? { ...x, [field]: val } : x));
  const delInvoiceRow = (id) => setInvoiceRows(r => r.filter(x => x.id !== id));
  const invoiceTotal = invoiceRows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);

  // Format "YYYY-MM" → "MM/YYYY"
  const fmtPeriod = (ym) => ym ? ym.slice(5) + "/" + ym.slice(0, 4) : "";

  // Enumerate all "YYYY-MM" strings from from→to inclusive
  const monthsInRange = (from, to) => {
    const result = [];
    let [fy, fm] = (from||"").split("-").map(Number);
    let [ty, tm] = (to||"").split("-").map(Number);
    if (!fy || !ty) return result;
    if (fy > ty || (fy === ty && fm > tm)) { [fy,fm,ty,tm] = [ty,tm,fy,fm]; }
    let y = fy, m = fm;
    while (y < ty || (y === ty && m <= tm)) {
      result.push(`${y}-${String(m).padStart(2,"0")}`);
      m++; if (m > 12) { m = 1; y++; }
    }
    return result;
  };

  // Load actual hours across the selected month range into invoice rows
  const loadInvoiceHours = (from, to) => {
    const f = from || invoicePeriodFrom;
    const t = to   || invoicePeriodTo;
    const months = monthsInRange(f, t);
    const newRows = [];
    months.forEach(p => {
      const officeH = Object.entries(myHours)
        .filter(([k]) => k.startsWith(p))
        .reduce((sum, [, v]) => {
          const opt = SESSION_OPTS.find(o => o.key === v.session);
          return sum + (opt?.hours || 0);
        }, 0);
      if (officeH > 0) {
        newRows.push({ id: "r_office_"+p, period: fmtPeriod(p), description: `Office (${officeH}h)`, amount: (officeH * ADMIN_RATE).toFixed(2) });
      }
      const taskH = adminTasks
        .filter(t2 => t2.date?.startsWith(p) && t2.status === "completed")
        .reduce((s, t2) => s + (+t2.hours || 0), 0);
      if (taskH > 0) {
        newRows.push({ id: "r_tasks_"+p, period: fmtPeriod(p), description: `Tasks (${taskH}h)`, amount: (taskH * ADMIN_RATE).toFixed(2) });
      }
    });
    if (newRows.length === 0) {
      newRows.push({ id: "r_blank", period: months.length === 1 ? fmtPeriod(months[0]) : "", description: "", amount: "" });
    }
    setInvoiceRows(newRows);
  };

  const downloadInvoice = () => {
    if (!window.jspdf) { alert('jsPDF not loaded'); return; }
    const { jsPDF } = window.jspdf;
    const fmtEUR = (n) => n.toFixed(2).replace('.', ',') + ' €';
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    const W = 210; const L = 14; const R = W - 14;

    // Sender (top left)
    doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("Tatiana Kulagina", L, 18);
    doc.setFont("helvetica","normal"); doc.setFontSize(10);
    doc.text("Szeligowska 53b/50", L, 24);
    doc.text("Warsaw, Poland", L, 29);

    // Invoice meta (top right)
    doc.setFont("helvetica","bold"); doc.setFontSize(10);
    doc.text("Invoice No.:", R - 55, 18);
    doc.text("Invoice Date:", R - 55, 24);
    doc.setFont("helvetica","normal");
    doc.text(invoiceNum, R, 18, { align: "right" });
    doc.text(invoiceDate, R, 24, { align: "right" });

    // Recipient
    doc.setFont("helvetica","normal"); doc.setFontSize(10);
    doc.text("V.O.F. Kiteboarding Club", L, 44);
    doc.text("Kuijerdamseweg 4 Rg", L, 49);
    doc.text("4326 LL Noordwelle", L, 54);
    doc.text("brouwersdam@kiteboarding-club.com", L, 62);

    // Title
    doc.setFont("helvetica","bold"); doc.setFontSize(18);
    doc.text("Invoice", L, 76);

    // Services table
    const tableBody = invoiceRows.map(r => [
      r.period || "",
      r.description || "",
      r.amount ? fmtEUR(parseFloat(r.amount) || 0) : "",
    ]);
    tableBody.push(["", "Subtotal",     fmtEUR(invoiceTotal)]);
    tableBody.push(["", "Total Amount", fmtEUR(invoiceTotal)]);
    const subtotalIdx = tableBody.length - 2;
    const grandIdx    = tableBody.length - 1;

    doc.autoTable({
      startY: 80,
      head: [["Date / Period", "Description", "Amount (EUR)"]],
      body: tableBody,
      styles: { fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [30, 64, 175], textColor: 255, fontStyle: "bold" },
      columnStyles: {
        0: { cellWidth: 38 },
        2: { halign: "right", cellWidth: 38 },
      },
      didParseCell: (data) => {
        if (data.section === "body" && data.row.index === subtotalIdx) {
          data.cell.styles.fontStyle = "bold";
          data.cell.styles.fillColor = [241,245,249];
        }
        if (data.section === "body" && data.row.index === grandIdx) {
          data.cell.styles.fontStyle = "bold";
          data.cell.styles.fillColor = [219,234,254];
        }
      },
      margin: { left: L, right: 14 }
    });

    let y = doc.lastAutoTable.finalY + 10;

    // VAT note + sign-off
    doc.setFont("helvetica","normal"); doc.setFontSize(9);
    doc.text("This invoice is VAT-exempt pursuant to the small business regulation (§ 19 (1) UStG).", L, y);
    y += 5;
    doc.text("Please transfer the total amount within 7 days of receipt of this invoice.", L, y);
    y += 12;
    doc.text("Best regards,", L, y); y += 10;
    doc.setFont("helvetica","bold");
    doc.text("Tatiana Kulagina", L, y);

    // Banking details
    y += 14;
    doc.setDrawColor(200); doc.line(L, y, R, y); y += 6;
    doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text("Payment details", L, y); y += 5;
    doc.setFont("helvetica","normal");
    const bankRows = [
      ["Beneficiary:",            "Tatiana Kulagina"],
      ["IBAN:",                   "LT58 3250 0015 7603 2036"],
      ["BIC/SWIFT:",              "REVOLT21"],
      ["Bank:",                   "Revolut Bank UAB, Konstitucijos ave. 21B, 08130, Vilnius, Lithuania"],
      ["Correspondent bank BIC:", "CHASDEFX"],
    ];
    bankRows.forEach(([label, val]) => {
      doc.setFont("helvetica","bold"); doc.text(label, L, y);
      doc.setFont("helvetica","normal"); doc.text(val, L + 50, y);
      y += 5;
    });

    doc.save("Invoice_" + invoiceNum.replace("/","_") + "_" + invoiceDate + ".pdf");
  };

  // Weekly total (manual sessions + tasks)
  const weekTotal = days.reduce((sum, d) => {
    const iso = localISO(d);
    const entry = getDay(iso);
    const opt = SESSION_OPTS.find(o => o.key === entry.session);
    const taskH = adminTasksOnDay(iso).filter(t=>t.status==="completed").reduce((s,t)=>s+(+t.hours||0),0);
    return sum + (opt?.hours || 0) + taskH;
  }, 0);

  // Monthly summary: all entries in the same year-month as anchor
  const monthKey = localISO(anchor).slice(0, 7); // "YYYY-MM"
  const monthSessionTotal = Object.entries(myHours)
    .filter(([k]) => k.startsWith(monthKey))
    .reduce((sum, [, v]) => {
      const opt = SESSION_OPTS.find(o => o.key === v.session);
      return sum + (opt?.hours || 0);
    }, 0);
  const monthTaskTotal = adminTasks.filter(t=>t.date?.startsWith(monthKey)&&t.status==="completed").reduce((s,t)=>s+(+t.hours||0),0);
  const monthTotal = monthSessionTotal + monthTaskTotal;
  const monthDays = Object.entries(myHours)
    .filter(([k]) => k.startsWith(monthKey) && myHours[k].session)
    .length;

  // All-time for the "grand total" card
  const allSessionTotal = Object.values(myHours).reduce((sum, v) => {
    const opt = SESSION_OPTS.find(o => o.key === v.session);
    return sum + (opt?.hours || 0);
  }, 0);
  const allTaskTotal = adminTasks.filter(t=>t.status==="completed").reduce((s,t)=>s+(+t.hours||0),0);
  const allTotal = allSessionTotal + allTaskTotal;

  const todayISO_ = todayISO();

  // ── Invoice panel (Tanya only) ──
  if (isTanya && mySubTab === "invoice") {
    return (
      <div className="space-y-4">
        {/* Sub-tab nav */}
        <div className="flex gap-0 border-b border-slate-200">
          <button onClick={() => setMySubTab("hours")}
            className="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors -mb-px">
            ⏱ Hours
          </button>
          <button onClick={() => setMySubTab("invoice")}
            className="px-4 py-2 text-sm font-medium border-b-2 border-violet-500 text-violet-700 bg-white transition-colors -mb-px">
            📄 Invoice
          </button>
        </div>

        {/* Invoice form */}
        <section className="bg-white rounded-xl border border-slate-200 p-5 space-y-5">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <h2 className="font-bold text-lg text-slate-800">Generate Invoice</h2>
            <button onClick={downloadInvoice}
              className="px-4 py-2 rounded-lg text-sm font-semibold bg-violet-600 hover:bg-violet-700 text-white shadow-sm">
              ⬇ Download PDF
            </button>
          </div>

          {/* Invoice meta */}
          <div className="flex flex-wrap gap-4 items-end">
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1">Invoice No.</label>
              <input type="text" value={invoiceNum} onChange={e => setInvoiceNum(e.target.value)}
                className="w-32 border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:border-violet-400 outline-none"/>
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1">Invoice Date</label>
              <input type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)}
                className="w-40 border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:border-violet-400 outline-none"/>
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1">Billing Period</label>
              <div className="flex gap-2 items-center flex-wrap">
                <input type="month" value={invoicePeriodFrom}
                  onChange={e => setInvoicePeriodFrom(e.target.value)}
                  className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:border-violet-400 outline-none"/>
                <span className="text-xs text-slate-400">→</span>
                <input type="month" value={invoicePeriodTo}
                  onChange={e => setInvoicePeriodTo(e.target.value)}
                  className="border border-slate-200 rounded px-2.5 py-1.5 text-sm focus:border-violet-400 outline-none"/>
                <button onClick={() => loadInvoiceHours()}
                  className="px-3 py-1.5 rounded text-xs font-semibold bg-sky-600 hover:bg-sky-700 text-white whitespace-nowrap">
                  ↻ Load hours
                </button>
              </div>
            </div>
          </div>

          {/* Sender / Recipient preview */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-xs text-slate-600 bg-slate-50 rounded-lg p-3 border border-slate-200">
            <div>
              <div className="font-semibold text-slate-800 mb-1">From</div>
              <div className="font-medium">Tatiana Kulagina</div>
              <div>Szeligowska 53b/50</div>
              <div>Warsaw, Poland</div>
            </div>
            <div>
              <div className="font-semibold text-slate-800 mb-1">To</div>
              <div className="font-medium">V.O.F. Kiteboarding Club</div>
              <div>Kuijerdamseweg 4 Rg</div>
              <div>4326 LL Noordwelle</div>
            </div>
          </div>

          {/* Service rows */}
          <div>
            <div className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Services</div>
            <div className="space-y-2">
              {/* Header */}
              <div className="grid grid-cols-[170px_1fr_120px_32px] gap-2 text-xs font-semibold text-slate-500 px-1">
                <span>Date / Period</span><span>Description</span><span>Amount (EUR)</span><span/>
              </div>
              {invoiceRows.map(r => (
                <div key={r.id} className="grid grid-cols-[170px_1fr_120px_32px] gap-2 items-center">
                  <input type="text" placeholder="e.g. 07/2025" value={r.period}
                    onChange={e => updInvoiceRow(r.id, "period", e.target.value)}
                    className="border border-slate-200 rounded px-2 py-1.5 text-xs focus:border-violet-400 outline-none"/>
                  <input type="text" placeholder="Description" value={r.description}
                    onChange={e => updInvoiceRow(r.id, "description", e.target.value)}
                    className="border border-slate-200 rounded px-2 py-1.5 text-xs focus:border-violet-400 outline-none"/>
                  <div className="flex items-center gap-1">
                    <input type="number" placeholder="0.00" value={r.amount} min="0" step="0.01"
                      onChange={e => updInvoiceRow(r.id, "amount", e.target.value)}
                      className="w-full border border-slate-200 rounded px-2 py-1.5 text-xs text-right focus:border-violet-400 outline-none tabular-nums"/>
                    <span className="text-[10px] text-slate-400 shrink-0">€</span>
                  </div>
                  <button onClick={() => delInvoiceRow(r.id)} title="Remove row"
                    className="text-rose-400 hover:text-rose-600 text-sm font-bold leading-none"
                    disabled={invoiceRows.length === 1}>✕</button>
                </div>
              ))}
            </div>

            <button onClick={addInvoiceRow}
              className="mt-2 w-full text-xs text-slate-400 hover:text-violet-600 hover:bg-violet-50 border border-dashed border-slate-200 hover:border-violet-300 rounded-lg py-1.5 transition-colors">
              + Add row
            </button>

            {/* Total */}
            <div className="mt-3 flex justify-end">
              <div className="bg-violet-50 border border-violet-200 rounded-lg px-5 py-2.5 text-right">
                <div className="text-xs text-violet-600 font-medium">Total</div>
                <div className="text-xl font-bold text-violet-800 tabular-nums">
                  {invoiceTotal.toFixed(2).replace('.', ',')} €
                </div>
              </div>
            </div>
          </div>

          {/* Banking info preview */}
          <div className="text-xs text-slate-500 bg-slate-50 border border-slate-200 rounded-lg p-3 space-y-0.5">
            <div className="font-semibold text-slate-700 mb-1">Payment details</div>
            <div><span className="text-slate-400 w-36 inline-block">Beneficiary:</span> Tatiana Kulagina</div>
            <div><span className="text-slate-400 w-36 inline-block">IBAN:</span> LT58 3250 0015 7603 2036</div>
            <div><span className="text-slate-400 w-36 inline-block">BIC/SWIFT:</span> REVOLT21</div>
            <div><span className="text-slate-400 w-36 inline-block">Bank:</span> Revolut Bank UAB, Konstitucijos ave. 21B, 08130, Vilnius, Lithuania</div>
            <div><span className="text-slate-400 w-36 inline-block">Correspondent BIC:</span> CHASDEFX</div>
          </div>
        </section>
      </div>
    );
  }

  return (
    <div className="space-y-4">
      {/* Sub-tab nav — Tanya only */}
      {isTanya && (
        <div className="flex gap-0 border-b border-slate-200">
          <button onClick={() => setMySubTab("hours")}
            className="px-4 py-2 text-sm font-medium border-b-2 border-sky-500 text-sky-700 bg-white transition-colors -mb-px">
            ⏱ Hours
          </button>
          <button onClick={() => setMySubTab("invoice")}
            className="px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors -mb-px">
            📄 Invoice
          </button>
        </div>
      )}
      {/* My hours (manual session tracker) */}
      <div>
        <div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-2">My hours (manual log)</div>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          {[
            { label: "This week", value: `${weekTotal}h`, sub: `${days.filter(d=>getDay(localISO(d)).session).length} days`, color: "bg-sky-50 border-sky-200 text-sky-700" },
            { label: new Date(anchor).toLocaleString("default",{month:"long", year:"numeric"}), value: `${monthTotal}h`, sub: `${monthDays} days worked`, color: "bg-indigo-50 border-indigo-200 text-indigo-700" },
            { label: "All time", value: `${allTotal}h`, sub: `${Object.values(myHours).filter(v=>v.session).length} days total`, color: "bg-emerald-50 border-emerald-200 text-emerald-700" },
          ].map(card => (
            <div key={card.label} className={classNames("rounded-xl border p-3 text-center", card.color)}>
              <div className="text-2xl font-bold tabular-nums">{card.value}</div>
              <div className="text-xs font-medium mt-0.5">{card.label}</div>
              <div className="text-xs opacity-70 mt-0.5">{card.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Week navigation */}
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-4">
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(-1)}>← Prev</button>
          <h2 className="font-semibold">
            Week of {localISO(days[0])} – {localISO(days[6])}
          </h2>
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(1)}>Next →</button>
          {!isThisWeek && (
            <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>setAnchor(weekStart())}>Today</button>
          )}
          <span className="text-sm font-semibold tabular-nums text-slate-600">{weekTotal}h this week</span>
        </div>

        <div className="space-y-2">
          {days.map((d, i) => {
            const iso = localISO(d);
            const entry = getDay(iso);
            const isToday = iso === todayISO_;
            const isFuture = iso > todayISO_;
            return (
              <div key={iso} className={classNames(

                          "px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors",

                  {/* Hours badge */}

                      "text-xs font-semibold tabular-nums px-2 py-0.5 rounded-full",

                      return (

                            <span className="text-slate-400 text-[10px]">h</span>
                          </div>
                          <span className="text-[10px] text-amber-600 tabular-nums shrink-0">€{((+t.hours||0)*ADMIN_RATE).toFixed(2)}</span>
                          {tDone
                            ? <button title="Mark as pending"
                                className="shrink-0 text-[10px] font-semibold bg-amber-100 text-amber-700 border border-amber-200 rounded px-1.5 py-0.5 hover:bg-amber-200"
                                onClick={() => updTask && updTask(t.id, { status: "pending" })}>✓ done</button>
                            : <button title="Mark as completed"
                                className="shrink-0 text-[10px] font-semibold bg-white text-slate-500 border border-slate-200 rounded px-1.5 py-0.5 hover:bg-amber-50 hover:text-amber-700 hover:border-amber-300"
                                onClick={() => updTask && updTask(t.id, { status: "completed" })}>Mark done</button>
                          }
                          <button title="Delete task"
                            className="shrink-0 text-[10px] font-semibold bg-white text-rose-400 border border-rose-200 rounded px-1.5 py-0.5 hover:bg-rose-50 hover:text-rose-600"
                            onClick={() => delTask && delTask(t.id)}>✕</button>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Add task for admin */}
                {adminId && (
                  addingAdminTaskTo === iso ? (
                    <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-2.5 space-y-2">
                      <div className="text-xs font-semibold text-amber-700 mb-1">Add task on {iso} · €{ADMIN_RATE}/h</div>
                      <div className="flex flex-wrap gap-2">
                        <input type="text" autoFocus placeholder="Description (e.g. Rigging check)"
                          value={newAdminTask.description}
                          onChange={e=>setNewAdminTask({...newAdminTask, description: e.target.value})}
                          className="flex-1 min-w-[160px] border border-slate-200 rounded px-2 py-1 text-xs focus:border-amber-400 outline-none bg-white"/>
                        <TimeInput value={newAdminTask.startTime||"09:00"}

                          className="w-24 border-slate-200 text-xs focus:border-amber-400 outline-none bg-white"/>
                        <div className="flex items-center gap-0.5">
                          <input type="number" min="0.5" max="24" step="0.5"
                            value={newAdminTask.hours}
                            onChange={e=>setNewAdminTask({...newAdminTask, hours: e.target.value})}

                      </div>
                      <div className="flex gap-1.5">
                        <button
                          onClick={() => saveAdminTask(iso)}

                          Save
                        </button>

                      </div>
                    </div>
                  ) : (
                    <button onClick={() => openAdminTaskForm(iso)}
                      className="mt-2 w-full text-xs text-slate-400 hover:text-amber-600 hover:bg-amber-50 border border-dashed border-slate-200 hover:border-amber-300 rounded-lg py-1.5 transition-colors">
                      + Add task
                    </button>
                  )
                )}
              </div>
            );
          })}
        </div>
      </section>

      {/* Monthly breakdown */}
      {monthTotal > 0 && (
        <section className="bg-white rounded-xl border border-slate-200 p-4">
          <h2 className="font-semibold mb-3">
            {new Date(anchor).toLocaleString("default",{month:"long", year:"numeric"})} — breakdown
          </h2>
          <div className="flex flex-wrap gap-2">
            {Object.entries(myHours)
              .filter(([k]) => k.startsWith(monthKey) && myHours[k].session)
              .sort(([a],[b]) => a.localeCompare(b))
              .map(([k, v]) => {
                const opt = SESSION_OPTS.find(o => o.key === v.session);
