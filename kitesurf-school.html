function formatDayForWhatsApp(dateKey, state) {
  const d = new Date(dateKey + 'T12:00:00');
  const [,mo,dd] = dateKey.split('-');
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const lessons = state.lessons
    .filter(l => l.date === dateKey && l.status !== 'cancelled')
    .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));

  // Group by instructor
  const byInstr = {};
  lessons.forEach(l => {
    const key = l.instructorId || '__none__';
    if (!byInstr[key]) byInstr[key] = [];
    byInstr[key].push(l);
  });

  let msg = `📅 *TJKite Schedule — ${dayName} ${dd}.${mo}*\n`;

  // Collect grouped lessons (avoid duplicates from groupId)
  const seenGroups = new Set();
  Object.entries(byInstr).forEach(([instrId, iLessons]) => {
    const ins = state.instructors.find(i => i.id === instrId);
    msg += `\n🏄 *${ins?.name || 'Unassigned'}*\n`;
    iLessons.forEach(l => {
      const grpKey = l.groupId || l.id;
      if (seenGroups.has(grpKey)) return;
      seenGroups.add(grpKey);
      const grouped = l.groupId ? iLessons.filter(x => x.groupId === l.groupId) : [l];
      const names = grouped.map(x => {
        const s = state.students.find(st => st.id === x.studentId);
        return s?.name?.split(' ')[0] || '?';
      }).join(', ');
      const stu = state.students.find(s => s.id === l.studentId);
      const course = stu?.course ? ` ${stu.course}` : '';
      const hrs = l.hours ? ` · ${l.hours}h` : '';
      const note = l.notes ? ` · _${l.notes}_` : '';
      msg += `• ${l.startTime}${course} — ${names}${hrs}${note}\n`;
    });
  });

  if (lessons.length === 0) msg += '\n_No lessons scheduled_\n';

  // Tasks for the day
  const dayTasks = (state.tasks||[])
    .filter(t => t.date === dateKey)
    .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
  if (dayTasks.length > 0) {
    msg += `\n📋 *Tasks*\n`;
    dayTasks.forEach(t => {
      const ins = state.instructors.find(i => i.id === t.instructorId);
      const time = t.startTime ? `${t.startTime} · ` : '';
      const insPart = ins ? ` (${ins.name})` : '';
      const doneMark = t.status === 'completed' ? ' ✓' : '';
      msg += `• ${time}${t.description}${insPart} · ${t.hours}h${doneMark}\n`;
    });
  }

  return msg.trim();
}


function exportDayXLSX(dateKey, state) {
  if (!window.XLSX) { alert('SheetJS not loaded'); return; }
  const { SLOTS, slotLabel, columns, colSlots } = buildDayGrid(dateKey, state);
  const d = new Date(dateKey + 'T12:00:00');
  const [,, dd] = dateKey.split('-');
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const title = `Schedule — ${dayName} ${d.toLocaleString('en',{month:'long'})} ${+dd}`;
  const sheetName = `${dayName} ${+dd} ${d.toLocaleString('en',{month:'short'})}`;

  // Row 0: title spanning all cols; Row 1: headers; Row 2+: time slots
  const aoa = [
    [title, ...Array(columns.length).fill('')],
    ['Time', ...columns.map(c => c.name)],
    ...SLOTS.map((slot, si) => [
      slotLabel(slot),
      ...columns.map((_, ci) => {
        const cell = colSlots[ci][si];
        if (!cell || cell === 'merged') return '';
        return cell.content;
      })
    ])
  ];

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const merges = [{ s:{r:0,c:0}, e:{r:0,c:columns.length} }];

  SLOTS.forEach((_, si) => {
    columns.forEach((_, ci) => {
      const cell = colSlots[ci][si];
      if (cell && cell !== 'merged' && cell.span > 1) {
        merges.push({ s:{r:si+2,c:ci+1}, e:{r:si+2+cell.span-1,c:ci+1} });
      }
    });
  });

  ws['!merges'] = merges;
  ws['!cols'] = [{ wch: 14 }, ...columns.map(() => ({ wch: 24 }))];

  // Style title row bold (best-effort — xlsx.full.min supports basic styles)
  const titleCell = ws['A1'];
  if (titleCell) { titleCell.s = { font: { bold: true, sz: 13 } }; }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName.slice(0, 31));
  XLSX.writeFile(wb, `Schedule_${dateKey}.xlsx`);
}

    ? { ...state, lessons: state.lessons.filter(l => l.instructorId === lockedInstructorId) }
    : state;
  const weekStart = () => {
    const d = new Date(); d.setHours(0,0,0,0);
    const dow = (d.getDay()+6)%7; // monday=0
    d.setDate(d.getDate()-dow);
    return d;
  };
  const [anchor, setAnchor] = useState(weekStart);

  const [selected, setSelected] = useState(null);
  const [hoverCell, setHoverCell] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [showExport, setShowExport] = useState(false);

  // Copy / paste lesson state
  const [copiedLesson, setCopiedLesson] = useState(null); // { template, studentNames, courseName }
  const [pasteDate, setPasteDate] = useState("");

  // New lesson form
  const BLANK_LESSON = { studentId: "", instructorId: "", date: todayISO(), startTime: "09:30", hours: 1.5, lessonType: "", notes: "" };
  const [showNewLesson, setShowNewLesson] = useState(false);
  const [newLessonDraft, setNewLessonDraft] = useState(BLANK_LESSON);

  const BLANK_TASK = { description: "", date: todayISO(), startTime: "09:00", instructorId: "", hours: 1 };
  const [showNewTask, setShowNewTask] = useState(false);
  const [newTaskDraft, setNewTaskDraft] = useState(BLANK_TASK);

  // Delete confirmation
  const [confirmDelete, setConfirmDelete] = useState(null); // { label, onConfirm }

  // Add-student-to-lesson panel state
  const [addingToGroup, setAddingToGroup] = useState(false);
  const [addStudentMode, setAddStudentMode] = useState("pick"); // "pick" | "new"
  const [pickStudentId, setPickStudentId] = useState("");
  const BLANK_NEW_STU = { name: "", arrival: "", departure: "", course: "", phone: "", email: "" };
  const [newStudentDraft, setNewStudentDraft] = useState(BLANK_NEW_STU);
  const closeAddToGroup = () => { setAddingToGroup(false); setPickStudentId(""); setNewStudentDraft(BLANK_NEW_STU); };

  const iso = localISO;

  const days = useMemo(() => {
    if (viewMode === "day") {
      return [new Date(anchor)];
    } else if (viewMode === "week") {
      return Array.from({length:7}, (_,i)=>{ const d=new Date(anchor); d.setDate(anchor.getDate()+i); return d; });
    } else {
      // month: all days in the month that anchor belongs to
      const year = anchor.getFullYear(), mon = anchor.getMonth();
      const count = new Date(year, mon+1, 0).getDate();
      return Array.from({length:count}, (_,i) => new Date(year, mon, i+1));
    }
  }, [anchor, viewMode]);

  // 30-minute slots 08:00 – 20:00
  const slots = [];
  for (let h = 8; h <= 22; h++) {
    slots.push(`${String(h).padStart(2,'0')}:00`);
    if (h < 22) slots.push(`${String(h).padStart(2,'0')}:30`);
  }

  const switchView = (mode) => {
    setViewMode(mode);
    if (mode === "day") {
      // Land on the selected lesson's date if one is chosen, otherwise today
      const selLesson = selected
        ? visibleState.lessons.find(l => (l.groupId || l.id) === selected)
        : null;

        ? new Date(selLesson.date + 'T12:00:00')
        : new Date();
      target.setHours(0,0,0,0);
      setAnchor(target);
    } else if (mode === "week") {

      const selLesson = selected
        ? visibleState.lessons.find(l => (l.groupId || l.id) === selected)
        : null;
      const base = selLesson?.date
        ? new Date(selLesson.date + 'T12:00:00')
        : new Date();
      base.setHours(0,0,0,0);
      const dow = (base.getDay()+6)%7;
      base.setDate(base.getDate()-dow);
      setAnchor(base);
    } else if (mode === "month") {
      // snap to 1st of anchor's month
      const d = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
      setAnchor(d);
    }
  };

  const shift = (n) => {
    const d = new Date(anchor);
    if (viewMode === "day")   d.setDate(anchor.getDate() + n);
    else if (viewMode === "week")  d.setDate(anchor.getDate() + n*7);
    else { d.setDate(1); d.setMonth(anchor.getMonth() + n); }
    setAnchor(d);
  };

  const navLabel = viewMode === "day"
    ? `${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][days[0].getDay()]} ${iso(days[0])}`
    : viewMode === "week"
    ? `Week  ${iso(days[0])} – ${iso(days[6])}`
    : days[0].toLocaleString("en", {month:"long", year:"numeric"});

  // Forecast lookup by slot time string "HH:MM"
  const forecastAt = (dateKey, slotTime) => {
    if (!windy.points?.length) return null;
    const dt = new Date(`${dateKey}T${slotTime}:00`);
    return forecastNearest(windy.points, dt);
  };

  // Detect all low-tide extremes once for the loaded tide series.
  const tideWindowH = state.settings.tideLowTideWindowH ?? 3;
  const tideWindowMs = tideWindowH * 3600 * 1000;
  const tideLows = useMemo(() => {
    const pts = tide?.points || [];
    const lows = [];
    for (let i = 1; i < pts.length - 1; i++) {
      const p = pts[i];
      if (p.cm < pts[i-1].cm && p.cm < pts[i+1].cm) lows.push(p);
    }
    return lows;
  }, [tide?.points]);

  // Group lows by local date (YYYY-MM-DD) for the day header chips.
  const lowsByDate = useMemo(() => {
    const map = {};
    tideLows.forEach(l => {
      const k = localISO(new Date(l.ts));
      (map[k] ||= []).push(l);
    });
    return map;
  }, [tideLows]);

  // Is the slot at (dateKey, slotTime) inside the kiting window?
  const tideWindowMode = state.settings.tideWindowMode ?? "level";
  const SCHED_THRESHOLD_CM = Math.round((state.settings.tideThresholdM ?? 1.8) * 100);
  const tideAt = (dateKey, slotTime) => {
    const pts = tide?.points || [];
    if (!pts.length) return null;
    const cellTs = new Date(`${dateKey}T${slotTime}:00`).getTime();
    const nearest = pts.reduce((a, b) =>
      Math.abs(b.ts - cellTs) < Math.abs(a.ts - cellTs) ? b : a);
    let inWindow;
    if (tideWindowMode === "level") {
      inWindow = nearest.cm < SCHED_THRESHOLD_CM;
    } else {
      // hour mode: within tideWindowMs of any low-tide extreme
      inWindow = tideLows.some(lo => Math.abs(lo.ts - cellTs) <= tideWindowMs);
    }
    return { nearest, inWindow };
  };

  const fmtHM = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

  // Pixel height of one 30-min slot.
  const CELL_H = 29;

  // Slots covered by a lesson that started in an earlier slot.
  const coveredCells = useMemo(() => {
    const cov = new Set();
    visibleState.lessons.forEach(l => {
      if (!l.date || !l.startTime) return;
      const startIdx = slots.indexOf(l.startTime);
      if (startIdx < 0) return;
      const numSlots = Math.ceil((+l.hours || 1) * 2); // 1 h = 2 slots
      for (let ds = 1; ds < numSlots; ds++) {
        const t = slots[startIdx + ds];
        if (t) cov.add(`${l.date}|${t}`);
      }
    });
    return cov;
  }, [visibleState.lessons, slots]);

  const lessonAdvice = (l) => {
    const stu = state.students.find(s=>s.id===l.studentId);
    return lessonWindAdvice(l, stu?.level || "Intermediate", windy.points || [], state.settings);
  };

  // Meeting info is shown inside lesson cards — no separate calendar blocks needed.

  const timeToMins = t => { const [h,m] = (t||'09:00').split(':').map(Number); return h*60+m; };

  // Pre-compute collision layout for all days so overlapping lessons sit side-by-side.
  // Returns { [dateKey]: { [groupId]: { col, numCols } } }
  const dayLayoutMap = useMemo(() => {
    const result = {};
    days.forEach(d => {
      const dateKey = iso(d);
      const dayLessons = visibleState.lessons.filter(l => l.date === dateKey && l.status !== 'cancelled');

      // Build one entry per unique group/lesson
      const seen = new Set();
      const grpList = [];
      dayLessons.forEach(l => {
        const k = l.groupId || l.id;
        if (seen.has(k)) return;
        seen.add(k);
        const first = dayLessons.find(gl => (gl.groupId || gl.id) === k);
        const startMin = timeToMins(first.startTime);
        const endMin   = startMin + Math.round((+first.hours || 1.5) * 60);
        grpList.push({ gid: k, startMin, endMin });
      });

      // Sort by start time, then by duration (longer first)
      grpList.sort((a, b) => a.startMin - b.startMin || b.endMin - a.endMin);

      // Greedy column assignment: place each group in the leftmost free column
      const colEnd = []; // colEnd[i] = minute when column i becomes free
      const layout = {};
      grpList.forEach(grp => {
        let col = colEnd.findIndex(end => end <= grp.startMin);
        if (col === -1) { col = colEnd.length; colEnd.push(grp.endMin); }
        else colEnd[col] = grp.endMin;
        layout[grp.gid] = { col };
      });

      // numCols = how many columns are needed among all lessons overlapping this one
      grpList.forEach(grp => {
        const peers = grpList.filter(o =>
          o.gid !== grp.gid && o.startMin < grp.endMin && o.endMin > grp.startMin);
        const maxCol = peers.reduce((m, o) => Math.max(m, layout[o.gid].col), layout[grp.gid].col);
        layout[grp.gid].numCols = maxCol + 1;
      });

      result[dateKey] = layout;
    });
    return result;
  }, [visibleState.lessons, days]);

  // Group lessons that start exactly in this 30-min slot.
  const cellGroups = (dateKey, slotTime) => {
    const ls = visibleState.lessons.filter(l =>
      l.date === dateKey && (l.startTime || "10:00") === slotTime);
    const map = {};
    ls.forEach(l => {
      const k = l.groupId || l.id;
      if (!map[k]) map[k] = {
        gid: k, isGroup: !!l.groupId, lessons: [],
        instructorId: l.instructorId, hours: l.hours,
        status: l.status, startTime: l.startTime, date: l.date
      };
      map[k].lessons.push(l);
    });
    return Object.values(map);
  };

  const onDrop = (e, dateKey, slotTime) => {
    e.preventDefault();
    const raw = e.dataTransfer.getData("lesson-id") || dragId;
    setHoverCell(null); setDragId(null);
    if (!raw) return;
    if (raw.startsWith("grp:")) {
      updGroup(raw, { date: dateKey, startTime: slotTime });
    } else {
      const lesson = state.lessons.find(l => l.id === raw);
      if (!lesson) return;
      if (lesson.date === dateKey && (lesson.startTime||"10:00") === slotTime) return;
      if (lesson.groupId) {
        updGroup(lesson.groupId, { date: dateKey, startTime: slotTime });
      } else {
        updLesson(raw, { date: dateKey, startTime: slotTime });
      }
    }
  };

  // selected stores a groupId (grp:...) or lessonId for ungrouped lessons
  const selGroup = useMemo(() => {
    if (!selected) return null;
    const lessons = visibleState.lessons.filter(l => (l.groupId || l.id) === selected);
    if (!lessons.length) return null;
    const first = lessons[0];
    const students = lessons.map(l => state.students.find(s => s.id === l.studentId)).filter(Boolean);
    const ins = state.instructors.find(i => i.id === first.instructorId);
    return { lessons, first, students, ins, isGroup: !!first.groupId };
  }, [selected, visibleState.lessons, state.students, state.instructors]);

  const selStu = selGroup?.students?.[0];
  const selIns = selGroup?.ins;
  const sel = selGroup?.first;

  // ── Keyboard shortcuts: Cmd/Ctrl+C to copy selected lesson, Cmd/Ctrl+V to paste ──
  useEffect(() => {
    const onKey = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (!mod) return;
      if (["INPUT","TEXTAREA","SELECT"].includes(document.activeElement?.tagName)) return;
      if (e.key === "c" && selGroup && sel && addLesson) {
        e.preventDefault();
        setCopiedLesson({
          template: {
            studentIds: selGroup.lessons.map(l => l.studentId),
            instructorId: sel.instructorId || "",
            startTime: sel.startTime,
            hours: sel.hours,
            spot: sel.spot,
            notes: sel.notes || "",
            courseCode: selStu?.course || "",
          },
          studentNames: selGroup.students.map(s => s?.name || "?"),
          courseName: (selStu?.course || "") + " " + sel.hours + "h",
        });
        setPasteDate(sel.date);
      }
      if (e.key === "v" && copiedLesson && addLesson) {
        e.preventDefault();
        if (!pasteDate) { alert("Pick a date in the paste bar to paste to."); return; }
        const tmpl = copiedLesson.template;
        const newLessons = tmpl.studentIds.map(sid => ({
          studentId: sid,
          instructorId: tmpl.instructorId || "",
          date: pasteDate,
          startTime: tmpl.startTime,
          hours: tmpl.hours,
          status: "scheduled",
          spot: tmpl.spot || state.settings.spotName || "Sample Spot, NL",
          notes: tmpl.notes || "",
        }));
        const gid = newLessons.length > 1 ? ("grp:" + pasteDate + "|" + (tmpl.courseCode||"") + "|" + tmpl.startTime) : undefined;
        newLessons.forEach(l => { if (gid) l.groupId = gid; addLesson(l); });
        setCopiedLesson(null); setPasteDate("");
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selGroup, sel, selStu, copiedLesson, pasteDate, addLesson, state.settings]);

  const cellWindClass = (status) => {
    if (status==="bad")      return "ring-2 ring-rose-300";
    if (status==="marginal") return "ring-1 ring-amber-300";
    if (status==="good")     return "ring-1 ring-emerald-300";
    return "";
  };
  const fcChipClass = (knots, settings) => {
    if (knots == null) return "bg-slate-100 text-slate-400";
    if (knots < (settings.windMin ?? 10))         return "bg-slate-200 text-slate-600";
    if (knots > (settings.windMax ?? 30))         return "bg-rose-200 text-rose-800";
    if (knots > (settings.windMaxBeginner ?? 22)) return "bg-amber-200 text-amber-900";
    return "bg-emerald-200 text-emerald-800";
  };

  return (
    <div className="space-y-4">
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-3 flex-wrap">
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(-1)}>← Prev</button>
          <h2 className="font-semibold min-w-[160px] text-center">{navLabel}</h2>
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(1)}>Next →</button>
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>{ setAnchor(weekStart()); setViewMode("week"); }}>Today</button>
          {/* View mode toggle */}
          <div className="flex rounded border border-slate-200 overflow-hidden text-xs ml-1">
            {["day","week","month"].map(m => (
              <button key={m}
                className={classNames("px-2.5 py-1 capitalize",
                  viewMode===m ? "bg-sky-600 text-white font-semibold" : "bg-white text-slate-600 hover:bg-slate-50")}
                onClick={()=>switchView(m)}>
                {m}
              </button>
            ))}
          </div>
          {viewMode !== "month" && <span className="text-xs text-slate-500">Drag to reschedule — snaps to 30-min slots.</span>}
          {addLesson && (
            <button className="px-2 py-1 rounded text-sm bg-emerald-600 hover:bg-emerald-700 text-white font-semibold"
                    onClick={()=>{ setNewLessonDraft(BLANK_LESSON); setShowNewLesson(v=>!v); setShowNewTask(false); }}>
              + New lesson
            </button>
          )}
          {addTask && (
            <button className="px-2 py-1 rounded text-sm bg-amber-500 hover:bg-amber-600 text-white font-semibold"
                    onClick={()=>{ setNewTaskDraft({...BLANK_TASK, date: iso(anchor)}); setShowNewTask(v=>!v); setShowNewLesson(false); setSelected(null); }}>
              + New task
            </button>
          )}
          <div className="relative ml-auto">
            <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>setShowExport(v=>!v)}>
              📋 Export Day
            </button>
            {showExport && (
              <div className="absolute right-0 top-8 z-50 bg-white border border-slate-200 rounded-xl shadow-xl p-3 min-w-[240px]">
                <div className="text-[11px] font-semibold text-slate-500 mb-2 uppercase tracking-wide">Export Schedule</div>
                {days.map(d => {
                  const dk = iso(d);
                  const dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
                  const [,mo,dd] = dk.split('-');
                  const hasLessons = state.lessons.some(l => l.date === dk && l.status !== 'cancelled');
                  return (
                    <div key={dk} className="flex items-center gap-2 py-1">
                      <span className={classNames("text-sm w-24", hasLessons ? "font-medium" : "text-slate-400")}>
                        {dn} {dd}.{mo}
                      </span>
                      <button className="text-[11px] px-2 py-0.5 rounded bg-slate-100 hover:bg-slate-200 border border-slate-300"
                              onClick={()=>{ exportDayPDF(dk, state); setShowExport(false); }}>PDF</button>
                      <button className="text-[11px] px-2 py-0.5 rounded bg-emerald-50 hover:bg-emerald-100 border border-emerald-300 text-emerald-800"
                              onClick={()=>{ exportDayXLSX(dk, state); setShowExport(false); }}>Excel</button>
                      <button className="text-[11px] px-2 py-0.5 rounded bg-green-500 hover:bg-green-600 text-white font-medium"
                              title="Open WhatsApp team group"
                              onClick={()=>{ window.open(TEAM_WHATSAPP, '_blank'); setShowExport(false); }}>📲 Team</button>
                    </div>
                  );
                })}
                <button className="mt-2 text-[11px] text-slate-400 hover:underline" onClick={()=>setShowExport(false)}>close</button>
              </div>
            )}
          </div>
        </div>

        {/* ── MONTH VIEW ── */}
        {viewMode === "month" && (() => {
          const year = anchor.getFullYear(), mon = anchor.getMonth();
          // Build a grid: fill leading empty days so row 0 starts on Monday
          const firstDow = (new Date(year, mon, 1).getDay()+6)%7; // 0=Mon
          const daysInMonth = new Date(year, mon+1, 0).getDate();
          const cells = Array.from({length: firstDow + daysInMonth}, (_,i) => i < firstDow ? null : i - firstDow + 1);
          const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
          return (
            <div>
              <div className="grid grid-cols-7 border-b border-slate-200 mb-1">
                {DOW.map(d => <div key={d} className="text-center text-[11px] font-semibold text-slate-500 py-1">{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-px bg-slate-100 rounded overflow-hidden border border-slate-100">
                {cells.map((dayNum, idx) => {
                  if (!dayNum) return <div key={idx} className="bg-slate-50 min-h-[80px]"/>;
                  const dk = iso(new Date(year, mon, dayNum));
                  const todayDk = todayISO();
                  const isToday = dk === todayDk;
                  const dayLessons = visibleState.lessons.filter(l => l.date === dk && l.status !== "cancelled");
                  const dayTasks   = (tasks||[]).filter(t => t.date === dk);
                  const dayLows = lowsByDate[dk] || [];
                  return (
                    <div key={idx}
                         onClick={() => { setAnchor(new Date(year, mon, dayNum)); switchView("day"); }}
                         className={classNames(
                           "bg-white min-h-[80px] p-1.5 cursor-pointer hover:bg-sky-50 transition-colors",
                           isToday && "ring-2 ring-inset ring-sky-400")}>
                      <div className={classNames("text-xs font-bold mb-1 w-5 h-5 flex items-center justify-center rounded-full",
                        isToday ? "bg-sky-500 text-white" : "text-slate-700")}>{dayNum}</div>
                      {dayLows.length > 0 && (
                        <div className="text-[9px] text-cyan-600 tabular-nums leading-tight mb-0.5">
                          {dayLows.map(l => `▼ ${fmtHM(l.ts)}`).join(" ")}
                        </div>
                      )}
                      {dayLessons.slice(0,3).map(l => {
                        const stu = state.students.find(s=>s.id===l.studentId);
                        const completed = l.status==="completed";
                        return (
                          <div key={l.id} onClick={e=>{e.stopPropagation(); openLesson?.(l.id);}}
                               className={classNames("truncate text-[10px] px-1 py-0.5 rounded mb-0.5 leading-tight cursor-pointer",
                                 completed ? "bg-emerald-50 text-emerald-700" : "bg-sky-50 text-sky-800 hover:bg-sky-100")}>
                            {l.startTime} {stu?.name?.split(" ")[0] || "—"}
                          </div>
                        );
                      })}
                      {dayLessons.length > 3 && (
                        <div className="text-[9px] text-slate-400">+{dayLessons.length-3} more</div>
                      )}
                      {dayTasks.slice(0,2).map(t => (
                        <div key={t.id} className={classNames(
                          "truncate text-[10px] px-1 py-0.5 rounded mb-0.5 leading-tight",
                          t.status==="completed" ? "bg-emerald-50 text-emerald-600" : "bg-amber-50 text-amber-700")}>
                          ✓ {t.description}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── NEW LESSON FORM ── */}
        {showNewLesson && addLesson && (
          <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
            <div className="flex items-center gap-2 mb-3">
              <span className="font-semibold text-emerald-800 text-sm">New lesson</span>
              <button className="ml-auto text-xs text-slate-400 hover:text-slate-600" onClick={()=>setShowNewLesson(false)}>✕ close</button>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
              <label className="block col-span-2 md:col-span-1">
                <span className="text-xs text-slate-500">Student</span>
                <SearchableStudentSelect students={state.students} value={newLessonDraft.studentId}
                  onChange={v => {
                    const stu = state.students.find(s => s.id === v);
                    setNewLessonDraft(d => ({ ...d, studentId: v, lessonType: stu?.course || d.lessonType }));
                  }}
                  placeholder="— pick student —" showCourse={true} className="mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Lesson type</span>
                <select value={newLessonDraft.lessonType} onChange={e=>setNewLessonDraft(d=>({...d,lessonType:e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm bg-white mt-0.5">
                  <option value="">— from student —</option>
                  {LESSON_TYPES.map(t=><option key={t.code} value={t.code}>{t.label}</option>)}
                </select>
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Instructor</span>
                <select value={newLessonDraft.instructorId} onChange={e=>setNewLessonDraft(d=>({...d,instructorId:e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm bg-white mt-0.5">
                  <option value="">Unassigned</option>
                  {state.instructors.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
                </select>
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Date</span>
                <input type="date" value={newLessonDraft.date} onChange={e=>setNewLessonDraft(d=>({...d,date:e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Start time</span>
                <TimeInput value={newLessonDraft.startTime} onChange={v=>setNewLessonDraft(d=>({...d,startTime:v}))}
                  className="border-slate-200 text-sm mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Hours</span>
                <select value={newLessonDraft.hours} onChange={e=>setNewLessonDraft(d=>({...d,hours:+e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm bg-white mt-0.5">
                  {[0.5,1,1.5,2,2.5,3,3.5,4].map(h=><option key={h} value={h}>{h}h</option>)}
                </select>
              </label>
              <label className="block col-span-2 md:col-span-2">
                <span className="text-xs text-slate-500">Notes</span>
                <input type="text" value={newLessonDraft.notes} onChange={e=>setNewLessonDraft(d=>({...d,notes:e.target.value}))}
                  placeholder="optional"
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm mt-0.5" />
              </label>
            </div>
            <div className="mt-3 flex gap-2">
              <button
                className="px-4 py-1.5 rounded bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-semibold"
                onClick={()=>{
                  if (!newLessonDraft.studentId) { alert("Pick a student."); return; }
                  if (!newLessonDraft.date)      { alert("Pick a date."); return; }
                  const [th] = (newLessonDraft.startTime||"09:00").split(':').map(Number);
                  if (th < 6 || th >= 21) { alert("Start time must be between 06:00 and 21:00."); return; }
                  addLesson({
                    studentId: newLessonDraft.studentId,
                    instructorId: newLessonDraft.instructorId,
                    date: newLessonDraft.date,
                    startTime: newLessonDraft.startTime,
                    hours: newLessonDraft.hours,
                    lessonType: newLessonDraft.lessonType || undefined,
                    status: "scheduled",
                    spot: state.settings.spotName || "Sample Spot, NL",
                    notes: newLessonDraft.notes,
                  });
                  setShowNewLesson(false);
                  setNewLessonDraft(BLANK_LESSON);
                }}>
                Add lesson
              </button>
              <button className="px-4 py-1.5 rounded btn-ghost border text-sm" onClick={()=>setShowNewLesson(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* ── NEW TASK FORM ── */}
        {showNewTask && addTask && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
            <div className="flex items-center gap-2 mb-3">
              <span className="font-semibold text-amber-800 text-sm">New task</span>
              <button className="ml-auto text-xs text-slate-400 hover:text-slate-600" onClick={()=>setShowNewTask(false)}>✕ close</button>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
              <label className="block col-span-2 md:col-span-2">
                <span className="text-xs text-slate-500">Description</span>
                <input type="text" autoFocus value={newTaskDraft.description}
                  onChange={e=>setNewTaskDraft(d=>({...d, description: e.target.value}))}
                  placeholder="e.g. Equipment check, Beach briefing…"
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Assigned to</span>
                <select value={newTaskDraft.instructorId} onChange={e=>setNewTaskDraft(d=>({...d, instructorId: e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm bg-white mt-0.5">
                  <option value="">Unassigned</option>
                  {state.instructors.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
                </select>
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Date</span>
                <input type="date" value={newTaskDraft.date} onChange={e=>setNewTaskDraft(d=>({...d, date: e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Start time</span>
                <TimeInput value={newTaskDraft.startTime} onChange={v=>setNewTaskDraft(d=>({...d, startTime: v}))}
                  className="border-slate-200 text-sm mt-0.5" />
              </label>
              <label className="block">
                <span className="text-xs text-slate-500">Hours</span>
                <select value={newTaskDraft.hours} onChange={e=>setNewTaskDraft(d=>({...d, hours: +e.target.value}))}
                  className="w-full border border-slate-200 rounded px-2 py-1 text-sm bg-white mt-0.5">
                  {[0.5,1,1.5,2,2.5,3,4,5,6].map(h=><option key={h} value={h}>{h}h</option>)}
                </select>
              </label>
            </div>
            <div className="mt-3 flex gap-2">
              <button
                className="px-4 py-1.5 rounded bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold"
                onClick={()=>{
                  if (!newTaskDraft.description.trim()) { alert("Enter a description."); return; }
                  if (!newTaskDraft.date) { alert("Pick a date."); return; }
                  addTask({
                    description:  newTaskDraft.description.trim(),
                    date:         newTaskDraft.date,
                    startTime:    newTaskDraft.startTime || "09:00",
                    instructorId: newTaskDraft.instructorId || undefined,
                    hours:        newTaskDraft.hours,
                    status:       "pending",
                  });
                  setShowNewTask(false);
                  setNewTaskDraft(BLANK_TASK);
                }}>
                Add task
              </button>
              <button className="px-4 py-1.5 rounded btn-ghost border text-sm" onClick={()=>setShowNewTask(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* ── DELETE CONFIRMATION MODAL ── */}

        {confirmDelete && (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/30">
            <div className="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4">
              <div className="text-base font-semibold text-slate-800 mb-2">Delete lesson</div>
              <div className="text-sm text-slate-600 mb-5">{confirmDelete.label}</div>
              <div className="flex gap-3 justify-end">
                <button className="px-4 py-1.5 rounded btn-ghost border text-sm" onClick={()=>setConfirmDelete(null)}>Cancel</button>
                <button className="px-4 py-1.5 rounded bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold"
                        onClick={()=>{ confirmDelete.onConfirm(); setConfirmDelete(null); }}>
                  Delete
                </button>
              </div>
            </div>
          </div>
        )}

        {/* ── PASTE BAR ── */}
        {copiedLesson && addLesson && (
          <div className="flex items-center gap-2 flex-wrap bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-sm">
            <span className="text-amber-700 font-semibold">📋 Copied:</span>
            <span className="text-slate-700">{copiedLesson.studentNames.join(", ")} · {copiedLesson.courseName} {copiedLesson.template.startTime} {copiedLesson.template.hours}h</span>
            <input type="date" value={pasteDate} onChange={e=>setPasteDate(e.target.value)}
              className="border border-amber-300 rounded px-2 py-0.5 text-sm bg-white ml-1" />
            <button
              className="px-3 py-1 rounded bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold"
              onClick={()=>{
                if (!pasteDate) { alert("Pick a date to paste to."); return; }
                const tmpl = copiedLesson.template;
                const newLessons = tmpl.studentIds.map(sid => ({
                  studentId: sid,
                  instructorId: tmpl.instructorId || "",
                  date: pasteDate,
                  startTime: tmpl.startTime,
                  hours: tmpl.hours,
                  status: "scheduled",
                  spot: tmpl.spot || state.settings.spotName || "Sample Spot, NL",
                  notes: tmpl.notes || "",
                }));
                // If multiple students, assign shared groupId
                const gid = newLessons.length > 1 ? ("grp:" + pasteDate + "|" + (tmpl.courseCode||"") + "|" + tmpl.startTime) : undefined;
                newLessons.forEach(l => { if (gid) l.groupId = gid; addLesson(l); });
                setCopiedLesson(null); setPasteDate("");
              }}>
              Paste
            </button>
            <button className="text-xs text-slate-400 hover:text-slate-600" onClick={()=>{ setCopiedLesson(null); setPasteDate(""); }}>✕ clear</button>
          </div>
        )}

        {/* ── DAY / WEEK TIME GRID ── */}
        {viewMode !== "month" && (
        <div className="overflow-x-auto">
          <div className={viewMode === "week" ? "min-w-[760px]" : "min-w-[320px]"}>
            {/* ── Day header row (separate grid so overlays can be scoped to slot area) ── */}
            <div className="grid" style={{ gridTemplateColumns: `60px repeat(${days.length}, minmax(0,1fr))` }}>
              <div></div>
              {days.map((d,i)=>{
                const isToday = iso(d)===todayISO();
                const dayLows = lowsByDate[iso(d)] || [];
                return (
                  <div key={i} className={classNames("text-center text-xs font-semibold py-1 border-b",
                    isToday ? "text-sky-700 border-sky-300" : "text-slate-600 border-slate-200")}>
                    {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()]}
                    <div className="text-slate-400 text-[10px]">{iso(d).slice(5)}</div>
                    {dayLows.length > 0 && (
                      <div className="text-cyan-600 text-[9px] font-normal tabular-nums leading-tight">
                        {dayLows.map(l => `▼ ${fmtHM(l.ts)}`).join(" · ")}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* ── Slot area: wrapper provides containing block; grid is background only ── */}
            <div style={{ position: 'relative' }}>
            <div className="grid" style={{ gridTemplateColumns: `60px repeat(${days.length}, minmax(0,1fr))` }}>

              {/* 30-min slot rows */}
              {slots.map(slotTime => {
                const isHour = slotTime.endsWith(':00');
                return (
                <React.Fragment key={slotTime}>
                  <div className={classNames(
                    "text-right pr-1 tabular-nums border-r border-slate-100",
                    isHour
                      ? "text-[10px] text-slate-400 pt-1"
                      : "text-[8px] text-slate-300 pt-0.5"
                  )}>
                    {isHour ? slotTime : '·'}
                  </div>
                  {days.map((d,i) => {
                    const dateKey = iso(d);
                    const fc = isHour ? forecastAt(dateKey, slotTime) : null;
                    const td = tideAt(dateKey, slotTime);
                    const groups = cellGroups(dateKey, slotTime);
                    const isCovered = coveredCells.has(`${dateKey}|${slotTime}`);
                    const isHover = hoverCell && hoverCell.date===dateKey && hoverCell.slot===slotTime;
                    return (
                      <div
                        key={i}
                        onDragOver={(e)=>{ e.preventDefault(); setHoverCell({date:dateKey, slot:slotTime}); }}
                        onDragLeave={()=>setHoverCell(null)}
                        onDrop={(e)=>onDrop(e, dateKey, slotTime)}
                        title={td?.nearest ? `${td.inWindow ? "in window" : "outside window"} · tide ${(td.nearest.cm/100).toFixed(2)} m NAP` : ""}
                        style={{ minHeight: `${CELL_H}px` }}
                        className={classNames("border-r border-slate-100 p-0.5 relative transition-colors group/cell",
                          isHour ? "border-b border-slate-100" : "border-b border-dashed border-slate-50",
                          isHover ? "bg-sky-100" : (td?.inWindow ? "bg-cyan-50" : "bg-white"),
                          iso(d)===todayISO() ? "bg-sky-50/30" : "")}>
                        {/* Wind chip behind/empty cell */}
                        {fc && groups.length===0 && !isCovered && (
                          <div className={classNames("absolute top-1 right-1 text-[9px] px-1 rounded tabular-nums opacity-70",
                            fcChipClass(fc.knots, state.settings))}>
                            {fc.knots}
                          </div>
                        )}
                        {/* Tide window marker */}
                        {td?.inWindow && groups.length===0 && !isCovered && (
                          <div className="absolute bottom-1 left-1 text-[9px] text-cyan-600 tabular-nums opacity-80">▼</div>
                        )}
                        {/* lesson cards rendered in the per-day overlay below */}
                        {/* + button — appears on cell hover */}
                        {addLesson && isHour && (
                          <button
                            className="absolute bottom-0.5 right-0.5 z-40 w-4 h-4 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-bold leading-none flex items-center justify-center opacity-0 group-hover/cell:opacity-80 hover:!opacity-100 transition-opacity shadow"
                            title={groups.length > 0 ? "Add student to this lesson" : `New lesson ${dateKey} ${slotTime}`}
                            onClick={e=>{
                              e.stopPropagation();
                              if (groups.length > 0) {
                                // Select the lesson and open add-student panel
                                setSelected(groups[0].gid);
                                setAddStudentMode("pick");
                                setPickStudentId("");
                                setNewStudentDraft(BLANK_NEW_STU);
                                setAddingToGroup(true);
                                setShowNewLesson(false);
                              } else {
                                // Open new lesson form pre-filled with this slot
                                setNewLessonDraft(d=>({...BLANK_LESSON, date: dateKey, startTime: slotTime}));
                                setShowNewLesson(true);
                                setSelected(null);
                              }
                            }}>
                            +
                          </button>
                        )}
                      </div>
                    );
                  })}
                </React.Fragment>
              );
              })}
            </div>{/* end slot grid */}

              {/* ── Per-day lesson card overlays ──
                  Each overlay is an absolutely-positioned grid item that spans all slot rows
                  for one day column. Lesson cards inside are placed by pixel offset from the
                  top of the slot area, so cards that start at different times but overlap in
                  duration sit side-by-side instead of stacking on top of each other. */}
              {days.map((d, dayIdx) => {
                const dateKey = iso(d);
                // Collect all lesson groups for this day (same shape as cellGroups)
                const ls = visibleState.lessons.filter(l => l.date === dateKey);
                const gmap = {};
                ls.forEach(l => {
                  const k = l.groupId || l.id;
                  if (!gmap[k]) gmap[k] = {
                    gid: k, isGroup: !!l.groupId, lessons: [],
                    instructorId: l.instructorId, hours: l.hours,
                    status: l.status, startTime: l.startTime, date: l.date
                  };
                  gmap[k].lessons.push(l);
                });
                const allGroups = Object.values(gmap);
                if (!allGroups.length) return null;
                return (
                  <div key={`lo-${dateKey}`}
                       style={{
                         position: 'absolute',
                         top: 0,
                         left: `calc(60px + ${dayIdx} * (100% - 60px) / ${days.length})`,
                         width: `calc((100% - 60px) / ${days.length})`,
                         height: '100%',
                         zIndex: 20,
                         pointerEvents: 'none',
                       }}>
                    {allGroups.map(grp => {
                      const lay = dayLayoutMap[dateKey]?.[grp.gid] || { col: 0, numCols: 1 };
                      const totalCols = lay.numCols;
                      const compact = totalCols >= 3;
                      const tiny    = totalCols >= 5;
                      const slotIdx = slots.indexOf(grp.startTime || '09:00');
                      if (slotIdx < 0) return null;
                      const durHours = Math.max(0.5, +grp.hours || 0.5);
                      const cardLeft  = `calc(${(lay.col / totalCols) * 100}% + 2px)`;
                      const cardWidth = `calc(${100 / totalCols}% - 4px)`;
                      const cardStyle = {
                        position: 'absolute',
                        top: `${slotIdx * CELL_H + 2}px`,
                        left: cardLeft,
                        width: cardWidth,
                        height: `${durHours * 2 * CELL_H - 4}px`,
                        overflow: 'hidden',
                        pointerEvents: 'all',
                        zIndex: selected === grp.gid ? 100 : 10,
                      };
                      const studentNames = grp.lessons
                        .map(l => state.students.find(s=>s.id===l.studentId)?.name || "—");
                      const ins = state.instructors.find(z=>z.id===grp.instructorId);
                      const rawCode = grp.isGroup
                        ? grp.gid.split("|")[1]
                        : (() => { const p = grp.lessons[0]?.tjkiteImportKey?.split("|") || []; return p[p.length-2]; })();
                      const courseLabel = rawCode && TJKITE_COURSE_PLAN[rawCode] ? TJKITE_COURSE_PLAN[rawCode].label : rawCode;
                      const adv = grp.lessons.reduce((worst, l) => {
                        const a = lessonAdvice(l);
                        if (a.status==="bad") return a;
                        if (a.status==="marginal" && worst.status!=="bad") return a;
                        return worst;
                      }, lessonAdvice(grp.lessons[0]));
                      const cancelled = grp.status==="cancelled";
                      const completed = grp.status==="completed";
                      const baseColor = cancelled ? "bg-rose-50 border-rose-200"
                                      : completed ? "bg-emerald-50 border-emerald-200"
                                      : "bg-white border-sky-200";
                      const isSelected = selected === grp.gid;
                      const grpMeetType = grp.lessons.reduce((acc, l) =>
                        getMeetingType(l, state.students, state.lessons) === 'front_desk' ? 'front_desk' : acc,
                        getMeetingType(grp.lessons[0], state.students, state.lessons));
                      const meetTime = addMinutes(grp.startTime || '09:00', -30);
                      const meetSlotIdx = slots.indexOf(meetTime);
                      const isBeachMeet = grpMeetType === 'beach';
                      const cardTitle = [grp.startTime, `${grp.hours}h`, courseLabel, ...studentNames, ins?.name].filter(Boolean).join(' · ');
                      return (
                        <React.Fragment key={grp.gid}>
                          {/* ── Meeting / waiting-time block (unpaid, not counted in lesson hours) ── */}
                          {!cancelled && meetSlotIdx >= 0 && (
                            <div
                              style={{
                                position: 'absolute',
                                top: `${meetSlotIdx * CELL_H + 2}px`,
                                left: cardLeft,
                                width: cardWidth,
                                height: `${CELL_H - 4}px`,
                                overflow: 'hidden',
                                pointerEvents: 'none',
                                zIndex: selected === grp.gid ? 99 : 9,
                              }}
                              title={`${isBeachMeet ? 'Meet at beach' : 'Front desk check-in'} · ${meetTime} (waiting time — not paid)`}
                              className={classNames(
                                "rounded border border-dashed text-[8px] flex items-center gap-1 px-1",
                                isBeachMeet
                                  ? "bg-teal-50 border-teal-300 text-teal-700"
                                  : "bg-violet-50 border-violet-300 text-violet-700"
                              )}
                            >
                              {!tiny && <span>{isBeachMeet ? '🏄' : '✓'}</span>}
                              {!compact && <span className="truncate">{isBeachMeet ? 'Beach' : 'Desk'} · {meetTime}</span>}
                              {compact && !tiny && <span className="tabular-nums">{meetTime}</span>}
                            </div>
                          )}
                          {/* ── Lesson card ── */}
                        <div
                          draggable={!completed}
                          onDragStart={(e)=>{
                            e.dataTransfer.setData("lesson-id", grp.gid);
                            e.dataTransfer.effectAllowed = "move";
                            setDragId(grp.gid);
                          }}
                          onDragEnd={()=>setDragId(null)}
                          onClick={()=>{ setSelected(isSelected ? null : grp.gid); closeAddToGroup(); }}
                          style={cardStyle}
                          title={compact ? cardTitle : (adv.reason || "")}
                          className={classNames(
                            "rounded border text-[11px] cursor-grab active:cursor-grabbing leading-tight shadow-sm",
                            tiny ? "px-0.5 py-0.5" : "px-1.5 py-1",
                            baseColor,
                            cellWindClass(adv.status),
                            isSelected && "ring-2 ring-sky-400",
                            dragId===grp.gid && "opacity-40")}
                        >
                          {tiny ? (
                            <div className="flex flex-col items-center justify-start h-full pt-0.5 gap-0.5">
                              <span className="text-sm leading-none">{cancelled ? '❌' : completed ? '✅' : adv.status==='bad' ? '⚠️' : '🪁'}</span>
                              {grp.lessons.length > 1 && (
                                <span className="bg-sky-100 text-sky-700 rounded-full text-[8px] font-bold tabular-nums px-0.5 leading-tight">{grp.lessons.length}</span>
                              )}
                            </div>
                          ) : compact ? (<>
                            <div className="flex items-center gap-0.5 flex-wrap">
                              <span className="font-semibold tabular-nums text-[10px]">{grp.startTime}</span>
                              {grp.lessons.length > 1 && (
                                <span className="bg-sky-100 text-sky-700 rounded-full px-1 text-[8px] font-bold tabular-nums">{grp.lessons.length}</span>
                              )}
                              {adv.fc?.knots != null && (
                                <span className={classNames("text-[8px] px-0.5 rounded tabular-nums ml-auto",
                                  fcChipClass(adv.fc.knots, state.settings))}>
                                  {adv.fc.knots}
                                </span>
                              )}
                            </div>
                            <div className="truncate text-[9px]">{studentNames[0]}{studentNames.length > 1 ? ` +${studentNames.length-1}` : ''}</div>
                            {adv.status==="bad" && <div className="text-[9px] text-rose-700 font-semibold">⚠</div>}
                          </>) : (<>
                            <div className="flex items-center gap-1">
                              <span className="font-semibold tabular-nums">{grp.startTime}</span>
                              <span className="text-slate-400">·</span>
                              <span className="tabular-nums">{grp.hours}h</span>
                              {grp.lessons.length > 1 && (
                                <span className="bg-sky-100 text-sky-700 rounded-full px-1 text-[9px] font-bold tabular-nums">
                                  {grp.lessons.length}
                                </span>
                              )}
                              {adv.fc?.knots != null && (
                                <span className={classNames("ml-auto text-[9px] px-1 rounded tabular-nums",
                                  fcChipClass(adv.fc.knots, state.settings))}>
                                  {adv.fc.knots}kt
                                </span>
                              )}
                            </div>
                            {courseLabel && (
                              <div className="truncate font-semibold text-sky-700 text-[10px]">{courseLabel}</div>
                            )}
                            {studentNames.map((n,i) => (
                              <div key={i} className="truncate">{n}</div>
                            ))}
                            <div className="truncate text-slate-500">{ins?.name||"Unassigned"}</div>
                            {grp.lessons[0]?.notes && (
                              <div className="truncate text-[9px] text-amber-700 mt-0.5 italic">{grp.lessons[0].notes}</div>
                            )}
                            {adv.status==="bad" && <div className="text-[9px] text-rose-700 font-semibold mt-0.5">⚠ reschedule</div>}
                            {adv.status==="marginal" && <div className="text-[9px] text-amber-700 mt-0.5">⚠ marginal</div>}
                            {!grp.isGroup && !cancelled && (
                              <button
                                className="text-[9px] text-sky-600 hover:underline mt-0.5 block"
                                onClick={e=>{ e.stopPropagation(); openLesson?.(grp.lessons[0].id); }}
                                title="Open in Lessons tab">
                                ↗ lessons
                              </button>
                            )}
                          </>)}
                        </div>
                        </React.Fragment>
                      );
                    })}
                  </div>
                );
              })}
              {/* ── Per-day task card overlays ── */}
              {days.map((d, dayIdx) => {
                const dateKey = iso(d);
                const dayTasks = (tasks||[]).filter(t => t.date === dateKey);
                if (!dayTasks.length) return null;
                return (
                  <div key={`to-${dateKey}`}
                       style={{
                         position: 'absolute',
                         top: 0,
                         left: `calc(60px + ${dayIdx} * (100% - 60px) / ${days.length})`,
                         width: `calc((100% - 60px) / ${days.length})`,
                         height: '100%',
                         zIndex: 25,
                         pointerEvents: 'none',
                       }}>
                    {dayTasks.map(task => {
                      const slotI = slots.indexOf(task.startTime || '09:00');
                      if (slotI < 0) return null;
                      const durHours = Math.max(0.5, +task.hours || 1);
                      const ins = state.instructors.find(i => i.id === task.instructorId);
                      const isComplete = task.status === 'completed';
                      const taskCardStyle = {
                        position: 'absolute',
                        top: `${slotI * CELL_H + 2}px`,
                        right: '2px',
                        width: 'calc(30% - 2px)',
                        height: `${durHours * 2 * CELL_H - 4}px`,
                        overflow: 'hidden',
                        pointerEvents: 'all',
                        zIndex: 25,
                      };
                      return (
                        <div key={task.id}
                             style={taskCardStyle}
                             title={`${task.startTime||'09:00'} · ${task.hours}h · ${task.description}${ins ? ' · ' + ins.name : ''}`}
                             className={classNames(
                               "rounded border text-[10px] leading-tight shadow-sm px-1 py-0.5 cursor-pointer",
                               isComplete
                                 ? "bg-emerald-50 border-emerald-300 text-emerald-800"
                                 : "bg-amber-50 border-amber-300 text-amber-800"
                             )}
                             onClick={() => updTask && updTask(task.id, { status: isComplete ? 'pending' : 'completed' })}>
                          <div className="font-semibold tabular-nums text-[9px]">{task.startTime||'09:00'}</div>
                          <div className="truncate">{task.description}</div>
                          {ins && <div className="truncate text-[9px] opacity-70">{ins.name}</div>}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>{/* end overlays wrapper */}
          </div>
        </div>
        )}

        {/* ── Tasks for the visible days ── */}
        {viewMode !== "month" && (() => {
          const visibleDates = new Set(days.map(d => iso(d)));
          const visibleTasks = (tasks||[]).filter(t => visibleDates.has(t.date));
          if (!visibleTasks.length && !addTask) return null;
          return (
            <div className="mt-2 bg-amber-50 border border-amber-100 rounded-xl px-4 py-3">
              <div className="text-xs font-semibold text-amber-700 mb-2 uppercase tracking-wide">
                Tasks
              </div>
              {visibleTasks.length === 0 && (
                <div className="text-xs text-slate-400 italic">No tasks this {viewMode}.</div>
              )}
              <div className="flex flex-wrap gap-2">
                {visibleTasks.map(t => {
                  const ins = state.instructors.find(i => i.id === t.instructorId);
                  return (
                    <div key={t.id} className={classNames(
                      "flex items-center gap-1.5 text-xs px-2.5 py-1.5 rounded-lg border",
                      t.status==="completed"
                        ? "bg-emerald-50 border-emerald-200 text-emerald-700"
                        : "bg-white border-amber-200 text-amber-800")}>
                      <button
                        title={t.status==="completed" ? "Mark pending" : "Mark complete"}
                        onClick={()=>updTask && updTask(t.id, {status: t.status==="completed" ? "pending" : "completed"})}
                        className="opacity-60 hover:opacity-100 transition-opacity">
                        {t.status==="completed" ? "✓" : "○"}
                      </button>
                      <span className="font-medium">{t.description}</span>
                      <span className="text-[10px] opacity-60">{t.date.slice(5)}</span>
                      {ins && <span className="text-[10px] opacity-60">· {ins.name}</span>}
                      <span className="text-[10px] opacity-60">· {t.hours}h</span>
                      {delTask && (
                        <button onClick={()=>delTask(t.id)}
                          className="ml-0.5 text-[10px] opacity-30 hover:opacity-70 hover:text-rose-600 transition-opacity">✕</button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {viewMode !== "month" && (
        <div className="mt-3 flex flex-wrap gap-2 text-[11px] text-slate-500">
          <span className="chip ring-1 ring-emerald-300 bg-white text-emerald-800">good wind</span>
          <span className="chip ring-1 ring-amber-300 bg-white text-amber-800">marginal</span>
          <span className="chip ring-2 ring-rose-300 bg-white text-rose-800">should reschedule</span>
          <span className="chip ring-1 ring-cyan-300 bg-cyan-50 text-cyan-800">
            {tideWindowMode === "level"
              ? `▼ tide < ${state.settings.tideThresholdM ?? 1.8} m NAP`
              : `▼ ±${state.settings.tideLowTideWindowH ?? 3}h low tide`}
          </span>
        </div>
        )}
      </section>

      {selGroup && sel && (
        <section className="bg-white rounded-xl border border-sky-200 p-4">
          <div className="flex items-center gap-2 mb-2 flex-wrap">
            {selGroup.lessons.length > 1
              ? <h3 className="font-semibold">
                  Group · {selGroup.lessons.length} students
                  <span className="ml-2 text-slate-400 font-normal text-sm">with {selIns?.name || "Unassigned"}</span>
                </h3>
              : <h3 className="font-semibold">{selStu?.name} <span className="text-slate-400">with</span> {selIns?.name || "Unassigned"}</h3>
            }
            <span className="chip bg-slate-100 text-slate-700">{sel.date} {sel.startTime} · {sel.hours}h</span>
            <span className={classNames("chip", statusChip(sel.status))}>{sel.status}</span>
            {(() => {
              const adv = lessonAdvice(sel);
              if (!adv.fc) return null;
              return (
                <span className={classNames("chip", fcChipClass(adv.fc.knots, state.settings))}>
                  forecast: {adv.fc.knots} kt {dirToCompass(adv.fc.dirDeg)} {adv.fc.gustKt!=null && `· g${adv.fc.gustKt}`}
                </span>
              );
            })()}
            {sel.status !== "completed" && (
              <button className="text-xs px-2 py-1 rounded text-emerald-700 hover:bg-emerald-50 border border-emerald-200"
                      onClick={()=>{
                        if (selGroup.isGroup) updGroup(sel.groupId, { status: "completed" });
                        else updLesson(sel.id, { status: "completed" });
                      }}>
                ✓ Mark complete
              </button>
            )}
            {addLesson && (
              <button className="text-xs px-2 py-1 rounded text-amber-700 hover:bg-amber-50 border border-amber-200"
                      title="Copy this lesson to paste on another date"
                      onClick={()=>{
                        setCopiedLesson({
                          template: {
                            studentIds: selGroup.lessons.map(l => l.studentId),
                            instructorId: sel.instructorId || "",
                            startTime: sel.startTime,
                            hours: sel.hours,
                            spot: sel.spot,
                            notes: sel.notes || "",
                            courseCode: selStu?.course || "",
                          },
                          studentNames: selGroup.students.map(s => s?.name || "?"),
                          courseName: (selStu?.course || "") + " " + sel.hours + "h",
                        });
                        setPasteDate(sel.date);
                      }}>
                📋 Copy
              </button>
            )}
            {!selGroup.isGroup && openLesson && (
              <button className="text-xs px-2 py-1 rounded text-sky-700 hover:bg-sky-50 border border-sky-200"
                      title="Open in Lessons tab"
                      onClick={()=>openLesson?.(sel.id)}>
                ✎ Lessons tab
              </button>
            )}
            {addLesson && (
              <button className="text-xs px-2 py-1 rounded text-emerald-700 hover:bg-emerald-50 border border-emerald-200"
                      onClick={()=>{ setAddStudentMode("pick"); setPickStudentId(""); setNewStudentDraft(BLANK_NEW_STU); setAddingToGroup(true); }}>
                + Add student
              </button>
            )}
            {delLesson && (
              <button className="ml-auto text-xs px-2 py-1 rounded text-rose-600 hover:bg-rose-50 border border-rose-100"
                      onClick={()=>{
                        const n = selGroup.lessons.length;
                        const label = n > 1
                          ? `This will delete all ${n} lessons in this group (${selGroup.students.map(s=>s?.name).join(", ")}). This cannot be undone.`
                          : `Delete the lesson for ${selStu?.name || "this student"} on ${sel.date}? This cannot be undone.`;
                        setConfirmDelete({
                          label,
                          onConfirm: () => {
                            if (selGroup.isGroup) delGroup(sel.groupId);
                            else delLesson(sel.id);
                            setSelected(null);
                          }
                        });
                      }}>
                {selGroup.lessons.length > 1 ? `Delete group (${selGroup.lessons.length})` : "Delete lesson"}
              </button>
            )}
            <button className="text-xs text-slate-500 hover:underline" onClick={()=>setSelected(null)}>close</button>
          </div>

          {/* Participants (always shown — lets you add phones / open profiles from the schedule) */}
          <ParticipantList
            students={selGroup.students}
            updStudent={updStudent}
            openStudentProfile={openStudentProfile}
            onRemove={delLesson ? (studentId) => {
              const lessonToRemove = selGroup.lessons.find(l => l.studentId === studentId);
              if (!lessonToRemove) return;
              const remaining = selGroup.lessons.filter(l => l.studentId !== studentId);
              if (remaining.length === 0) {
                // Last student — delete the whole lesson
                setSelected(null);
              } else if (remaining.length === 1) {
                // Ungroup the surviving lesson
                updLesson?.(remaining[0].id, { groupId: undefined });
                setSelected(remaining[0].id);
              } else {
                // Stay on same group
                setSelected(sel.groupId);
              }
              delLesson(lessonToRemove.id);
            } : undefined}
          />

          {/* Add student to this lesson/group */}
          {addingToGroup && (
            <div className="mb-3 bg-emerald-50 border border-emerald-200 rounded-lg p-3">
              <div className="flex items-center gap-2 mb-2">
                <div className="text-xs font-semibold text-emerald-800">Add student to this lesson</div>
                <div className="flex rounded border border-emerald-200 overflow-hidden text-[11px] ml-auto">
                  {[["pick","Existing"],["new","New student"]].map(([k,label]) => (
                    <button key={k} onClick={()=>setAddStudentMode(k)}
                      className={classNames("px-2.5 py-1", addStudentMode===k ? "bg-emerald-600 text-white font-semibold" : "bg-white text-slate-600 hover:bg-emerald-50")}>

              </div>

                <div className="flex gap-2 flex-wrap">
                  <SearchableStudentSelect
                    students={(state.students||[]).filter(s => !selGroup.lessons.some(l => l.studentId === s.id))}

                    placeholder="— pick student —" showCourse={true}
                    className="flex-1 min-w-[180px]" />

                    disabled={!pickStudentId}
                    onClick={() => {
                      if (!pickStudentId) return;
                      const gid = sel.groupId || `grp:${sel.date}|manual|${sel.startTime}`;
                      if (!sel.groupId) updLesson?.(sel.id, { groupId: gid });
                      addLesson({ studentId: pickStudentId, instructorId: sel.instructorId,
                        date: sel.date, startTime: sel.startTime, hours: sel.hours,
                        spot: sel.spot || state.settings?.spotName || "Sample Spot, NL",
                        groupId: gid, status: "scheduled" });
                      closeAddToGroup();
                      setSelected(gid);
                    }}
                    className="px-3 py-1 rounded text-xs font-semibold bg-emerald-600 hover:bg-emerald-700 text-white disabled:opacity-40 disabled:cursor-not-allowed">
                    Add
                  </button>
                  <button onClick={closeAddToGroup}
                    className="px-3 py-1 rounded text-xs font-medium bg-white border border-slate-200 hover:bg-slate-50 text-slate-600">
                    Cancel
                  </button>
