                  </div>
                );
              })}
          </div>
          <div className="mt-3 text-sm text-slate-600">
            Total: <span className="font-semibold">{monthTotal}h</span> across <span className="font-semibold">{monthDays} days</span>
          </div>
        </section>
      )}
    </div>
  );
}

// ---------- School Hours ----------
function SchoolHours({ lessons, students, instructors, updLesson }) {
  const weekStart = () => {
    const d = new Date(); d.setHours(0,0,0,0);
    const dow = (d.getDay()+6)%7;
    d.setDate(d.getDate()-dow);
    return d;
  };
  const [anchor, setAnchor] = useState(weekStart);
  const shift = (n) => { const d=new Date(anchor); d.setDate(anchor.getDate()+n*7); setAnchor(d); };
  const isThisWeek = localISO(anchor) === localISO(weekStart());
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(anchor); d.setDate(anchor.getDate()+i); return d; });
  const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const monthKey = localISO(anchor).slice(0,7);
  const todayISO_ = todayISO();

  const allLessons = lessons || [];
  const weekPlanned = days.reduce((s,d) => s + schoolTotalSlotPlannedHours(allLessons.filter(l => l.date===localISO(d))), 0);
  const weekActual  = days.reduce((s,d) => s + schoolTotalSlotHours(allLessons.filter(l => l.date===localISO(d))), 0);
  const monthLessons  = allLessons.filter(l => l.date?.startsWith(monthKey));
  const monthPlanned  = schoolTotalSlotPlannedHours(monthLessons);
  const monthActual   = schoolTotalSlotHours(monthLessons);
  const allPlanned    = schoolTotalSlotPlannedHours(allLessons);
  const allActual     = schoolTotalSlotHours(allLessons);

  const weekLessons = allLessons
    .filter(l => days.some(d => localISO(d) === l.date))
    .sort((a,b) => (a.date||"").localeCompare(b.date||"") || (a.startTime||"").localeCompare(b.startTime||""));

  return (
    <div className="space-y-4 max-w-4xl mx-auto">
      <div className="flex items-center gap-3 flex-wrap">
        <h2 className="font-bold text-lg text-slate-800">School Hours</h2>
      </div>

      {/* Summary cards */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
        {[
          { label: "This week",  planned: weekPlanned,  actual: weekActual,  color: "bg-sky-50 border-sky-200 text-sky-700" },
          { label: new Date(anchor).toLocaleString("default",{month:"long",year:"numeric"}), planned: monthPlanned, actual: monthActual, color: "bg-indigo-50 border-indigo-200 text-indigo-700" },
          { label: "All time",   planned: allPlanned,   actual: allActual,   color: "bg-emerald-50 border-emerald-200 text-emerald-700" },
        ].map(card => (
          <div key={card.label} className={classNames("rounded-xl border p-3 text-center", card.color)}>
            <div className="text-xs font-semibold mb-2 opacity-80">{card.label}</div>
            <div className="flex justify-around items-end gap-1">
              <div>
                <div className="text-xl font-bold tabular-nums">{card.planned}h</div>
                <div className="text-[10px] opacity-60 mt-0.5">planned</div>
              </div>
              <div className="text-lg opacity-20 mb-1">/</div>
              <div>
                <div className="text-xl font-bold tabular-nums">{card.actual}h</div>
                <div className="text-[10px] opacity-60 mt-0.5">actual</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Week navigator + lesson list */}
      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-4 flex-wrap">
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(-1)}>← Prev</button>
          <h2 className="font-semibold text-sm">
            {localISO(days[0])} – {localISO(days[6])}
          </h2>
          <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>shift(1)}>Next →</button>
          {!isThisWeek && (
            <button className="px-2 py-1 rounded btn-ghost text-sm" onClick={()=>setAnchor(weekStart())}>Today</button>
          )}
          <span className="text-xs font-semibold tabular-nums text-slate-500 ml-auto">
            {weekPlanned}h planned · {weekActual}h actual
          </span>
          <div className="flex gap-1.5">
            <button className="px-2.5 py-1 rounded text-xs font-medium bg-emerald-600 hover:bg-emerald-700 text-white"
              onClick={() => exportMyHoursXLSX(null, weekLessons, students, days, instructors, null)}>Excel</button>
            <button className="px-2.5 py-1 rounded text-xs font-medium bg-rose-600 hover:bg-rose-700 text-white"
              onClick={() => exportMyHoursPDF(null, weekLessons, students, instructors, days, null)}>PDF</button>
          </div>
        </div>

        {weekLessons.length === 0
          ? <div className="text-xs text-slate-400 py-2">No lessons scheduled this week.</div>
          : (
            <div className="space-y-1.5">
              {weekLessons.map(l => {
                const stu = (students||[]).find(s=>s.id===l.studentId);
                const ins = (instructors||[]).find(i=>i.id===l.instructorId);
                const isDone = l.status === "completed";
                const isCancelled = l.status === "cancelled";
                return (
                  <div key={l.id} className={classNames(
                    "flex items-center gap-2 text-xs rounded-lg py-1.5 px-2",
                    isDone ? "bg-emerald-50" : isCancelled ? "bg-slate-50 opacity-50" : "bg-sky-50/40"
                  )}>
                    <span className="text-slate-400 w-10 shrink-0 tabular-nums">{l.date?.slice(5)}</span>
                    <span className="text-slate-500 w-10 shrink-0 tabular-nums">{l.startTime}</span>
                    <span className="font-medium flex-1 min-w-0 truncate">{stu?.name||"—"}</span>
                    {ins && <span className="text-slate-400 shrink-0 hidden sm:inline">{ins.name}</span>}
                    {stu?.course && <span className="shrink-0 text-[10px] font-semibold bg-slate-100 text-slate-600 rounded px-1.5 py-0.5">{stu.course}</span>}
                    <div className="flex items-center gap-0.5 shrink-0">
                      <input type="number" min="0" max="12" step="0.5"
                        value={l.actualHours ?? l.hours ?? 0}
                        onChange={e => updLesson && updLesson(l.id, { actualHours: +e.target.value||0 })}
                        className="w-12 text-xs text-center border border-slate-200 rounded px-1 py-0.5 focus:border-sky-400 outline-none bg-white tabular-nums" />
                      <span className="text-slate-400 text-[10px]">h</span>
                    </div>
                    {!isCancelled && (
                      isDone
                        ? <button title="Undo"
                            className="shrink-0 text-[10px] font-semibold bg-emerald-100 text-emerald-700 border border-emerald-200 rounded px-1.5 py-0.5 hover:bg-emerald-200"
                            onClick={() => updLesson && updLesson(l.id, { status: "scheduled" })}>✓ done</button>
                        : <button title="Mark as completed"
                            className="shrink-0 text-[10px] font-semibold bg-white text-slate-500 border border-slate-200 rounded px-1.5 py-0.5 hover:bg-emerald-50 hover:text-emerald-700 hover:border-emerald-300"
                            onClick={() => updLesson && updLesson(l.id, { status: "completed" })}>Mark done</button>
                    )}
                  </div>
                );
              })}
            </div>
          )
        }
      </section>
    </div>
  );
}

            Merge import (add only)
            <input type="file" accept="application/json" className="hidden" onChange={mergeJSON}/>
          </label>
        </div>
        <div className="mt-3 pt-3 border-t border-slate-100">
          <div className="text-xs text-slate-500 mb-2">Export students &amp; lessons as a spreadsheet or printable report:</div>
          <div className="flex flex-wrap gap-2 text-sm">
            <button className="px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-700 text-white font-medium flex items-center gap-1.5"
                    onClick={() => exportAllXLSX(state)}>
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              Export Excel (.xlsx)
            </button>
            <button className="px-3 py-1.5 rounded bg-rose-600 hover:bg-rose-700 text-white font-medium flex items-center gap-1.5"
                    onClick={() => exportAllPDF(state)}>
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
              Export PDF
            </button>
          </div>
        </div>
      </section>
    </div>
  );
}

// ---------- 24h time input (always HH:MM, never AM/PM) ----------
function TimeInput({ label, value, onChange, className="" }) {
  const [raw, setRaw] = React.useState(value || "");
  React.useEffect(() => { setRaw(value || ""); }, [value]);

  const normalize = v => {
    const digits = v.replace(/\D/g, "").slice(0, 4);
    if (digits.length < 3) return digits;
    const h = parseInt(digits.slice(0, 2), 10);
    const m = parseInt(digits.slice(2, 4), 10);
    const ch = Math.min(23, Math.max(0, h));
    const cm = Math.min(59, Math.max(0, m));
    return `${String(ch).padStart(2,'0')}:${String(cm).padStart(2,'0')}`;
  };

  const handleChange = e => {
    let v = e.target.value;
    // allow typing: strip non-digits/colon, auto-insert colon after 2 digits
    v = v.replace(/[^0-9:]/g, "");
    if (v.length === 2 && !v.includes(":") && raw.length < 3) v = v + ":";
    setRaw(v);
    if (/^\d{2}:\d{2}$/.test(v)) onChange(v);
  };

  const handleBlur = () => {
    const n = normalize(raw.replace(/\D/g,""));
    if (n.length === 5) { setRaw(n); onChange(n); }
    else { setRaw(value || ""); } // revert if invalid
  };

  const inputCls = `w-full border rounded px-2 py-1 font-mono ${className}`;
  if (label) return (
    <label className="block">
      <span className="text-xs text-slate-500">{label}</span>
      <input type="text" inputMode="numeric" placeholder="HH:MM" maxLength={5}
             className={inputCls} value={raw}
             onChange={handleChange} onBlur={handleBlur} />
    </label>
  );
  return <input type="text" inputMode="numeric" placeholder="HH:MM" maxLength={5}
                className={inputCls} value={raw}
                onChange={handleChange} onBlur={handleBlur} />;
}

// ---------- Form atoms ----------
function Input({ label, value, onChange, type="text", step, min, max }) {
  return (
    <label className="block">
      <span className="text-xs text-slate-500">{label}</span>
      <input type={type} step={step} min={min} max={max}
             className="w-full border rounded px-2 py-1"
             value={value ?? ""} onChange={e=>onChange(e.target.value)} />
    </label>
  );
}
function SearchableStudentSelect({ students, value, onChange, placeholder = "— pick a student —", className = "", label = null, showCourse = false, showLevel = false }) {
  const [query, setQuery] = React.useState('');
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  const sorted = [...(students || [])].sort((a, b) => a.name.localeCompare(b.name));
  const filtered = query
    ? sorted.filter(s => s.name.toLowerCase().includes(query.toLowerCase()) || (s.course||'').toLowerCase().includes(query.toLowerCase()))
    : sorted;
  const selected = sorted.find(s => s.id === value);

  function displayName(s) {
    let n = s.name;
    if (showCourse && s.course) n += ' · ' + s.course;
    if (showLevel && s.level) n += ' (' + s.level + ')';
    return n;
  }

  React.useEffect(() => { if (!open) setQuery(''); }, [open]);
  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  return (
    <div ref={ref} className={"relative " + (className || "")}>
      {label && <span className="text-xs text-slate-500 block mb-0.5">{label}</span>}
      <button type="button"
        className="w-full border border-slate-200 rounded px-2 py-1 bg-white text-sm text-left flex items-center justify-between gap-1 focus:outline-none focus:border-emerald-400"
        onClick={() => setOpen(o => !o)}>
        <span className={selected ? 'text-slate-800' : 'text-slate-400'}>
          {selected ? displayName(selected) : placeholder}
        </span>
        <span className="text-slate-400 text-xs shrink-0">▾</span>
      </button>
      {open && (
        <div className="absolute z-50 mt-1 left-0 right-0 bg-white border border-slate-200 rounded shadow-lg">
          <div className="p-1.5 border-b border-slate-100">
            <input autoFocus
              className="w-full px-2 py-1 text-sm border border-slate-200 rounded outline-none focus:border-emerald-400"
              placeholder="Search..."
              value={query}
              onChange={e => setQuery(e.target.value)}
              onClick={e => e.stopPropagation()} />
          </div>
          <div className="max-h-52 overflow-y-auto text-sm">
            {!query && (
              <div className="px-2 py-1.5 text-slate-400 cursor-pointer hover:bg-slate-50"
                onClick={() => { onChange(''); setOpen(false); }}>{placeholder}</div>
            )}
            {filtered.map(s => (
              <div key={s.id}
                className={"px-2 py-1.5 cursor-pointer hover:bg-emerald-50 " + (s.id === value ? 'bg-emerald-50 font-medium text-emerald-700' : 'text-slate-800')}
                onClick={() => { onChange(s.id); setOpen(false); }}>
                {displayName(s)}
              </div>
            ))}
            {filtered.length === 0 && <div className="px-2 py-2 text-slate-400 italic text-xs">No match</div>}
          </div>
        </div>
      )}
    </div>
  );
}

function Select({ label, value, onChange, options, display }) {
  return (
    <label className="block">
      <span className="text-xs text-slate-500">{label}</span>
      <select className="w-full border rounded px-2 py-1"
              value={value ?? ""} onChange={e=>onChange(e.target.value)}>
        {options.map(o => <option key={o} value={o}>{display ? display(o) : o}</option>)}
      </select>
    </label>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
