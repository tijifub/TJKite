// Migrate state from older formats to the current schema
function migrateState(s) {
  // 1. Seed admins if missing
  if (!s.admins || !s.admins.length) {
    s = { ...s, admins: SEED.admins };
  }
  // 2. Migrate flat myHours (old: { "YYYY-MM-DD": {session,notes} })
  //    to per-admin format (new: { [adminId]: { "YYYY-MM-DD": {session,notes} } })
  if (s.myHours && typeof s.myHours === "object") {
    const topKeys = Object.keys(s.myHours);
    const isOldFormat = topKeys.some(k => /^\d{4}-\d{2}-\d{2}$/.test(k));
    if (isOldFormat) {
      const firstAdminId = (s.admins[0] || SEED.admins[0]).id;
      s = { ...s, myHours: { [firstAdminId]: s.myHours } };
    }
  }
  return s;
}

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return SEED;
    const parsed = JSON.parse(raw);
    return migrateState({ ...SEED, ...parsed,
      templates: { ...SEED.templates, ...(parsed.templates||{}) },
      settings:  { ...SEED.settings,  ...(parsed.settings||{}) }
    });
  } catch { return SEED; }
}
function save(state) { localStorage.setItem(LS_KEY, JSON.stringify(state)); }

// Add/subtract minutes from "HH:MM" string
const addMinutes = (time, mins) => {
  const [h, m] = (time||"09:00").split(':').map(Number);
  const total = ((h * 60 + m + mins) % 1440 + 1440) % 1440;
  return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
};

// Is this lesson the student's first day (needs front-desk check-in)?
// Returning guests skip check-in — they know the place already.
const isFirstLesson = (lesson, students, allLessons) => {
  const stu = (students||[]).find(s => s.id === lesson.studentId);
  if (stu?.returning) return false;
  // If tjkiteImportKey has an explicit day number, trust it
  const parts = (lesson.tjkiteImportKey || '').split('|');
  const dayNum = parseInt(parts[parts.length - 1], 10);
  if (dayNum === 1) return true;
  if (dayNum > 1) return false;
  // No day number (manually added lesson) — check-in only on the student's chronologically first lesson
  if (allLessons) {
    const stuLessons = allLessons.filter(l => l.studentId === lesson.studentId && l.status !== 'cancelled');
    if (stuLessons.length > 1) {
      const sorted = [...stuLessons].sort((a,b) => (a.date+a.startTime).localeCompare(b.date+b.startTime));
      return sorted[0].id === lesson.id;
    }
  }
  // Single lesson or no context — always check-in
  return true;
};

// Effective meeting type for a lesson:
// Uses lesson.meetingType if explicitly set; otherwise defaults to
// 'front_desk' for first lessons and 'beach' for subsequent ones.
const getMeetingType = (lesson, students, allLessons) => {
  if (lesson.meetingType === 'front_desk' || lesson.meetingType === 'beach') return lesson.meetingType;
  return isFirstLesson(lesson, students, allLessons) ? 'front_desk' : 'beach';
};

// ---------- Windy API ----------
const MS_PER_HOUR = 3600000;
const MPS_TO_KT = 1.94384;

function windFromUV(u, v) {
  if (u == null || v == null) return null;
  const speedMps = Math.sqrt(u*u + v*v);
  const knots = speedMps * MPS_TO_KT;
  // Meteorological convention: direction wind comes FROM
  let dirDeg = (Math.atan2(-u, -v) * 180 / Math.PI + 360) % 360;
  return { knots: +knots.toFixed(1), dirDeg: Math.round(dirDeg) };
}
function dirToCompass(deg) {
  if (deg == null) return "—";
  const sectors = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return sectors[Math.round(deg/22.5)%16];
}

async function fetchWindyForecast({ lat, lon, key }) {
  const r = await fetch("https://api.windy.com/api/point-forecast/v2", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      lat, lon,
      model: "gfs",
      parameters: ["wind","windGust","temp"],
      levels: ["surface"],
      key
    })
  });
  if (!r.ok) {
    let msg = `Windy API ${r.status}`;
    try { const j = await r.json(); if (j?.message) msg += ": " + j.message; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

// turn raw windy response into [{ ts, knots, gustKt, dirDeg, tempC }, ...]
function parseWindyForecast(raw) {
  if (!raw || !raw.ts) return [];
  const u = raw["wind_u-surface"] || [];
  const v = raw["wind_v-surface"] || [];
  const g = raw["gust-surface"]   || [];
  const t = raw["temp-surface"]   || [];
  return raw.ts.map((ts,i) => {
    const w = windFromUV(u[i], v[i]) || { knots:null, dirDeg:null };
    return {
      ts,
      knots: w.knots,
      dirDeg: w.dirDeg,
      gustKt: g[i] != null ? +(g[i]*MPS_TO_KT).toFixed(1) : null,
      tempC: t[i] != null ? +(t[i]-273.15).toFixed(1) : null
    };
  });
}

// find the forecast point closest to a given Date
function forecastNearest(points, date) {
  if (!points?.length) return null;
  const target = date.getTime();
  let best = points[0], bestDiff = Math.abs(points[0].ts - target);
  for (let i=1;i<points.length;i++) {
    const d = Math.abs(points[i].ts - target);
    if (d < bestDiff) { best = points[i]; bestDiff = d; }
  }
  // Only trust if within ~2h (GFS is 3h-stepped)
  return bestDiff <= 2*MS_PER_HOUR ? best : null;
}

function lessonDateTime(lesson) {
  // Treat lesson date+time as local. For windy comparison we need a real Date.
  return new Date(`${lesson.date}T${lesson.startTime || "10:00"}:00`);
}

// Decide whether a lesson should be rescheduled given the wind forecast
function lessonWindAdvice(lesson, level, forecast, settings) {
  const fc = forecastNearest(forecast, lessonDateTime(lesson));
  if (!fc || fc.knots == null) return { fc, status: "unknown", reason: "no forecast" };
  const k = fc.knots, gust = fc.gustKt ?? k;
  const min = settings.windMin ?? 10;
  const max = settings.windMax ?? 30;
  const beg = settings.windMaxBeginner ?? 22;
  if (k < min)   return { fc, status: "bad",      reason: `wind only ${k} kt — too light` };
  if (gust > max) return { fc, status: "bad",     reason: `gusts ${gust} kt — too strong, unsafe` };
  if ((level === "Beginner" || level === "Improver") && gust > beg)
    return { fc, status: "bad",  reason: `gusts ${gust} kt — too strong for ${level}` };
  if (k < min + 2)        return { fc, status: "marginal", reason: `wind ${k} kt — marginal` };
  if (gust > max - 3)     return { fc, status: "marginal", reason: `gusts ${gust} kt — strong` };
  return { fc, status: "good", reason: `wind ${k} kt, gust ${gust} kt — looks rideable` };
}

// React hook: fetch forecast and refresh every 30 min
function useWindyForecast(settings) {
  const [data, setData] = useState({ status: "idle", points: [], error: null, fetchedAt: null });
  const refresh = async () => {
    if (!settings.windyKey || !settings.lat || !settings.lon) {
      setData({ status: "idle", points: [], error: "Set Windy key + coords in Settings", fetchedAt: null });
      return;
    }
    setData(d => ({ ...d, status: "loading" }));
    try {
      const raw = await fetchWindyForecast({ lat: settings.lat, lon: settings.lon, key: settings.windyKey });
      setData({ status: "ok", points: parseWindyForecast(raw), error: null, fetchedAt: Date.now() });
    } catch (e) {
      setData({ status: "error", points: [], error: e.message || String(e), fetchedAt: Date.now() });
    }
  };
  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 30*60*1000);
    return () => clearInterval(id);
    // eslint-disable-next-line
  }, [settings.windyKey, settings.lat, settings.lon]);
  return { ...data, refresh };
}

// ---------- RWS Waterinfo — water level via local server proxy ----------
// The server (server.js) proxies /api/tide → RWS to avoid browser CORS restrictions.
async function fetchRWSTideData(lat, lon) {
  const r = await fetch(`/api/tide?lat=${lat}&lon=${lon}`);
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(body.error || `Server error ${r.status}`);
  }
  return r.json(); // { station, points }
}

function useRWSTide(lat, lon) {
  const [tide, setTide] = useState({ loading: true, points: [], station: null, error: null });
  const load = async (setT) => {
    setT(t => ({ ...t, loading: true, error: null }));
    try {
      const { station, points } = await fetchRWSTideData(lat, lon);
      setT({ loading: false, points, station, error: null });
    } catch (e) {
      console.error('RWS tide error:', e);
      setT(t => ({ ...t, loading: false, error: e.message }));
    }
  };
  useEffect(() => {
    if (!lat || !lon) return;
    let dead = false;
    const setT = fn => { if (!dead) setTide(fn); };
    load(setT);
    const id = setInterval(() => load(setT), 30 * 60 * 1000);
    return () => { dead = true; clearInterval(id); };
  }, [lat, lon]);
  return tide;
}

// ---------- Multi-source forecast (Compare tab) ----------
const OM_MODELS = [
  { id: "ecmwf_ifs025",        label: "ECMWF" },
  { id: "gfs_seamless",         label: "NOAA GFS" },
  { id: "icon_seamless",        label: "DWD ICON" },

async function fetchOpenMeteo({ lat, lon }) {
  const models = OM_MODELS.map(m => m.id).join(",");
  const url = "https://api.open-meteo.com/v1/forecast"
    + `?latitude=${lat}&longitude=${lon}`
    + "&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m,precipitation,cloud_cover"
    + "&wind_speed_unit=kn&forecast_days=3&timezone=auto"
    + `&models=${models}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("Open-Meteo " + r.status);
  return r.json();
}

async function fetchOpenMeteoMarine({ lat, lon }) {
  const models = OM_MARINE_MODELS.map(m => m.id).join(",");
  const url = "https://marine-api.open-meteo.com/v1/marine"
    + `?latitude=${lat}&longitude=${lon}`
    + "&hourly=wave_height,wave_direction,wave_period"
    + "&forecast_days=3&timezone=auto"
    + `&models=${models}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("Open-Meteo marine " + r.status);
  return r.json();
}

async function fetchOpenMeteoTide({ lat, lon }) {
  // sea_level_height_msl is FES2014 — request it on its own (no model suffix).
  const url = "https://marine-api.open-meteo.com/v1/marine"
    + `?latitude=${lat}&longitude=${lon}`
    + "&hourly=sea_level_height_msl"
    + "&forecast_days=3&timezone=auto";
  const r = await fetch(url);
  if (!r.ok) throw new Error("Open-Meteo tide " + r.status);
  return r.json();
}

async function fetchMetNo({ lat, lon }) {
  const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${lat}&lon=${lon}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("Met.no " + r.status);
  return r.json();
}

// Open-Meteo returns time as "YYYY-MM-DDTHH:mm" (no TZ when timezone=auto). Treat as local.
function omTimeToTs(s) {
  // Browsers parse "YYYY-MM-DDTHH:mm" as local in modern engines.
  return new Date(s).getTime();
}

function omSeries(om, modelId, varName) {
  if (!om?.hourly) return null;
  const times = om.hourly.time;
  const vals = om.hourly[`${varName}_${modelId}`] ?? om.hourly[varName];
  if (!times || !vals) return null;
  return times.map((t, i) => ({ ts: omTimeToTs(t), value: vals[i] }));
}

function metnoSeries(metno, varName) {
  if (!metno?.properties?.timeseries) return null;
  return metno.properties.timeseries.map(p => {
    const inst = p.data?.instant?.details || {};
    const next1 = p.data?.next_1_hours?.details || {};
    let value = null;
    if (varName === "wind_speed_10m")     value = inst.wind_speed != null ? +(inst.wind_speed * MPS_TO_KT).toFixed(1) : null;
    else if (varName === "wind_gusts_10m") value = inst.wind_speed_of_gust != null ? +(inst.wind_speed_of_gust * MPS_TO_KT).toFixed(1) : null;
    else if (varName === "wind_direction_10m") value = inst.wind_from_direction ?? null;
    else if (varName === "temperature_2m") value = inst.air_temperature ?? null;
    else if (varName === "precipitation")  value = next1.precipitation_amount ?? null;
    else if (varName === "cloud_cover")    value = inst.cloud_area_fraction ?? null;
    return { ts: new Date(p.time).getTime(), value };
  });
}

// Find nearest-in-time reading within ±90min of a target Date.
function nearestValue(series, targetTs, toleranceMs = 90 * 60 * 1000) {
  if (!series?.length) return null;
  let best = null, bestDiff = Infinity;
  for (const p of series) {
    const d = Math.abs(p.ts - targetTs);
    if (d < bestDiff) { bestDiff = d; best = p; }
  }
  return best && bestDiff <= toleranceMs ? best.value : null;
}

// Build 3-hourly slots for the next `days` days starting at the next 3h boundary.
function buildSlots({ days = 3, stepHours = 3 } = {}) {
  const start = new Date();
  start.setMinutes(0, 0, 0);
  // Round UP to next stepHours boundary so we don't show stale past hours.
  while (start.getHours() % stepHours !== 0) start.setHours(start.getHours() + 1);
  const slots = [];
  const total = (days * 24) / stepHours;
  for (let i = 0; i < total; i++) {
    slots.push(new Date(start.getTime() + i * stepHours * 3600000));
  }
  return slots;
}

function useMultiForecast(settings) {
  const [data, setData] = useState({
    status: "idle", om: null, marine: null, tide: null, metno: null, errors: [], fetchedAt: null
  });
  const refresh = async () => {
    if (!settings.lat || !settings.lon) {
      setData({ status: "idle", om: null, marine: null, tide: null, metno: null,
                errors: ["Set coords in Settings"], fetchedAt: null });
      return;
    }
    setData(d => ({ ...d, status: "loading" }));
    const args = { lat: settings.lat, lon: settings.lon };
    const results = await Promise.allSettled([
      fetchOpenMeteo(args),
      fetchOpenMeteoMarine(args),
      fetchOpenMeteoTide(args),
      fetchMetNo(args)
    ]);
    const [om, marine, tide, metno] = results;
    setData({
      status: "ok",
      om:     om.status === "fulfilled" ? om.value : null,
      marine: marine.status === "fulfilled" ? marine.value : null,
      tide:   tide.status === "fulfilled" ? tide.value : null,
      metno:  metno.status === "fulfilled" ? metno.value : null,
      errors: results
        .map((r, i) => r.status === "rejected"
          ? ["Open-Meteo","Open-Meteo Marine","Open-Meteo Tide","Met.no"][i] + ": " + (r.reason?.message || r.reason)
          : null)
        .filter(Boolean),
      fetchedAt: Date.now()
    });
  };
  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 30 * 60 * 1000);
    return () => clearInterval(id);
    // eslint-disable-next-line
  }, [settings.lat, settings.lon]);
  return { ...data, refresh };
}


const TJKITE_COURSE_PLAN = {
  SCH:   { hours: [1.5], label: "Schnupperkurs" },
  AK:    { hours: [1.5, 1.5], label: "Aufbaukurs" },
  GK:    { hours: [1.5, 1.5, 1], label: "Grundkurs" },
  KC:    { hours: [1.5, 1.5, 1.5, 1.5], label: "Kitecamp" },
  "WF-BC": { hours: [1.5, 1.5], label: "Wingfoil Basic" },
  "WF-C":  { hours: [1.5, 1.5, 1.5, 1.5], label: "Wingfoil Camp" },
  "WF-IT": { hours: [3], label: "Wingfoil Individualtraining" },
  "IT":    { hours: [3], label: "Kitesurf Individualtraining" }
};

// Hours per session by course, group size threshold, and day-within-course.
// Each entry: [minGroupSize, [hoursDay1, hoursDay2, ...]]
// Pick the last row whose minGroupSize <= actual group size.
const COURSE_HOURS = {
  GK:      [[1, [1.5, 1.5, 1  ]],  [2, [2, 2, 1.5]],  [3, [2.5, 2.5, 2.5]],  [6, [3, 3, 3  ]]],
  KC:      [[1, [1.5,1.5,1.5,1.5]], [2, [2, 2, 2, 2]], [3, [3,2.5,2.5,2]], [6, [3, 3, 3, 3]]],
  AK:      [[1, [1.5, 1.5]],        [2, [2, 2]],        [4, [2.5, 2.5]]],
  "WF-BC": [[1, [1.5, 1.5]],        [2, [2, 2]],        [4, [2.5, 2.5]]],
  "WF-C":  [[1, [1.5,1.5, 1, 1]],   [2, [2, 2, 2, 2]], [4, [2.5,2.5,2.5,2.5]]],
  SCH:     [[1, [1.5]]],
  "WF-IT": [[1, [3]]],
  "IT":    [[1, [3]]]
};

function getGroupHours(courseCode, groupSize, dayNum) {
  const tiers = COURSE_HOURS[courseCode];
  if (!tiers) return 1.5;
  let chosen = tiers[0];
  for (const t of tiers) { if (groupSize >= t[0]) chosen = t; }
  const plan = chosen[1];
  return plan[dayNum - 1] ?? plan[plan.length - 1];
}

// Total instructor hours for an entire course at a given group size
function getTotalCourseHours(courseCode, groupSize) {
  const tiers = COURSE_HOURS[courseCode];
  if (tiers) {
    let chosen = tiers[0];
    for (const t of tiers) { if (groupSize >= t[0]) chosen = t; }
    return chosen[1].reduce((s, h) => s + h, 0);
  }
  // fallback: solo hours from COURSE_PRICE_DEFAULTS
  const p = COURSE_PRICE_DEFAULTS.find(d => d.code === courseCode || d.id === courseCode);
  return p?.hours || 1.5;
}

const addDaysISO = (iso, days) => {
  const d = new Date(iso + "T12:00:00");
  d.setDate(d.getDate() + days);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
};

// Each visit is a unique booking — key always includes arrival+departure so the same
// student returning gets a fresh student record (and a fresh set of lessons).
const tjkiteGuestKey = (g) =>
  (g.email
    ? "email:" + g.email.toLowerCase() + "|" + (g.arrival||"") + "|" + (g.departure||"")
    : "guest:" + (g.name||"").toLowerCase() + "|" + (g.arrival||"") + "|" + (g.departure||""));

// Match only on the full key — name/email alone is no longer enough because the same
// person may have multiple visits, each with its own student record.
const tjkiteGuestMatchesStudent = (g, stu) =>
  stu.tjkiteKey && stu.tjkiteKey === tjkiteGuestKey(g);

function buildTjkiteStudent(g) {
  return {
    id: uid(),
    name: g.name,
    phone: "",
    email: g.email || "",
    level: "Beginner",
    language: "en",
    packageName: g.course
      ? "TJKite · " + g.course
      : (g.arrival === g.departure ? "Day visit" : "TJKite guest"),
    hoursBooked: g.course ? (TJKITE_COURSE_PLAN[g.course]?.hours || []).reduce((sum,h)=>sum+h,0) : 0,
    amountPaid: 0,
    balanceOwed: 0,
    arrival: g.arrival,
    departure: g.departure,
    country: g.country,
    dob: g.dob || "",
    address: g.address || "",
    newsletter: !!g.newsletter,
    course: g.course || "",
    startTime: g.startTime || "",
    sparpreis: !!g.sparpreis,
    tjkiteKey: tjkiteGuestKey(g),
    notes: "TJKite · " + g.arrival + " → " + g.departure + (g.country ? " · " + g.country : "") + (g.course ? " · " + g.course : "") + (g.sparpreis ? " · Sparpreis" : "") + (g.newsletter ? " · newsletter" : ""),
    createdAt: todayISO()
  };
}

function patchTjkiteStudent(stu, g) {
  const patch = { tjkiteKey: stu.tjkiteKey || tjkiteGuestKey(g) };
  ["arrival","departure","country","course","startTime","address"].forEach(key => {
    const val = key === "startTime" ? (g.startTime || "") : (g[key] || "");
    if (val && stu[key] !== val) patch[key] = val;
  });
  if ((g.dob || "") && stu.dob !== g.dob) patch.dob = g.dob;
  if (g.email && stu.email !== g.email) patch.email = g.email;
  if (g.sparpreis !== undefined && stu.sparpreis !== !!g.sparpreis) patch.sparpreis = !!g.sparpreis;
  if (g.newsletter !== undefined && stu.newsletter !== !!g.newsletter) patch.newsletter = !!g.newsletter;
  if (g.course) {
    const booked = (TJKITE_COURSE_PLAN[g.course]?.hours || []).reduce((sum,h)=>sum+h,0);
    if (stu.packageName !== "TJKite · " + g.course) patch.packageName = "TJKite · " + g.course;
    if ((+stu.hoursBooked || 0) === 0 && booked) patch.hoursBooked = booked;
  }
  return Object.keys(patch).some(k => stu[k] !== patch[k]) ? { ...stu, ...patch } : stu;
}

function syncTjkiteState(s) {
  if (!Array.isArray(window.TJKITE_GUESTS) || window.TJKITE_GUESTS.length === 0) return s;
  let changed = false;
  let students = [...s.students];
  let lessons = [...s.lessons];

  for (const g of window.TJKITE_GUESTS) {
    if (!g.name) continue;
    let idx = students.findIndex(stu => tjkiteGuestMatchesStudent(g, stu) || (stu.tjkiteKey && stu.tjkiteKey === tjkiteGuestKey(g)));
    if (idx === -1) {
      students.push(buildTjkiteStudent(g));
      idx = students.length - 1;
      changed = true;
    } else {
      const patched = patchTjkiteStudent(students[idx], g);
      if (patched !== students[idx]) {
        students[idx] = patched;
        changed = true;
      }
    }

    const plan = g.course && TJKITE_COURSE_PLAN[g.course];
    if (!plan || !g.arrival) continue;
    // Check-in is at the stated time; actual lesson starts 30 min later (only for 09:00 slots)
    const configTime = g.startTime || "09:00";
    const startTime = configTime === "09:00" ? "09:30" : configTime;
    plan.hours.forEach((hours, i) => {
      const date = addDaysISO(g.arrival, i);
      if (g.departure && date > g.departure) return;
      const importKey = tjkiteGuestKey(g) + "|" + g.course + "|" + (i+1);
      const exists = lessons.some(l => l.tjkiteImportKey === importKey);
      if (exists) return;
      lessons.push({
        id: uid(),
        studentId: students[idx].id,
        instructorId: "",
        date,
        startTime,
        hours,
        status: "scheduled",
        spot: s.settings.spotName || "Sample Spot, NL",
        notes: "",
        meetingType: i === 0 ? 'front_desk' : 'beach',
        tjkiteImportKey: importKey
      });
      changed = true;
    });
  }

  // ---- Group assignment pass ----
  // Lessons sharing the same course code, date, and startTime belong to one group.
  // Group cards are dragged/assigned as a unit. Duration scales with headcount.
  const groupMap = {};
  lessons.forEach((l, idx) => {
    if (!l.tjkiteImportKey) return;
    const parts = l.tjkiteImportKey.split('|');
    // tjkiteImportKey: "email:x@y|GK|1"  or  "guest:name|arr|dep|GK|1"
    // course code is always the second-to-last segment
    const courseCode = parts[parts.length - 2];
    if (!TJKITE_COURSE_PLAN[courseCode]) return;
    const key = `${l.date}|${courseCode}|${l.startTime || '09:00'}`;
    if (!groupMap[key]) groupMap[key] = [];
    groupMap[key].push(idx);
  });

  Object.entries(groupMap).forEach(([key, indices]) => {
    const n = indices.length;
    const gid = 'grp:' + key;
    const courseCode = key.split('|')[1];
    indices.forEach(idx => {
      const l = lessons[idx];
      const parts = l.tjkiteImportKey?.split('|') || [];
      const dayNum = parseInt(parts[parts.length - 1], 10) || 1;
      const groupHours = getGroupHours(courseCode, n, dayNum);
      if (l.groupId !== gid || l.hours !== groupHours) {
        lessons[idx] = { ...l, groupId: gid, hours: groupHours };
        changed = true;
      }
    });
  });

  return changed ? { ...s, students, lessons } : s;
}

function readAuth() {
  try { return JSON.parse(sessionStorage.getItem(AUTH_KEY)) || null; } catch { return null; }
}
function writeAuth(auth) { sessionStorage.setItem(AUTH_KEY, JSON.stringify(auth)); }
function clearAuth()     { sessionStorage.removeItem(AUTH_KEY); }

    e.preventDefault();

        setError("Incorrect password.");
      }

        </div>

        {/* Role toggle */}
        <div className="flex rounded-lg border border-slate-200 overflow-hidden mb-5 text-sm">
          {[["admin","Admin"],["instructor","Instructor"]].map(([m,l]) => (
            <button key={m} type="button"
              className={classNames("flex-1 py-2 font-medium transition",
                mode===m ? "bg-sky-600 text-white" : "bg-white text-slate-600 hover:bg-slate-50")}
              onClick={()=>{ setMode(m); setError(""); setPassword(""); setPin(""); }}>
              {l}
            </button>
          ))}
        </div>

        <form onSubmit={submit} className="space-y-4">
          {mode === "admin" && (

              <div>

                <select autoFocus className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"

                <label className="text-xs font-semibold text-slate-500 block mb-1">Password</label>
                <div className="relative">
                  <input type={showPw ? "text" : "password"}
                    className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-sky-400"
                    placeholder="Admin password"
                    value={password} onChange={e=>setPassword(e.target.value)} />
                  <button type="button" tabIndex={-1}
                    className="absolute right-2 top-2 text-slate-400 hover:text-slate-600 text-xs"
                    onClick={()=>setShowPw(v=>!v)}>{showPw ? "hide" : "show"}</button>
                </div>
              </div>
            </>

            <>
              <div>
                <label className="text-xs font-semibold text-slate-500 block mb-1">Instructor</label>
                <select autoFocus className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400"
                  value={selId} onChange={e=>{ setSelId(e.target.value); setError(""); }}>

    </div>
  );
}

  }));
  const delGroup = (groupId) => setState(s => ({
    ...s, lessons: s.lessons.filter(l => l.groupId !== groupId)
  }));

  // hours computed: actual = sum of completed lesson hours
  const hoursFor = (studentId) => {
    const ls = state.lessons.filter(l => l.studentId === studentId);
    const actual    = ls.filter(l=>l.status==="completed").reduce((s,l)=>s+(+(l.actualHours??l.hours)||0),0);
    const scheduled = ls.filter(l=>l.status==="scheduled").reduce((s,l)=>s+(+l.hours||0),0);
    return { actual, scheduled };
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `kite-school-${todayISO()}.json`;
    a.click();
  };
  const importJSON = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { setState(JSON.parse(r.result)); } catch { alert("Invalid JSON"); } };
    r.readAsText(file);
    e.target.value = "";
  };
  const mergeJSON = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const patch = JSON.parse(r.result);
        const pStudents = patch.students || [];
        const pLessons  = patch.lessons  || [];
        setState(s => {
          const students = [...s.students];
          const lessons  = [...s.lessons];
          let added = 0, patched = 0, lessonAdded = 0;
          for (const g of pStudents) {
            const idx = students.findIndex(x =>
              (g.tjkiteKey && x.tjkiteKey === g.tjkiteKey) ||
              (g.email && x.email && x.email.toLowerCase() === g.email.toLowerCase())
            );
            if (idx === -1) {
              students.push({ ...g, id: g.id || uid(), createdAt: g.createdAt || todayISO() });
              added++;
            } else {
              // patch missing fields only — never overwrite existing data
              let changed = false;
              const cur = students[idx];
              const next = { ...cur };
              if (g.course && !cur.course)    { next.course    = g.course;    changed = true; }
              if (g.sparpreis && !cur.sparpreis) { next.sparpreis = true;      changed = true; }
              if (g.startTime && !cur.startTime) { next.startTime = g.startTime; changed = true; }
              if (g.tjkiteKey && !cur.tjkiteKey)    { next.tjkiteKey    = g.tjkiteKey;   changed = true; }
              if (changed) { students[idx] = next; patched++; }
            }
          }
          for (const l of pLessons) {
            const exists = l.tjkiteImportKey
              ? lessons.some(x => x.tjkiteImportKey === l.tjkiteImportKey)
              : lessons.some(x => x.id === l.id);
            if (!exists) { lessons.push({ ...l, id: l.id || uid() }); lessonAdded++; }
          }
          alert(`Merge complete:\n• ${added} students added\n• ${patched} students patched\n• ${lessonAdded} lessons added`);
          return { ...s, students, lessons };
        });
      } catch { alert("Invalid JSON"); }
    };
    r.readAsText(file);
    e.target.value = "";
  };
  const resetAll = () => { if (confirm("Wipe all data and restore samples?")) { localStorage.removeItem(LS_KEY); setState(SEED); } };

  // ── Auth gate ──
  if (!auth) {
    return <LoginScreen
      instructors={state.instructors}
      admins={state.admins || SEED.admins}
      onLogin={(a) => { writeAuth(a); setAuth(a); if (a.role === "instructor") setTab("myhours"); }} />;
  }

  const isAdmin      = auth.role === "admin";
  const canEdit      = isAdmin;  // instructor = own tabs only
  const myInstructor = auth.role === "instructor" ? state.instructors.find(i => i.id === auth.instructorId) : null;
  const myAdmin      = isAdmin ? (state.admins || []).find(a => a.id === auth.adminId) : null;
  // Per-admin myHours: state.myHours[adminId] or empty object
  const myAdminHours    = isAdmin ? (state.myHours?.[auth.adminId] || {}) : {};
  const setMyAdminHours = (h) => upd({ myHours: { ...(state.myHours||{}), [auth.adminId]: h } });

                     value={state.settings.schoolName}

            : <span className="text-base sm:text-lg font-semibold px-1 truncate max-w-[140px] sm:max-w-none">{state.settings.schoolName}</span>

          {/* Shared-data status badge — hidden on mobile */}

               sharedStatus==="shared"  ? "bg-emerald-50 text-emerald-700 border-emerald-200"

          </div>

          {/* Desktop tab nav — hidden on mobile */}
          <nav className="hidden sm:flex ml-auto flex-wrap gap-1 text-sm">
            {visibleTabs.map(([k,l]) =>
              <button key={k} onClick={()=>setTab(k)}
                className={classNames("px-3 py-1.5 rounded-full transition",
                  tab===k ? "bg-sky-500 text-white shadow" : "btn-ghost text-slate-700")}>

          {/* User chip + logout */}
          <div className="flex items-center gap-1.5 ml-auto sm:ml-2 sm:pl-2 sm:border-l sm:border-slate-200">
            <span className={classNames("text-[11px] px-2 py-1 rounded-full font-medium",

                      onClick={()=>setMobileMenuOpen(o=>!o)}>

      <main className="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-6 pb-20 sm:pb-6">

                                  lessons={state.lessons}

                                  updLesson={updLesson}
                                  addLesson={(l)=>setState(s=>({...s,lessons:[...s.lessons,{id:uid(),status:"scheduled",...l}]}))}
                                  delLesson={delLesson}

                                  state={state} />}
        {tab==="schoolhours" && <SchoolHours lessons={state.lessons} students={state.students} instructors={state.instructors} updLesson={updLesson} />}
        {tab==="salaries"    && <SalaryReport instructors={state.instructors} lessons={state.lessons} tasks={state.tasks||[]} students={state.students} courseRates={state.settings.courseRates} taskRate={state.settings.taskRate} admins={state.admins||[]} allAdminHours={state.myHours||{}} instructorId={auth.role==="instructor" ? auth.instructorId : null} />}
        {tab==="courses"     && <Courses />}

        {tab==="import"      && <ImportTab

        {tab==="settings"    && <Settings state={state} upd={upd}

      </main>

    </div>
  );

const IMPORT_FLAG_MAP = {
  '🇩🇪':{ country:'DE', language:'de' }, '🇳🇱':{ country:'NL', language:'nl' },
  '🇬🇧':{ country:'GB', language:'en' }, '🇺🇸':{ country:'US', language:'en' },
  '🇦🇹':{ country:'AT', language:'de' }, '🇨🇭':{ country:'CH', language:'de' },
  '🇫🇷':{ country:'FR', language:'en' }, '🇧🇪':{ country:'BE', language:'nl' },
  '🇩🇰':{ country:'DK', language:'en' }, '🇸🇪':{ country:'SE', language:'en' },
  '🇳🇴':{ country:'NO', language:'en' }, '🇵🇱':{ country:'PL', language:'en' },
  '🇮🇹':{ country:'IT', language:'en' }, '🇪🇸':{ country:'ES', language:'en' },
};
const IMPORT_COURSE_KEYWORDS = [
  { code:'WF-C',  words:['wingfoil camp'] },
  { code:'WF-IT', words:['wingfoil individual','wf-it','individualtraining'] },
  { code:'WF-BC', words:['wingfoil basic','basiscursus','wf-bc'] },
  { code:'GK',    words:['grundkurs'] },
  { code:'AK',    words:['aufbaukurs'] },
  { code:'KC',    words:['kitecamp','kite camp'] },
  { code:'SCH',   words:['schnupperkurs','walk-in','walk in','schnupper'] },
];
function importCountryToLang(cc) {
  if (['DE','AT','CH'].includes(cc)) return 'de';
  if (['NL','BE'].includes(cc)) return 'nl';
  return 'en';
}
function importDetectCourse(text) {
  const lo = (text||'').toLowerCase();
  for (const { code, words } of IMPORT_COURSE_KEYWORDS)
    if (words.some(w => lo.includes(w))) return code;
  return '';
}
function importParseDate(str) {
  const m = str.match(/(\d{1,2})\.(\d{2})\.(\d{2,4})/);
  if (!m) return null;
  const [, d, mo, y] = m;
  const year = y.length === 2 ? '20' + y : y;
  return `${year}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
}
function importExtractFlag(text) {
  const m = text.match(/^([\uD83C][\uDDE6-\uDDFF][\uD83C][\uDDE6-\uDDFF])\s*/);
  if (!m) return { country:'', language:'', rest:text };
  const info = IMPORT_FLAG_MAP[m[1]] || { country:'DE', language:'de' };
  return { country:info.country, language:info.language, rest:text.slice(m[0].length) };
}
function importParseLine(raw) {
  let line = raw.trim();
  if (!line || line.length < 3) return null;
  const { country, language, rest } = importExtractFlag(line);
  line = rest;
  const drRe = /(\d{1,2}\.\d{2}\.\d{2,4})\s*[-–]\s*(\d{1,2}\.\d{2}\.\d{2,4})/;
  const drMatch = line.match(drRe);
  let arrival=null, departure=null, startTime='09:00', notes='', nameText='', courseText='';
  if (drMatch) {
    arrival   = importParseDate(drMatch[1]);
    departure = importParseDate(drMatch[2]);
    const before = line.slice(0, drMatch.index).trim().replace(/,\s*$/,'');
    const after  = line.slice(drMatch.index + drMatch[0].length).trim().replace(/^[,\s]+/,'');
    const timeMatch = after.match(/(ab|vanaf)\s+(\d{1,2}:\d{2})/i);
    if (timeMatch) {
      const [h,m2] = timeMatch[2].split(':').map(Number);
      startTime = `${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
      notes = after.slice(after.indexOf(timeMatch[0]) + timeMatch[0].length).replace(/^[,\s]+/,'').trim();
    } else { notes = after; }
    const ci = before.indexOf(',');
    if (ci > 0) { nameText = before.slice(0,ci).trim(); courseText = before.slice(ci+1).trim(); }
    else { nameText = before; }
  } else {
    const parts = line.split(',').map(s=>s.trim()).filter(Boolean);
    nameText = parts[0]||''; courseText = parts.slice(1).join(', ');
  }
  const sparpreis = line.toLowerCase().includes('sparpreis');
  const course = importDetectCourse(courseText) || importDetectCourse(line);
  const name   = nameText.replace(/\s*,\s*$/,'').trim();
  if (!name || name.length < 2) return null;
  const rc = country || 'DE';
  const rl = language || importCountryToLang(rc);
  return { name, course, courseLabel:courseText.replace(/\s*\(sparpreis\)/i,'').trim(),
           arrival, departure, startTime, country:rc, language:rl, notes:notes.trim(), sparpreis };
}
function importParseText(text) { return text.split('\n').map(importParseLine).filter(Boolean); }

async function importAnalyzeImage(base64, mimeType, apiKey) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'Content-Type':'application/json','x-api-key':apiKey,
              'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({
      model:'claude-opus-4-6', max_tokens:4096,
      messages:[{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:mimeType, data:base64 }},
        { type:'text', text:`This is a kitesurf school booking screenshot. Extract every student booking.
Return ONLY a valid JSON array with fields: name, country (2-letter ISO), course (as written), sparpreis (bool), arrival (YYYY-MM-DD), departure (YYYY-MM-DD), startTime (HH:MM from "ab"/"vanaf"), notes.
Example: [{"name":"Hans Müller","country":"DE","course":"Wingfoil Camp","sparpreis":false,"arrival":"2026-05-14","departure":"2026-05-17","startTime":"09:00","notes":""}]` }
      ]}]
    })
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||`API ${res.status}`); }
  const data = await res.json();
  let text = (data.content[0]?.text||'').trim().replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'');
  return JSON.parse(text).map(e=>({
    ...e, course: importDetectCourse(e.course)||e.course, courseLabel:e.course,
    language: importCountryToLang(e.country||'DE'), sparpreis:!!e.sparpreis, notes:e.notes||'',
  }));
}

function importBuildData(entries) {
  const students=[], lessons=[];
  const today = new Date().toISOString().slice(0,10);
  for (const e of entries) {
    if (!e.selected) continue;
    const id = Math.random().toString(36).slice(2,10);
    const nameLo = e.name.toLowerCase().replace(/\s+/g,' ');
    const tjkiteKey = e.arrival && e.departure
      ? `guest:${nameLo}|${e.arrival}|${e.departure}` : `guest:${nameLo}`;
    const plan = TJKITE_COURSE_PLAN[e.course];
    const totalHours = plan ? plan.hours.reduce((a,b)=>a+b,0) : 0;
    students.push({ id, name:e.name, phone:'', email:'', level:'Beginner', language:e.language,
      packageName: e.course ? `TJKite · ${e.course}` : '',
      hoursBooked:totalHours, coursePrice:0, amountPaid:0, balanceOwed:0,
      arrival:e.arrival||today, departure:e.departure||today,
      country:e.country, dob:null, address:'', newsletter:false,
      course:e.course, startTime:e.startTime, sparpreis:e.sparpreis,
      tjkiteKey, notes:e.notes, createdAt:today });
    if (plan && e.arrival) {
      plan.hours.forEach((h,i) => {
        const d = new Date(e.arrival); d.setDate(d.getDate()+i);
        lessons.push({ id:Math.random().toString(36).slice(2,10), studentId:id, instructorId:'',
          date:d.toISOString().slice(0,10), startTime:e.startTime, hours:h, status:'scheduled',
          spot:'Sample Spot, NL',
          notes:`${plan.label} day ${i+1}${e.sparpreis?' · Sparpreis':''}`,
          meetingType: i === 0 ? 'front_desk' : 'beach',
          tjkiteImportKey:`${tjkiteKey}|${e.course}|${i+1}` });
      });
    } else if (e.arrival) {
      lessons.push({ id:Math.random().toString(36).slice(2,10), studentId:id, instructorId:'',
        date:e.arrival, startTime:e.startTime, hours:1.5, status:'scheduled',
        spot:'Sample Spot, NL', notes:e.courseLabel||e.notes||'',
        tjkiteImportKey:`${tjkiteKey}|unknown|1` });
    }
  }
  return { students, lessons };
}

function ImportTab({ onImport }) {

  const [apiKey,    setApiKey]    = React.useState(() => { try { return localStorage.getItem('tjkite-claude-key')||''; } catch(e){ return ''; } });
  const [entries,   setEntries]   = React.useState([]);
  const [status,    setStatus]    = React.useState(null);
  const [loading,   setLoading]   = React.useState(false);
  const [dragging,  setDragging]  = React.useState(false);
  const fileRef = React.useRef();

  const saveKey = k => { setApiKey(k); try { localStorage.setItem('tjkite-claude-key',k); } catch(e){} };
  const updateEntry = (idx, patch) => setEntries(es => es.map((e,i) => i===idx ? {...e,...patch} : e));
  const toggleAll = val => setEntries(es => es.map(e => ({...e,selected:val})));

  const doParse = () => {
    const parsed = importParseText(pasteText);
    if (!parsed.length) { setStatus({ type:'warn', msg:'No bookings detected. Check format.' }); return; }
    setEntries(parsed.map(e => ({...e, selected:true, _id:Math.random().toString(36).slice(2,10)})));
    setStatus({ type:'success', msg:`Parsed ${parsed.length} booking${parsed.length>1?'s':''} from text.` });
  };

  const doAnalyze = async (file) => {
    if (!apiKey.trim()) { setStatus({ type:'error', msg:'Enter your Claude API key first.' }); return; }
    setLoading(true);
    setStatus({ type:'info', msg:'🤖 Analyzing screenshot with Claude AI…' });
    try {
      const base64 = await new Promise((res,rej) => {
        const r = new FileReader(); r.onload = e => res(e.target.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(file);
      });
      const parsed = await importAnalyzeImage(base64, file.type||'image/png', apiKey);
      setEntries(parsed.map(e => ({...e, selected:true, _id:Math.random().toString(36).slice(2,10)})));
      setStatus({ type:'success', msg:`AI found ${parsed.length} booking${parsed.length>1?'s':''}.` });

    finally { setLoading(false); }

  const onFileChange = e => { const f = e.target.files[0]; if (f) doAnalyze(f); };

function TideWidget({ tide, settings }) {
  const tideMode   = settings.tideWindowMode ?? "level";
  const THRESHOLD_CM = Math.round((settings.tideThresholdM ?? 1.8) * 100);
  const windowH    = settings.tideLowTideWindowH ?? 3;
  const windowMs   = windowH * 3600 * 1000;
  const now = Date.now();

  const current = tide.points.length
    ? tide.points.reduce((a, b) => Math.abs(b.ts - now) < Math.abs(a.ts - now) ? b : a)
    : null;

  // Detect all low/high extremes.
  const extremes = [];
  for (let i = 1; i < tide.points.length - 1; i++) {
    const p = tide.points[i];
    if (p.cm > tide.points[i-1].cm && p.cm > tide.points[i+1].cm)
      extremes.push({ ...p, type: 'high' });
    else if (p.cm < tide.points[i-1].cm && p.cm < tide.points[i+1].cm)
      extremes.push({ ...p, type: 'low' });
  }
  const futureExtremes = extremes.filter(e => e.ts >= now - 15 * 60 * 1000).slice(0, 6);
  const lows = extremes.filter(e => e.type === 'low');

  // ── Level-mode: threshold crossings ──
  const crossings = [];
  for (let i = 1; i < tide.points.length; i++) {
    const prev = tide.points[i-1], curr = tide.points[i];
    if (prev.cm >= THRESHOLD_CM && curr.cm < THRESHOLD_CM) {
      const frac = (THRESHOLD_CM - prev.cm) / (curr.cm - prev.cm);
      crossings.push({ ts: prev.ts + frac * (curr.ts - prev.ts), type: 'enter' });
    } else if (prev.cm < THRESHOLD_CM && curr.cm >= THRESHOLD_CM) {
      const frac = (THRESHOLD_CM - prev.cm) / (curr.cm - prev.cm);
      crossings.push({ ts: prev.ts + frac * (curr.ts - prev.ts), type: 'exit' });
    }
  }
  const nextCrossing = crossings.find(c => c.ts > now) || null;

  // ── Hour-mode: nearest low tide ──
  const nearestFutureLow = lows.find(l => l.ts >= now - windowMs) || null;
  const inHourWindow = nearestFutureLow ? Math.abs(nearestFutureLow.ts - now) <= windowMs : false;

  // Are we in the window right now?
  const inWindow = tideMode === "level"
    ? (current != null && current.cm < THRESHOLD_CM)
    : inHourWindow;

  const fmtTime = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
  const fmtDay  = ts => localISO(new Date(ts)) === todayISO() ? 'today' : 'tom';
  const fmtDur  = ms => {
    const m = Math.max(0, Math.round(ms / 60000));
    const h = Math.floor(m / 60), mm = m % 60;
    return h > 0 ? `${h}h ${mm}m` : `${mm}m`;
  };
  const fmtM = cm => `${cm >= 0 ? '+' : ''}${(cm / 100).toFixed(2)} m`;

  // Headline status.
  let headline, sub, chip, chipClass;
  if (tideMode === "level") {
    if (inWindow && current) {
      headline = `🟢 Go — ${fmtM(current.cm)} NAP`;
      sub = nextCrossing?.type === 'exit'
        ? `window closes ${fmtDay(nextCrossing.ts)} ${fmtTime(nextCrossing.ts)} (in ${fmtDur(nextCrossing.ts - now)})`
        : `tide below ${settings.tideThresholdM ?? 1.8} m NAP`;
      chip = "✓ in window — go"; chipClass = "bg-emerald-100 text-emerald-700";
    } else if (nextCrossing?.type === 'enter') {
      headline = `⏳ Opens ${fmtDay(nextCrossing.ts)} ${fmtTime(nextCrossing.ts)}`;
      sub = `tide ${current ? fmtM(current.cm) + ' NAP' : '—'} — above ${settings.tideThresholdM ?? 1.8} m`;
      chip = "⚠ outside window"; chipClass = "bg-rose-100 text-rose-700";
    } else if (current) {
      headline = `${fmtM(current.cm)} NAP`;
      sub = current.cm < THRESHOLD_CM ? `tide below ${settings.tideThresholdM ?? 1.8} m` : `tide above ${settings.tideThresholdM ?? 1.8} m`;
      chip = current.cm < THRESHOLD_CM ? "✓ in window" : "⚠ outside window";
      chipClass = current.cm < THRESHOLD_CM ? "bg-emerald-100 text-emerald-700" : "bg-rose-100 text-rose-700";
    } else {
      headline = "—"; sub = "no tide data"; chip = "—"; chipClass = "bg-slate-100 text-slate-600";
    }
  } else {
    // Hour mode
    if (inHourWindow && nearestFutureLow) {
      const msTill = nearestFutureLow.ts - now;
      headline = `🟢 Go — low tide ${msTill < 0 ? 'was' : 'in'} ${fmtDur(Math.abs(msTill))}`;
      const closeTs = nearestFutureLow.ts + windowMs;
      sub = `window closes ${fmtDay(closeTs)} ${fmtTime(closeTs)} (in ${fmtDur(closeTs - now)})`;
      chip = "✓ in window — go"; chipClass = "bg-emerald-100 text-emerald-700";
    } else if (nearestFutureLow) {
      const openTs = nearestFutureLow.ts - windowMs;
      headline = `⏳ Opens ${fmtDay(openTs)} ${fmtTime(openTs)}`;
      sub = `low tide at ${fmtTime(nearestFutureLow.ts)} ${fmtDay(nearestFutureLow.ts)} · ±${windowH}h window`;
      chip = "⚠ outside window"; chipClass = "bg-rose-100 text-rose-700";
    } else {
      headline = "—"; sub = "no tide extremes found"; chip = "—"; chipClass = "bg-slate-100 text-slate-600";
    }
  }

  // SVG sparkline — green bands per mode, amber threshold line (level mode only).
  const chartPts = tide.points.filter(p => {
    const today = new Date(); today.setHours(0,0,0,0);
    const limit = new Date(today); limit.setDate(limit.getDate()+2);
    return p.ts >= today.getTime() && p.ts < limit.getTime();
  });
  const W = 400, H = 60, PAD = 4;
  let svgPath = '', nowX = null, windowBands = [], thresholdY = null;
  if (chartPts.length > 1) {
    const t0 = chartPts[0].ts, t1 = chartPts[chartPts.length-1].ts;
    const cMin = Math.min(...chartPts.map(p=>p.cm));
    const cMax = Math.max(...chartPts.map(p=>p.cm));
    const range = cMax - cMin || 1;
    const px = t => PAD + ((t - t0) / (t1 - t0)) * (W - 2*PAD);
    const py = c => H - PAD - ((c - cMin) / range) * (H - 2*PAD);
    svgPath = chartPts.map((p,i) => `${i===0?'M':'L'}${px(p.ts).toFixed(1)},${py(p.cm).toFixed(1)}`).join(' ');
    nowX = px(now);
    if (tideMode === "level") {
      thresholdY = py(THRESHOLD_CM);
      // bands: where tide < threshold
      const windows = [];
      let bandStart = chartPts[0].cm < THRESHOLD_CM ? t0 : null;
      for (const c of crossings) {
        if (c.ts < t0 || c.ts > t1) continue;
        if (c.type === 'enter' && bandStart == null) bandStart = c.ts;
        else if (c.type === 'exit' && bandStart != null) { windows.push([bandStart, c.ts]); bandStart = null; }
      }
      if (bandStart != null) windows.push([bandStart, t1]);
      windowBands = windows.map(([s, e]) => ({ x1: px(Math.max(s,t0)), w: Math.max(0, px(Math.min(e,t1)) - px(Math.max(s,t0))) }));
    } else {
      // bands: ±windowH around each low within the chart range
      const visLows = lows.filter(l => l.ts > t0 - windowMs && l.ts < t1 + windowMs);
      windowBands = visLows.map(lo => {
        const s = Math.max(lo.ts - windowMs, t0);
        const e = Math.min(lo.ts + windowMs, t1);
        return { x1: px(s), w: Math.max(0, px(e) - px(s)) };
      });
    }
  }

  const modeLabel = tideMode === "level"
    ? `≤ ${settings.tideThresholdM ?? 1.8} m NAP`
    : `±${windowH}h low tide`;

  return (
    <section className="bg-white rounded-xl border border-slate-200 p-4">
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <span className="text-xl">🌊</span>
        <h2 className="font-semibold">Tide Window</h2>
        <span className="text-xs text-slate-400 font-mono">{modeLabel}</span>
        {tide.station && <span className="text-xs text-slate-400">{tide.station.Naam}</span>}
        {tide.loading && <span className="text-xs text-slate-400 ml-auto animate-pulse">Loading…</span>}
        {tide.error  && <span className="text-xs text-rose-500 ml-auto">{tide.error}</span>}
      </div>

      <div className="flex items-start gap-6 flex-wrap">
        <div>
          <div className={classNames("text-2xl font-bold tabular-nums", inWindow ? "text-emerald-600" : "text-slate-700")}>
            {headline}
          </div>
          <div className="text-xs text-slate-400 mt-0.5">{sub}</div>
          <div className={classNames("chip text-xs mt-1", chipClass)}>{chip}</div>
        </div>

        {futureExtremes.length > 0 && (
          <div className="flex flex-wrap gap-2">
            {futureExtremes.map((e, i) => (
              <div key={i} className={classNames("px-2 py-1 rounded text-xs text-center border",
                e.type === 'low'
                  ? "border-emerald-200 bg-emerald-50 text-emerald-700"
                  : "border-rose-200 bg-rose-50 text-rose-700")}>
                <div className="font-semibold">{e.type === 'low' ? '▼ Low' : '▲ High'}</div>
                <div>{fmtDay(e.ts)} {fmtTime(e.ts)}</div>
                <div className="tabular-nums">{fmtM(e.cm)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Sparkline with shaded windows */}
      {svgPath && (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full mt-3" style={{height:60}} preserveAspectRatio="none">
          {windowBands.map((b, i) => (
            <rect key={i} x={b.x1.toFixed(1)} y={PAD} width={b.w.toFixed(1)} height={H-2*PAD}
                  fill="#10b981" fillOpacity="0.12" />
          ))}
          <path d={svgPath} fill="none" stroke="#0ea5e9" strokeWidth="1.8" />
          {thresholdY != null && (
            <line x1={PAD} y1={thresholdY.toFixed(1)} x2={W-PAD} y2={thresholdY.toFixed(1)}
                  stroke="#f59e0b" strokeWidth="1" strokeDasharray="4,3" />
          )}
          {nowX != null && <line x1={nowX.toFixed(1)} y1={PAD} x2={nowX.toFixed(1)} y2={H-PAD} stroke="#94a3b8" strokeWidth="1" strokeDasharray="2,2" />}
        </svg>
      )}
    </section>
  );
}

function Dashboard({ state, hoursFor, setTab, windy, tide }) {

  const upcoming = state.lessons

  const totBooked = state.students.reduce((s,x)=>s+(+x.hoursBooked||0),0);
  const totActual = state.students.reduce((s,x)=>s+hoursFor(x.id).actual,0);
  const owed      = state.students.reduce((s,x)=>s+(+x.balanceOwed||0),0);

  // wind-flagged lessons across the next 2 days
  const flagged = useMemo(() => {
    if (!windy.points?.length) return [];
    const horizon = new Date(); horizon.setDate(horizon.getDate()+2); horizon.setHours(23,59,59);
    return state.lessons
      .filter(l => l.status==="scheduled")
      .filter(l => { const d = lessonDateTime(l); return d >= new Date() && d <= horizon; })
      .map(l => {
        const stu = state.students.find(s=>s.id===l.studentId);
        const advice = lessonWindAdvice(l, stu?.level || "Intermediate", windy.points, state.settings);
        return { lesson: l, student: stu, advice };
      })
      .filter(x => x.advice.status==="bad" || x.advice.status==="marginal")
      .sort((a,b)=> lessonDateTime(a.lesson) - lessonDateTime(b.lesson));
  }, [windy.points, state.lessons, state.students, state.settings]);

  const stats = [
    { label: "Students",       value: state.students.length, accent: "bg-sky-100 text-sky-700" },
    { label: "Instructors",    value: state.instructors.length, accent: "bg-emerald-100 text-emerald-700" },
    { label: "Booked hours",   value: totBooked, accent: "bg-indigo-100 text-indigo-700" },
    { label: "Actual hours",   value: totActual, accent: "bg-cyan-100 text-cyan-700" },
    { label: "Outstanding",    value: `${owed} ${state.settings.currency}`, accent: "bg-amber-100 text-amber-700" },
    { label: "Upcoming",       value: state.lessons.filter(l=>l.status==="scheduled" && l.date>=today).length, accent: "bg-fuchsia-100 text-fuchsia-700" }
  ];

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
        {stats.map(s =>
          <div key={s.label} className="bg-white rounded-xl border border-slate-200 p-4">
            <div className={classNames("chip mb-2", s.accent)}>{s.label}</div>
            <div className="text-2xl font-semibold">{s.value}</div>
          </div>
        )}
      </div>

      <WindyWidget windy={windy} settings={state.settings} setTab={setTab} />

      <TideWidget tide={tide} settings={state.settings} />

      <WindyMap settings={state.settings} />

      {flagged.length > 0 && (
        <section className="bg-rose-50 border border-rose-200 rounded-xl p-4">
          <div className="flex items-center mb-3 gap-2">
            <span className="text-2xl">⚠️</span>
            <h2 className="font-semibold text-rose-800">{flagged.length} lesson{flagged.length===1?"":"s"} should be rescheduled</h2>
            <button className="ml-auto text-sm text-rose-700 hover:underline" onClick={()=>setTab("schedule")}>Open schedule →</button>
          </div>
          <ul className="text-sm divide-y divide-rose-100">
            {flagged.map(({lesson, student, advice}) => (
              <li key={lesson.id} className="py-2 flex items-center gap-3 flex-wrap">
                <span className="tabular-nums w-32 text-rose-900">{lesson.date} {lesson.startTime}</span>
                <span className="flex-1 min-w-[10ch]">{student?.name||"—"} <span className="text-rose-400">({student?.level})</span></span>
                <span className={classNames("chip", advice.status==="bad" ? "bg-rose-200 text-rose-800" : "bg-amber-200 text-amber-900")}>
                  {advice.fc?.knots ?? "?"} kt {advice.fc?.dirDeg!=null && dirToCompass(advice.fc.dirDeg)}
                </span>
                <span className="text-rose-700 text-xs basis-full md:basis-auto">{advice.reason}</span>
              </li>
            ))}
          </ul>
        </section>
      )}

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center mb-3">
          <h2 className="font-semibold">Student progress</h2>
          <button className="ml-auto text-sm text-sky-600 hover:underline" onClick={()=>setTab("students")}>Manage students →</button>
        </div>
        <div className="space-y-3">
          {state.students.map(s => {
            const { actual } = hoursFor(s.id);
            const booked = +s.hoursBooked || 0;
            const pct = booked === 0 ? 0 : Math.min(100, Math.round((actual/booked)*100));
            const over = booked > 0 && actual > booked;
            return (
              <div key={s.id} className="">
                <div className="flex items-center text-sm mb-1">
                  <span className="font-medium">{s.name}</span>
                  <span className="ml-2 chip bg-slate-100 text-slate-600">{s.level}</span>
                  <span className="ml-auto tabular-nums">{actual} / {booked} h{over && " (over)"}</span>
                </div>
                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className={classNames("h-full progress-bar", over && "over")} style={{ width: `${over?100:pct}%` }} />
                </div>
              </div>
            );
          })}
          {state.students.length === 0 &&
            <div className="text-sm text-slate-500">No students yet — add some on the Students tab.</div>}
        </div>
      </section>

      <section className="bg-white rounded-xl border border-slate-200 p-4">
        <div className="flex items-center mb-3">
          <h2 className="font-semibold">Next 5 lessons</h2>
          <button className="ml-auto text-sm text-sky-600 hover:underline" onClick={()=>setTab("schedule")}>Open schedule →</button>
        </div>
        <ul className="text-sm divide-y divide-slate-100">
          {upcoming.map(l => {
            const stu = state.students.find(s=>s.id===l.studentId);
            const ins = state.instructors.find(i=>i.id===l.instructorId);
            return (
              <li key={l.id} className="py-2 flex items-center gap-3">
                <span className="tabular-nums w-32 text-slate-500">{l.date} {l.startTime}</span>
                <span className="flex-1">{stu?.name||"—"} <span className="text-slate-400">with</span> {ins?.name||"—"}</span>
                <span className="chip bg-sky-100 text-sky-700">{l.hours}h</span>
              </li>
            );
          })}
          {upcoming.length===0 && <li className="py-2 text-slate-500">No upcoming lessons scheduled.</li>}
        </ul>
      </section>

      <VdwsLevelChart />
    </div>
  );
}

// ---------- Windy widget ----------
function WindyWidget({ windy, settings, setTab }) {
  // bucket points by date string (YYYY-MM-DD), local time
  const grouped = useMemo(() => {
    const out = {};
    for (const p of windy.points || []) {
      const d = new Date(p.ts);
      const k = d.toISOString().slice(0,10); // UTC date — close enough for forecast strips
      (out[k] ||= []).push({ ...p, hour: d.getHours() });
    }
    return out;
  }, [windy.points]);

  const today = todayISO();
  const tom = (() => { const d = new Date(); d.setDate(d.getDate()+1); return localISO(d); })();

  const knotsBg = (k) => {
    if (k == null) return "bg-slate-100 text-slate-400";
    if (k < (settings.windMin ?? 10))         return "bg-slate-200 text-slate-600";
    if (k > (settings.windMax ?? 30))         return "bg-rose-200 text-rose-800";
    if (k > (settings.windMaxBeginner ?? 22)) return "bg-amber-200 text-amber-900";
    if (k < (settings.windMin ?? 10) + 2)     return "bg-amber-100 text-amber-800";
    return "bg-emerald-200 text-emerald-800";
  };

  const Strip = ({ label, dateKey }) => {
    const pts = (grouped[dateKey] || []).sort((a,b)=>a.ts-b.ts);
    return (
      <div>
        <div className="text-xs font-semibold text-slate-600 mb-1">{label} <span className="text-slate-400">{dateKey}</span></div>
        {pts.length === 0
          ? <div className="text-xs text-slate-400 italic">No forecast points for this day yet.</div>
          : <div className="flex gap-1 overflow-x-auto pb-1">
              {pts.map((p,i) => (
                <div key={i} className={classNames("flex-shrink-0 rounded-lg px-2 py-1.5 text-center min-w-[58px]", knotsBg(p.knots))}>
                  <div className="text-[10px] tabular-nums opacity-80">{String(p.hour).padStart(2,"0")}:00</div>
                  <div className="text-sm font-semibold tabular-nums">{p.knots ?? "—"}<span className="text-[9px] font-normal"> kt</span></div>
                  <div className="text-[10px]" title={`${p.dirDeg}°`}>
                    <span style={{ display:"inline-block", transform:`rotate(${(p.dirDeg||0)+180}deg)` }}>↑</span> {dirToCompass(p.dirDeg)}
                  </div>
                  {p.gustKt != null && p.gustKt > p.knots+3 &&
                    <div className="text-[10px] opacity-80">g{p.gustKt}</div>}
                </div>
              ))}
            </div>}
      </div>
    );
  };

  return (
    <section className="bg-white rounded-xl border border-slate-200 p-4">
      <div className="flex items-center mb-3 gap-2 flex-wrap">
        <h2 className="font-semibold">Wind forecast — {settings.spotName || "Spot"}</h2>
        <span className="text-xs text-slate-500">({settings.lat}, {settings.lon})</span>
        {windy.status==="loading" && <span className="chip bg-sky-100 text-sky-700">loading…</span>}
        {windy.status==="ok"      && <span className="chip bg-emerald-100 text-emerald-700">live</span>}
        {windy.status==="error"   && <span className="chip bg-rose-100 text-rose-700">error</span>}
        {windy.fetchedAt && <span className="text-[11px] text-slate-400">updated {new Date(windy.fetchedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',hour12:false})}</span>}
        <button className="ml-auto text-xs px-2 py-1 rounded btn-ghost" onClick={()=>windy.refresh()}>Refresh</button>
        <button className="text-xs px-2 py-1 rounded btn-ghost" onClick={()=>setTab("settings")}>Settings</button>
      </div>
      {windy.error && (
        <div className="text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded p-2 mb-3">
          {windy.error}
          <div className="text-rose-500 mt-1">If opened from a file:// URL the API may block CORS. Try serving the folder via a local web server (e.g. <code>python3 -m http.server</code>) and open via http://localhost:8000.</div>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <Strip label="Today"    dateKey={today} />
        <Strip label="Tomorrow" dateKey={tom} />
      </div>
      <div className="mt-3 flex flex-wrap gap-2 text-[11px] text-slate-500">
        <span className="chip bg-slate-200 text-slate-600">&lt; {settings.windMin} kt: too light</span>
        <span className="chip bg-emerald-200 text-emerald-800">ideal</span>
        <span className="chip bg-amber-200 text-amber-900">&gt; {settings.windMaxBeginner} kt: strong (beginners out)</span>
        <span className="chip bg-rose-200 text-rose-800">&gt; {settings.windMax} kt: cancel</span>
      </div>
    </section>
  );
}

// ---------- Compare forecast ----------
const COMPARE_SECTIONS = [
  { id: "wind",    label: "Wind",    unit: "kt"  },
  { id: "tide",    label: "Tide",    unit: "m"   },
  { id: "waves",   label: "Waves",   unit: "m"   },
  { id: "weather", label: "Weather", unit: "°C"  }
];

const fmtNum = (v, digits = 0) => v == null ? "—" : Number(v).toFixed(digits);
const dayKey = (d) => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const dayLabel = (d) => d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });

function buildWindRows({ windy, om, metno }) {
  const rows = [];
  if (windy?.points?.length) {
    rows.push({
      source: "Windy / GFS",
      series: windy.points.map(p => ({ ts: p.ts, value: p.knots, dir: p.dirDeg, gust: p.gustKt }))
    });
  }
  for (const m of OM_MODELS) {
    const speed = omSeries(om, m.id, "wind_speed_10m");
    if (!speed) continue;
    const dir   = omSeries(om, m.id, "wind_direction_10m");
    const gust  = omSeries(om, m.id, "wind_gusts_10m");
    rows.push({
      source: m.label,
      series: speed.map((p, i) => ({
        ts: p.ts, value: p.value,
        dir:  dir ? dir[i]?.value : null,
        gust: gust ? gust[i]?.value : null
      }))
    });
  }
  if (metno) {
    const speed = metnoSeries(metno, "wind_speed_10m");
    const dir   = metnoSeries(metno, "wind_direction_10m");
    const gust  = metnoSeries(metno, "wind_gusts_10m");
    if (speed) rows.push({
      source: "Met.no (Yr)",
      series: speed.map((p, i) => ({
        ts: p.ts, value: p.value,
        dir:  dir ? dir[i]?.value : null,
        gust: gust ? gust[i]?.value : null
      }))
    });
  }
  return rows;
}

function buildWeatherRows({ om, metno }) {
  const rows = [];
  for (const m of OM_MODELS) {
    const temp   = omSeries(om, m.id, "temperature_2m");
    if (!temp) continue;
    const precip = omSeries(om, m.id, "precipitation");
    const cloud  = omSeries(om, m.id, "cloud_cover");
    rows.push({
      source: m.label,
      series: temp.map((p, i) => ({
        ts: p.ts, value: p.value,
        precip: precip ? precip[i]?.value : null,
        cloud:  cloud  ? cloud[i]?.value  : null
      }))
    });
  }
  if (metno) {
    const temp   = metnoSeries(metno, "temperature_2m");
    const precip = metnoSeries(metno, "precipitation");
    const cloud  = metnoSeries(metno, "cloud_cover");
    if (temp) rows.push({
      source: "Met.no (Yr)",
      series: temp.map((p, i) => ({
        ts: p.ts, value: p.value,
        precip: precip ? precip[i]?.value : null,
        cloud:  cloud  ? cloud[i]?.value  : null
      }))
    });
  }
  return rows;
}

function buildWaveRows({ marine }) {
  const rows = [];
  for (const m of OM_MARINE_MODELS) {
    const h = omSeries(marine, m.id, "wave_height");
    if (!h) continue;
    const dir = omSeries(marine, m.id, "wave_direction");
    const per = omSeries(marine, m.id, "wave_period");
    rows.push({
      source: m.label,
      series: h.map((p, i) => ({
        ts: p.ts, value: p.value,
        dir: dir ? dir[i]?.value : null,
        period: per ? per[i]?.value : null
      }))
    });
  }
  return rows;
}

function buildTideRows({ tide }) {
  if (!tide?.hourly?.time) return [];
  // sea_level_height_msl is FES2014 — fetched standalone, no model suffix.
  const times = tide.hourly.time;
  const vals = tide.hourly.sea_level_height_msl;
  if (!vals) return [];
  return [{
    source: "Open-Meteo (FES2014)",
    series: times.map((t, i) => ({ ts: omTimeToTs(t), value: vals[i] }))
  }];
}

function CompareCell({ row, slot, section }) {
  const v = nearestValue(row.series.map(p => ({ ts: p.ts, value: p.value })), slot.getTime());
  if (v == null) return <td className="px-1 py-0.5 text-center text-slate-300">—</td>;
  // Find the matching point object for extras (dir/gust/etc).
  let nearest = null, bestDiff = Infinity;
  for (const p of row.series) {
    const d = Math.abs(p.ts - slot.getTime());
    if (d < bestDiff) { bestDiff = d; nearest = p; }
  }
  let bg = "";
  if (section === "wind") {
    const k = +v;
    if (k < 8)      bg = "bg-slate-100 text-slate-500";
    else if (k < 12) bg = "bg-sky-50 text-sky-700";
    else if (k < 22) bg = "bg-emerald-100 text-emerald-800";
    else if (k < 30) bg = "bg-amber-100 text-amber-800";
    else             bg = "bg-rose-200 text-rose-900";
  } else if (section === "waves") {
    const h = +v;
    if (h < 0.5)      bg = "bg-slate-100 text-slate-500";
    else if (h < 1.0) bg = "bg-sky-50 text-sky-700";
    else if (h < 1.8) bg = "bg-emerald-100 text-emerald-800";
    else if (h < 2.5) bg = "bg-amber-100 text-amber-800";
    else              bg = "bg-rose-200 text-rose-900";
  } else if (section === "weather") {
    const t = +v;
    if (t < 5)       bg = "bg-sky-100 text-sky-800";
    else if (t < 12) bg = "bg-sky-50 text-sky-700";
    else if (t < 20) bg = "bg-emerald-50 text-emerald-700";
    else             bg = "bg-amber-100 text-amber-800";
  } else if (section === "tide") {
    bg = +v >= 0 ? "bg-sky-50 text-sky-700" : "bg-slate-100 text-slate-600";
  }
  const digits = section === "tide" || section === "waves" ? 1 : 0;
  const main = fmtNum(v, digits);
  let sub = null;
  if (section === "wind" && nearest?.dir != null) sub = dirToCompass(nearest.dir);
  if (section === "waves" && nearest?.period != null) sub = nearest.period.toFixed(0) + "s";
  if (section === "weather" && nearest?.precip != null && nearest.precip > 0.05) sub = nearest.precip.toFixed(1) + "mm";
  return (
    <td className={classNames("px-1 py-0.5 text-center tabular-nums leading-tight", bg)}>
      <div className="text-[12px] font-semibold">{main}</div>
      {sub && <div className="text-[9px] opacity-70">{sub}</div>}
    </td>
  );
}

function CompareTable({ rows, slots, section }) {
  if (!rows.length) {
    return <div className="text-sm text-slate-500 italic px-2 py-4">No sources returned data for this section yet.</div>;
  }
  // Group slots by day for header rendering.
  const days = [];
  let lastKey = null;
  slots.forEach((s, i) => {
    const k = dayKey(s);
    if (k !== lastKey) { days.push({ key: k, label: dayLabel(s), startIdx: i, count: 1 }); lastKey = k; }
    else days[days.length - 1].count++;
  });
  return (
    <div className="overflow-x-auto -mx-2">
      <table className="w-full border-separate border-spacing-0 text-xs">
        <thead>
          <tr>
            <th className="sticky left-0 bg-white z-10 px-2 py-1 text-left font-semibold text-slate-600">Source</th>
            {days.map(d =>
              <th key={d.key} colSpan={d.count}
                  className="px-2 py-1 text-center font-semibold text-slate-700 border-l border-slate-200">
                {d.label}
              </th>
            )}
          </tr>
          <tr>
            <th className="sticky left-0 bg-white z-10 px-2 py-1 text-left text-[10px] font-normal text-slate-400">Hour</th>
            {slots.map((s, i) => {
              const newDay = i === 0 || dayKey(s) !== dayKey(slots[i - 1]);
              return <th key={i}
                className={classNames("px-1 py-0.5 text-center text-[10px] font-normal text-slate-500",
                  newDay && "border-l border-slate-200")}>

                return <CompareCell key={i} row={row} slot={slot} section={section} />;

          )}
        </tbody>
      </table>
    </div>
  );
}
